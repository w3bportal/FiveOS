  // Spine chain — 4 segments totalling 0.48m
  ['SKEL_Spine0',    'SKEL_Pelvis',       0,    0.12, 0   ],
  ['SKEL_Spine1',    'SKEL_Spine0',       0,    0.12, 0   ],
  ['SKEL_Spine2',    'SKEL_Spine1',       0,    0.12, 0   ],
  ['SKEL_Spine3',    'SKEL_Spine2',       0,    0.12, 0   ],
  // Neck + head — neck 0.10m, head 0.10m + sphere radius
  ['SKEL_Neck_1',    'SKEL_Spine3',       0,    0.10, 0   ],
  ['SKEL_Head',      'SKEL_Neck_1',       0,    0.10, 0   ],
  // Left arm — clavicle sits up & outside the spine
  ['SKEL_L_Clavicle','SKEL_Spine3',       0.06, 0.07, 0   ],
  ['SKEL_L_UpperArm','SKEL_L_Clavicle',   0.12, 0,    0   ],
  ['SKEL_L_Forearm', 'SKEL_L_UpperArm',   0.27, 0,    0   ],
  ['SKEL_L_Hand',    'SKEL_L_Forearm',    0.26, 0,    0   ],
  // Right arm (mirrored)
  ['SKEL_R_Clavicle','SKEL_Spine3',      -0.06, 0.07, 0   ],
  ['SKEL_R_UpperArm','SKEL_R_Clavicle',  -0.12, 0,    0   ],
  ['SKEL_R_Forearm', 'SKEL_R_UpperArm',  -0.27, 0,    0   ],
  ['SKEL_R_Hand',    'SKEL_R_Forearm',   -0.26, 0,    0   ],
  // Left leg — thigh 0.45m, calf 0.42m, foot toe-offset
  ['SKEL_L_Thigh',   'SKEL_Pelvis',       0.10,-0.05, 0   ],
  ['SKEL_L_Calf',    'SKEL_L_Thigh',      0,   -0.45, 0   ],
  ['SKEL_L_Foot',    'SKEL_L_Calf',       0,   -0.42, 0   ],
  ['SKEL_L_Toe0',    'SKEL_L_Foot',       0,   -0.04, 0.13],
  // Right leg (mirrored)
  ['SKEL_R_Thigh',   'SKEL_Pelvis',      -0.10,-0.05, 0   ],
  ['SKEL_R_Calf',    'SKEL_R_Thigh',      0,   -0.45, 0   ],
  ['SKEL_R_Foot',    'SKEL_R_Calf',       0,   -0.42, 0   ],
  ['SKEL_R_Toe0',    'SKEL_R_Foot',       0,   -0.04, 0.13],
];

// Per-bone visual mesh thicknesses (in metres). Used by
// buildMannequinGeometry to size the capsule/box/sphere parented to
// each bone — the difference between "stick figure" and "low-poly
// mannequin you can recognise as a person."
const MANNEQUIN_LIMB_RADIUS = {
  'SKEL_Pelvis':    null,            // handled as box
  'SKEL_Spine0':    null,            // handled as box (chest/abdomen)
  'SKEL_Spine1':    null,
  'SKEL_Spine2':    null,
  'SKEL_Spine3':    null,
  'SKEL_Neck_1':    0.045,
  'SKEL_Head':      null,            // handled as sphere
  'SKEL_L_Clavicle': null,
  'SKEL_R_Clavicle': null,
  'SKEL_L_UpperArm': 0.055,
  'SKEL_L_Forearm':  0.045,
  'SKEL_L_Hand':     null,           // box
  'SKEL_R_UpperArm': 0.055,
  'SKEL_R_Forearm':  0.045,
  'SKEL_R_Hand':     null,
  'SKEL_L_Thigh':    0.075,
  'SKEL_L_Calf':     0.060,
  'SKEL_L_Foot':     null,           // box
  'SKEL_L_Toe0':     null,
  'SKEL_R_Thigh':    0.075,
  'SKEL_R_Calf':     0.060,
  'SKEL_R_Foot':     null,
  'SKEL_R_Toe0':     null,
};

function buildMannequinGeometry(byName, material) {
  // Build a low-poly mesh per bone — capsules for limbs, boxes for the
  // torso/feet/hands, sphere for the head. Each piece is parented to its
  // bone so it follows pose rotations for free.
  const meshes = [];

  function addCapsuleToChild(boneName, radius) {
    const bone = byName.get(boneName);
    if (!bone) return;
    const child = bone.children.find(c => c.isBone);
    if (!child) return;
    const len = child.position.length();
    if (len < 0.02) return;
    const dir = child.position.clone().normalize();
    // Capsule's natural axis is Y. Build it along Y of length len, then
    // rotate so Y aligns with the bone-to-child direction.
    const geom = new THREE.CapsuleGeometry(radius, Math.max(len - radius * 1.6, len * 0.55), 8, 24);
    const mesh = new THREE.Mesh(geom, material);
    const yAxis = new THREE.Vector3(0, 1, 0);
    const q = new THREE.Quaternion().setFromUnitVectors(yAxis, dir);
    mesh.position.copy(dir).multiplyScalar(len / 2);
    mesh.quaternion.copy(q);
    bone.add(mesh);
    meshes.push(mesh);
  }

  function addBoxAt(boneName, sx, sy, sz, ox, oy, oz) {
    const bone = byName.get(boneName);
    if (!bone) return;
    const geom = new THREE.BoxGeometry(sx, sy, sz);
    const mesh = new THREE.Mesh(geom, material);
    mesh.position.set(ox || 0, oy || 0, oz || 0);
    bone.add(mesh);
    meshes.push(mesh);
  }

  function addSphereAt(boneName, r, ox, oy, oz) {
    const bone = byName.get(boneName);
    if (!bone) return;
    const geom = new THREE.SphereGeometry(r, 16, 12);
    const mesh = new THREE.Mesh(geom, material);
    mesh.position.set(ox || 0, oy || 0, oz || 0);
    bone.add(mesh);
    meshes.push(mesh);
  }

  // Torso — single chunky box on Spine0 covering pelvis-to-chest, plus
  // a smaller chest box on Spine3. Two pieces rather than one per spine
  // segment so pose rotations look more natural at the chest hinge.
  addBoxAt('SKEL_Pelvis', 0.22, 0.10, 0.16, 0, 0.05, 0);
  addBoxAt('SKEL_Spine0', 0.20, 0.16, 0.14, 0, 0.08, 0);
  addBoxAt('SKEL_Spine2', 0.24, 0.20, 0.16, 0, 0.10, 0);

  // Limbs (capsules).
  for (const [boneName, radius] of Object.entries(MANNEQUIN_LIMB_RADIUS)) {
    if (radius != null) addCapsuleToChild(boneName, radius);
  }

  // Head sphere — radius 0.10 sits on top of the neck-to-head segment,
  // centered slightly above the head bone origin so the crown lands at
  // ~1.85m world height.
  addSphereAt('SKEL_Head', 0.10, 0, 0.08, 0);

  // Hands — small boxes pointing along the hand bone's axis.
  addBoxAt('SKEL_L_Hand', 0.09, 0.04, 0.10, 0.05, 0, 0);
  addBoxAt('SKEL_R_Hand', 0.09, 0.04, 0.10, -0.05, 0, 0);

  // Feet — boxes oriented along the toe direction (forward in Z).
  addBoxAt('SKEL_L_Foot', 0.08, 0.05, 0.20, 0, -0.025, 0.06);
  addBoxAt('SKEL_R_Foot', 0.08, 0.05, 0.20, 0, -0.025, 0.06);

  // Clavicle nubs — short boxes from each clavicle bone outward, so the
  // shoulders read visually instead of disappearing inside the chest.
  addBoxAt('SKEL_L_Clavicle', 0.10, 0.06, 0.08, 0.05, 0.02, 0);
  addBoxAt('SKEL_R_Clavicle', 0.10, 0.06, 0.08, -0.05, 0.02, 0);

  return meshes;
}

window.loadGtaSkeleton = function (variant) {
  // variant: 'male' | 'female'. Loads the bundled freemode_*.glb (real
  // freemode mesh exported from Sollumz via Blender, materials stripped
  // for tiny file size -- we re-apply a translucent cyan material at
  // load time for the x-ray pose-mode look). Falls back to the
  // synthetic mannequin if the .glb is missing.
  if (poseMode) window.exitPoseMode();
  clearModel();

  const v = variant === 'female' ? 'female' : 'male';
  const url = `./reference/freemode_${v}.glb`;

  // Neutral clay material -- more readable than the cyan blueprint look.
  // Higher opacity (0.85) so body shape reads solid, but enough see-through
  // for joints inside the body to remain visible from skewed angles.
  // depthWrite back on so the body actually occludes joints behind it,
  // which makes "front/back" obvious at a glance.
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: 0xC8C5BF,         // warm clay
    metalness: 0.0,
    roughness: 0.6,
    transparent: true,
    opacity: 0.88,
    side: THREE.DoubleSide,
    depthWrite: true,
  });

  // Reference ped is meant as a scale-comparison overlay next to a
  // user's prop -- when we ARE the ped, it's just a duplicate. Hide it
  // for the duration of the preset session.
  if (typeof window.setReferenceVisible === 'function') window.setReferenceVisible(false);

  const loader = new GLTFLoader();
  loader.load(url, gltf => {
    const root = gltf.scene;
    root.name = 'GtaFreemodePreset_' + v;

    // The bundled .blend includes a second Mixamo-rigged skeleton
    // (MixamoSrc) for animation retargeting, a Plane floor object, and a
    // cs_grp of bone-widget gizmos. Remove them outright -- setting
    // visible=false still lets Box3.setFromObject include them in the
    // bounding box, which then throws off the camera framing.
    const hideTopLevelNames = new Set(['MixamoSrc', 'cs_grp', 'Plane', 'IK_Root',
                                       'LEG_L_IK', 'LEG_R_IK', 'LEG_L_POLE',
                                       'LEG_R_POLE', 'IK_L_FA', 'IK_R_FA']);
    const toRemove = [];
    root.traverse(node => {
      if (hideTopLevelNames.has(node.name)) toRemove.push(node);
      if (node.isMesh && node.geometry && node.geometry.attributes.position) {
        const pc = node.geometry.attributes.position.count;
        if (pc <= 8 && node.name.toLowerCase().includes('plane')) toRemove.push(node);
      }
    });
    for (const n of toRemove) {
      if (n.parent) n.parent.remove(n);
    }

    // Override all VISIBLE mesh materials with the translucent cyan --
    // consistent blueprint aesthetic regardless of what Blender exported.
    const hideHelperPattern = /^(IK_|PH_|EO_|MH_|SM_|RB_|cs_|WGT_)/i;
    root.traverse(node => {
      if ((node.isMesh || node.isSkinnedMesh) && node.visible) {
        node.material = bodyMat;
        node.castShadow = false;
        node.receiveShadow = false;
        node.frustumCulled = false;     // skinned meshes commonly fail bounds checks at extreme poses
      }
      if (node.isBone && hideHelperPattern.test(node.name)) {
        // Helper bones stay in the hierarchy (some are parents of real
        // bones) but get filtered out of the pose-mode bone list so the
        // sidebar only shows SKEL_* bones the user actually wants to
        // rotate. Flag them with userData; pose mode's bone enumeration
        // reads this.
        node.userData.poseHidden = true;
      }
    });

    // Sollumz/Blender export has the male freemode rig facing -Z
    // (Blender +Y forward -> three.js -Z forward after Y-up conversion);
    // three.js's default camera looks down -Z so the male figure spawns
    // with its back to the user, hence the 180-deg spin. The female
    // freemode .glb was authored facing the opposite way in Blender, so
    // the same rotation lands her facing away from the camera. Only
    // spin the male.
    if (v === 'male') {
      root.rotateY(Math.PI);
    }
    root.updateMatrixWorld(true);

    // Ground-snap: the model's pivot lands at the pelvis in Blender, so
    // after export the feet end up below the grid. Compute the rotated
    // bounding box and translate the whole model up so its lowest point
    // (feet/toes) sits at Y=0.
    scene.add(root);
    root.updateMatrixWorld(true);
    const groundBox = new THREE.Box3().setFromObject(root);
    if (isFinite(groundBox.min.y)) {
      root.position.y -= groundBox.min.y;
      root.updateMatrixWorld(true);
    }

    currentModel = root;
    empty.classList.add('hidden');
    // Apply the view-panel's mesh-opacity slider to the freshly-loaded
    // freemode mesh too. Default is 0.4 = bones-through-skin look that
    // makes posing immediately legible.
    applyMeshOpacity();

    frameModel(root);
    window.enterPoseMode();
    postToHost({ kind: 'loaded', verts: 0, tris: 0, source: 'gta-freemode-' + v });
    requestRender();
  }, undefined, err => {
    // Fallback: bundled .glb missing -> synthesize.
    console.warn('freemode glb load failed, falling back to synthetic:', err);
    loadSyntheticGtaSkeleton(v);
  });
};

// Synthetic skeleton kept as a fallback for when the bundled glb is
// missing (e.g. unzip failure, custom build). Same code path as before;
// every bone uses SKEL_* names so .ycd export still works.
function loadSyntheticGtaSkeleton(variant) {
  const byName = new Map();
  for (const [name, parent, x, y, z] of GTA_SKELETON_BONES) {
    const bone = new THREE.Bone();
    bone.name = name;
    bone.position.set(x, y, z);
    if (parent) byName.get(parent).add(bone);
    byName.set(name, bone);
  }
  const allBones = Array.from(byName.values());
  if (variant === 'female') {
    byName.get('SKEL_L_Clavicle').position.x *= 0.88;
    byName.get('SKEL_R_Clavicle').position.x *= 0.88;
    byName.get('SKEL_L_UpperArm').position.x *= 0.95;
    byName.get('SKEL_R_UpperArm').position.x *= 0.95;
    byName.get('SKEL_L_Forearm').position.x  *= 0.95;
    byName.get('SKEL_R_Forearm').position.x  *= 0.95;
  }
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: variant === 'female' ? 0x7DD3FC : 0x60A5FA,
    metalness: 0, roughness: 0.35, transparent: true, opacity: 0.42,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const skeleton = new THREE.Skeleton(allBones);
  const stubGeom = new THREE.BufferGeometry();
  stubGeom.setAttribute('position', new THREE.Float32BufferAttribute([], 3));
  const skinned = new THREE.SkinnedMesh(stubGeom, new THREE.MeshBasicMaterial({ visible: false }));
  skinned.add(byName.get('SKEL_ROOT'));
  skinned.bind(skeleton);
  buildMannequinGeometry(byName, bodyMat);
  const root = new THREE.Group();
  root.name = 'GtaSkeletonPreset_' + variant;
  root.add(skinned);
  scene.add(root);
  currentModel = root;
  empty.classList.add('hidden');
  applyMeshOpacity();
  frameModel(root);
  window.enterPoseMode();
  postToHost({ kind: 'loaded', verts: 0, tris: 0, source: 'gta-skeleton-' + variant });
  requestRender();
}

// ════════════════════════════════════════════════════════════════════
// PROP IMPORT
//
// User imports a .glb / .fbx prop (a beer bottle, gun, phone, whatever)
// and moves/rotates it with TransformControls so they can author a pose
// that interacts with the prop visually. On export, we compute the
// prop's transform RELATIVE to a chosen GTA player skeleton bone -- the
// "PropPlacement" 6-tuple that dpemotes' PropEmotes format expects.
// ════════════════════════════════════════════════════════════════════
let propModel = null;
let propAttachBoneName = 'SKEL_R_Hand_1';   // default: right-hand attachment (most common)
let propAttachBoneId = 28422;               // dpemotes-style runtime bone tag for R hand
const _tmpMat = new THREE.Matrix4();
const _tmpMatInv = new THREE.Matrix4();
const _tmpVec = new THREE.Vector3();
const _tmpQuat = new THREE.Quaternion();
const _tmpScale = new THREE.Vector3();

// ── Animation → Emote PREVIEW player (with timeline) ─────────────────────
// Drives each bone's LOCAL quaternion per frame — the same values the .ycd
// stores, so the preview is exactly what the exported emote does in-game.
// Clip: { fps, frames, loop, bones:[ { name:'SKEL_R_UpperArm', q:[[x,y,z,w],…] } ] }
let _rt = null;   // { tracks, fps, frames, frame, playing, loop, raf, t0, f0 }
function _rtApply(frame) {
  if (!_rt) return;
  const f = Math.max(0, Math.min(_rt.frames - 1, frame | 0));
  for (const tr of _rt.tracks) {
    // Absolute parent-local rotations (SKEL_ROOT.q stripped at import).
    // Root locomotion from tr.p / _rt.root below.
    if (Array.isArray(tr.q) && tr.q.length) {
      const q = tr.q[Math.min(f, tr.q.length - 1)];
      if (q && q.length >= 4) tr.bone.quaternion.set(q[0], q[1], q[2], q[3]);
    } else {
      // No rotation track (e.g. SKEL_ROOT) — hold bind so the Y-up bake stays.
      const idx = poseBones.indexOf(tr.bone);
      const restQ = idx >= 0 ? poseInitialQuats[idx]
        : (tr.bone.userData && tr.bone.userData.poseAuxRest && tr.bone.userData.poseAuxRest.q);
      if (restQ) tr.bone.quaternion.copy(restQ);
    }
    if (tr.p && tr.p.length) {
      const idx = poseBones.indexOf(tr.bone);
      const p = tr.p[Math.min(f, tr.p.length - 1)];
      const rest = idx >= 0 ? poseInitialPositions[idx]
        : (tr.bone.userData && tr.bone.userData.poseAuxRest && tr.bone.userData.poseAuxRest.p);
      if (Array.isArray(p) && p.length >= 3 && rest) {
        tr.bone.position.set(rest.x + p[0], rest.y + p[1], rest.z + p[2]);
      }
    }
  }
  // Entity mover (YCD Track 5 / payload.root): translate the WHOLE model
  // group. Bone-local SKEL_ROOT.p alone left hips planted on freemode.
  if (_rt.root && _rt.root.length) {
    const rm = _rt.root[Math.min(f, _rt.root.length - 1)];
    if (Array.isArray(rm) && rm.length >= 3) {
      if (_rt.modelRoot && _rt.modelRootBase) {
        _rt.modelRoot.position.set(
          _rt.modelRootBase.x + rm[0],
          _rt.modelRootBase.y + rm[1],
          _rt.modelRootBase.z + rm[2]);
      } else if (_rt.rootBone && _rt.rootRest) {
        _rt.rootBone.position.set(
          _rt.rootRest.x + rm[0], _rt.rootRest.y + rm[1], _rt.rootRest.z + rm[2]);
      }
    }
  }
  // Foot plant: keep contact feet glued in world XZ. Without this, any
  // leftover mover/bone mismatch reads as skating (classic moonwalk slide).
  if (_rt.footPlant && _rt.modelRoot) {
    _rtApplyFootPlant(f);
  }
  _rt.frame = f;
  // Keep the orbit target on the ped so travelling clips don't walk off-screen.
  if (_rt.followCam && typeof controls !== 'undefined' && controls) {
    try {

      pathL.push([_rtFootTmp.x, _rtFootTmp.y, _rtFootTmp.z]);
      rFoot.getWorldPosition(_rtFootTmp); _rtFootTmp.applyMatrix4(_rtFootInv);
      pathR.push([_rtFootTmp.x, _rtFootTmp.y, _rtFootTmp.z]);
    }
  } catch (e) {
    console.warn('foot-plant sample failed', e);
    return null;
  } finally {
    for (const s of saved) {
      s.bone.quaternion.copy(s.q);
      s.bone.position.copy(s.p);
    }
    modelRoot.position.copy(savedModel);
  }

  const plantedL = _rtDetectPlanted(pathL);
  const plantedR = _rtDetectPlanted(pathR);
  if (!plantedL && !plantedR) return null;
  return {
    lFoot, rFoot, plantedL, plantedR,
    lockL: null, lockR: null,
  };
}

// Pin planted feet in WORLD xz by adjusting foot bones in parent space.
// Body/mover keep travelling; legs absorb residual skate (foot IK).
const _rtFootTargetWorld = new THREE.Vector3();
const _rtFootTargetLocal = new THREE.Vector3();
const _rtFootMaxCorr = 0.12; // metres — soft clamp per frame

function _rtApplyFootPlant(f) {
  const fp = _rt.footPlant;
  if (!fp) return;
  if (_rt.modelRoot) _rt.modelRoot.updateMatrixWorld(true);

  const sides = [
    [fp.lFoot, fp.plantedL, 'lockL'],
    [fp.rFoot, fp.plantedR, 'lockR'],
  ];
  for (const [bone, planted, lockKey] of sides) {
    if (!bone || !planted || !bone.parent) continue;
    if (!planted[f]) {
      fp[lockKey] = null;
      continue;
    }
    bone.updateWorldMatrix(true, false);
    bone.getWorldPosition(_rtFootTmp);
    if (!fp[lockKey]) {
      fp[lockKey] = { x: _rtFootTmp.x, z: _rtFootTmp.z };
      continue;
    }
    let errX = _rtFootTmp.x - fp[lockKey].x;
    let errZ = _rtFootTmp.z - fp[lockKey].z;
    const errLen = Math.hypot(errX, errZ);
    if (errLen < 1e-5) continue;
    // Soft clamp so bad plant masks don't yank the leg across the scene.
    if (errLen > _rtFootMaxCorr) {
      const s = _rtFootMaxCorr / errLen;
      errX *= s;
      errZ *= s;
    }
    // Desired world plant (keep authored foot height).
    _rtFootTargetWorld.set(_rtFootTmp.x - errX, _rtFootTmp.y, _rtFootTmp.z - errZ);
    bone.parent.updateWorldMatrix(true, false);
    _rtFootInv.copy(bone.parent.matrixWorld).invert();
    _rtFootTargetLocal.copy(_rtFootTargetWorld).applyMatrix4(_rtFootInv);
    // Pull foot bone to the lock in parent space (Y from IK target keeps
    // contact height; XZ kills skate).
    bone.position.x = _rtFootTargetLocal.x;
    bone.position.y = _rtFootTargetLocal.y;
    bone.position.z = _rtFootTargetLocal.z;
  }
  if (_rt.modelRoot) _rt.modelRoot.updateMatrixWorld(true);
}

// ══════════════════════════════════════════════════════════════════════
// BONE HIERARCHY INSPECTOR (diagnostic)
//
// A live tree of the posed GTA skeleton. Click a bone → a glowing marker
// snaps onto it and TRACKS it every frame while the clip animates, plus a
// big label + the SOURCE bone that drives it. Lets a human point at the
// exact bone that looks wrong (e.g. spot SKEL_Pelvis ← CC_Base_Hip).
// ══════════════════════════════════════════════════════════════════════
// Skeleton overlay: draw the animated bone lines on top of a translucent
// mesh so the skeleton is visibly synced with the mesh animation. The
// SkeletonHelper follows the bones automatically each frame (three.js
// updates it in updateMatrixWorld during render).
let _skelOverlay = false;

// Skeleton view = ANIMATION bones only (user directive 2026-07-17): the stock
// SkeletonHelper draws every helper bone (facial FB_*, twist RB_*, cloth SPR_*,
// IK_/MH_/PH_ …) — a hairball. This custom line set connects only the mocap
// chain: pelvis→spine→head, clavicle→arm→hand, thigh→foot→toe (+fingers).
let _animSkelLines = null;
function _animBoneOk(name) {
  const n = String(name || '').replace(/_\d+$/, '');
  return /^SKEL_(ROOT$|Pelvis|Spine|Neck|Head|[LR]_(Clavicle|UpperArm|Forearm|Hand$|Finger|Thigh|Calf|Foot|Toe))/i.test(n);
}
function ensureAnimSkeletonLines() {
  if (_animSkelLines || !poseBones || !poseBones.length) return;
  const pairs = [];
  for (const b of poseBones) {
    if (!_animBoneOk(b.name)) continue;
    let p = b.parent;
    // walk up through excluded helpers to the nearest allowed ancestor
    while (p && p.isBone && !_animBoneOk(p.name)) p = p.parent;
    if (p && p.isBone && _animBoneOk(p.name)) pairs.push([p, b]);
  }
  if (!pairs.length) return;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pairs.length * 6), 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x00e5ff, depthTest: false, transparent: true, opacity: 0.95 });
  _animSkelLines = new THREE.LineSegments(geo, mat);
  _animSkelLines.renderOrder = 990;
  _animSkelLines.frustumCulled = false;
  _animSkelLines.userData.pairs = pairs;
  scene.add(_animSkelLines);
}
function updateAnimSkeletonLines() {
  if (!_animSkelLines || !_animSkelLines.visible) return;
  const pairs = _animSkelLines.userData.pairs;
  const attr = _animSkelLines.geometry.attributes.position;
  const v = new THREE.Vector3();
  for (let i = 0; i < pairs.length; i++) {
    pairs[i][0].getWorldPosition(v); attr.setXYZ(i * 2, v.x, v.y, v.z);
    pairs[i][1].getWorldPosition(v); attr.setXYZ(i * 2 + 1, v.x, v.y, v.z);
  }
  attr.needsUpdate = true;
  _animSkelLines.geometry.computeBoundingSphere();
}

window.setSkeletonOverlay = function (on) {
  _skelOverlay = !!on;
  try { viewMeshOpacity = _skelOverlay ? 0.4 : 1.0; applyMeshOpacity(); } catch (e) {}
  // Full SkeletonHelpers stay OFF in skeleton view — only the anim chain shows.
  try { if (poseSkeletonHelper) poseSkeletonHelper.visible = false; } catch (e) {}
  try { if (poseExtraSkeletonHelpers) poseExtraSkeletonHelpers.forEach(h => { if (h) h.visible = false; }); } catch (e) {}
  try {
    ensureAnimSkeletonLines();
    if (_animSkelLines) { _animSkelLines.visible = _skelOverlay; updateAnimSkeletonLines(); }
  } catch (e) {}
  requestRender();
};

let _bi = { marker: null, ring: null, axes: null, bone: null, srcMap: new Map() };

const _biQuat = new THREE.Quaternion();

// Clip drive-map lives in the WPF Outliner now (green/grey dots). The

window.loadProp = function (url) {
  // Tear down any existing prop first so the user can swap props
  // without restarting the session.
  if (propModel) window.removeProp();

  const loader = pickLoader(url);
  if (!loader) {
    postToHost({ kind: 'prop-error', message: 'Unsupported prop format: ' + url });
    return;
  }

  loader.load(
    url,
    asset => {
      let obj;
      if (asset.scene) obj = asset.scene;
      else if (asset.isObject3D) obj = asset;
      else if (asset.isBufferGeometry) {
        const mat = new THREE.MeshStandardMaterial({ color: 0xCC9966, metalness: 0.1, roughness: 0.5 });
        obj = new THREE.Mesh(asset, mat);
      } else if (asset.isGroup) obj = asset;
      else { postToHost({ kind: 'prop-error', message: 'No displayable prop object' }); return; }

      // Reflective glass for any window shaders on the prop (see loadModel).
      upgradeGlassMaterials(obj);

      // Spawn at world origin so it lands near the loaded character's
      // hand for typical hand-held props. User drags from there.
      obj.position.set(0, 1.0, 0.25);
      obj.userData.isProp = true;
      obj.name = 'PropModel';

      // Centimetre-units heuristic: FBX props commonly import 100x too
      // big. If the prop's bbox exceeds 5m it almost certainly needs
      // the divide-by-100 fix (real GTA props are well under that).
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3()).length();
      if (size > 5) {
        obj.scale.setScalar(0.01);
        obj.updateMatrixWorld(true);
      }

      scene.add(obj);
      propModel = obj;

      // Attach the gizmo right away so the user can position from frame
      // zero. Rotation mode is more useful here than translate for
      // most prop tweaks (props are usually grabbed at-position), but
      // translate is the default so they can move it onto the hand
      // first.
      transformControls.attach(propModel);
      transformControls.setMode('translate');
      gizmoBar.style.display = 'flex';

      postToHost({ kind: 'prop-loaded', source: url });
      requestRender();
    },
    undefined,
    err => { postToHost({ kind: 'prop-error', message: 'Prop load failed: ' + (err && err.message || err) }); }
  );
};

window.removeProp = function () {
  if (!propModel) return;
  if (transformControls.object === propModel) transformControls.detach();
  scene.remove(propModel);
  propModel.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const m = Array.isArray(obj.material) ? obj.material : [obj.material];
      m.forEach(mat => mat.dispose());
    }
  });
  propModel = null;
  postToHost({ kind: 'prop-removed' });
  requestRender();
};

window.selectProp = function () {
  // Allow the host to programmatically reattach the gizmo to the prop
  // (e.g. user clicked "Edit Prop" after picking a bone in the sidebar).
  if (!propModel) return false;
  transformControls.attach(propModel);
  transformControls.setMode('translate');
  gizmoBar.style.display = 'flex';
  return true;
};

window.setPropAttachBone = function (name, id) {
  // The bone the prop will hang off in-game. We don't move the prop in
  // world space when this changes -- the user authored its world
  // position relative to where they SEE the bone, so re-decomposing
  // against a different bone just reframes the placement values.
  propAttachBoneName = name || propAttachBoneName;
  propAttachBoneId = (typeof id === 'number') ? id : propAttachBoneId;
  postToHost({ kind: 'prop-attach-set', name: propAttachBoneName, id: propAttachBoneId });
};

// Walk the loaded skeleton for a bone by name (tolerates Sollumz's _1
// suffix). Returns null if not found.
function findBoneByNameFlex(name) {
  if (!poseBones || poseBones.length === 0) return null;
  if (!name) return null;
  const want = name.toLowerCase();
  for (const b of poseBones) {
    const n = (b.name || '').toLowerCase();
    if (n === want) return b;
    if (n.startsWith(want + '_') || n.startsWith(want + '.')) return b;
  }
  return null;
}

window.getPropTransform = function () {
  // Compute the prop's pos+rot in the chosen bone's local space.
  // PropPlacement in dpemotes is metres + degrees; we return the
  // decomposed values so the host can stamp them straight into the
  // Lua snippet.
  if (!propModel) return null;
  const bone = findBoneByNameFlex(propAttachBoneName);
  let localPos = new THREE.Vector3();
  let localQuat = new THREE.Quaternion();
  if (bone) {
    bone.updateWorldMatrix(true, false);
    propModel.updateWorldMatrix(true, false);
    _tmpMat.copy(bone.matrixWorld).invert();
    _tmpMatInv.multiplyMatrices(_tmpMat, propModel.matrixWorld);
    _tmpMatInv.decompose(localPos, localQuat, _tmpScale);
  } else {
    // No bone match -> just return world transform. Caller (host) can
    // still write it; will be wrong in-game but at least the export
    // path doesn't fail.
    localPos.copy(propModel.position);
    localQuat.copy(propModel.quaternion);
  }
  // Convert quat -> Euler (XYZ order, degrees) for dpemotes.
  const e = new THREE.Euler().setFromQuaternion(localQuat, 'XYZ');
  return JSON.stringify({
    bone_name: propAttachBoneName,
    bone_id: propAttachBoneId,
    pos: [localPos.x, localPos.y, localPos.z],
    rot_deg: [
      THREE.MathUtils.radToDeg(e.x),
      THREE.MathUtils.radToDeg(e.y),
      THREE.MathUtils.radToDeg(e.z),
    ],
  });
};

const POSE_JOINT_COLOR = 0x6366F1;
// Currently-selected joint -- bright orange-hot so it pops over the body.
const POSE_JOINT_COLOR_ACTIVE = 0xFF7733;

// Body-region color palette. Left vs right uses cool vs warm so the user
// can mirror-check at a glance. Every entry is chosen to keep ≥0.4
// relative luminance delta from the clay body color (0xC8C5BF) — the
// previous near-white torso / pale finger swatches blended into the
// mesh and were unreadable at oblique angles.
const POSE_REGION_COLORS = {
  head:     0xFFD23F,   // amber yellow
  torso:    0x9333EA,   // deep violet (was 0xE8E8E8 — blended w/ body)
  armL:     0x22C55E,   // emerald
  armR:     0xF97316,   // saturated orange
  legL:     0x3B82F6,   // royal blue
  legR:     0xEF4444,   // crimson
  fingerL:  0x065F46,   // dark emerald (was 0xA7F3D0 — too pale)
  fingerR:  0xC2410C,   // burnt orange (was 0xFED7AA — too pale)
  face:     0xD946EF,   // magenta -- face bones cluster on the head
  accessory: 0xC026D3,  // fuchsia
  other:    0x6366F1,   // indigo (was white — invisible on clay body)
};

function classifyBoneRegion(name) {
  // Mirrors the C# BoneGroupClassifier rules. Kept in sync deliberately
  // so the sidebar grouping label and the joint-marker color always agree.
  const n = (name || '').toLowerCase();
  const isL = /(_l_|_left_|left|\.l$|_l$)/i.test(n);
  const isR = /(_r_|_right_|right|\.r$|_r$)/i.test(n);
  if (/(finger|thumb|index|middle|ring|pinky|little)/.test(n))
    return isR ? 'fingerR' : 'fingerL';
  if (/(eye|jaw|brow|tongue|lip|cheek|mouth|face|nose)/.test(n)) return 'face';
  if (/(head|neck|skull)/.test(n)) return 'head';
  if (/(spine|chest|torso|pelvis|hip|waist|^root|_root|skel_root)/.test(n)) return 'torso';
  if (/(clavicle|shoulder|upperarm|upper_arm|forearm|lower_arm|hand|wrist)/.test(n) ||
      (/arm/.test(n) && !/armor/.test(n)))
    return isR ? 'armR' : 'armL';
  if (/(thigh|upleg|calf|shin|knee|foot|ankle|toe|heel)/.test(n) ||
      (/leg/.test(n) && !/legging/.test(n)))
    return isR ? 'legR' : 'legL';
  if (/(tail|breast|cloth|hair|skirt|spr_)/.test(n)) return 'accessory';
  return 'other';
}

// Finger bones get smaller markers so a closed fist's worth of joints
// doesn't drown out the palm + wrist as visual landmarks.
function jointHandleRadiusFor(boneName, baseRadius) {
  const r = classifyBoneRegion(boneName);
  if (r === 'fingerL' || r === 'fingerR') return baseRadius * 0.55;
  if (r === 'face' || r === 'accessory') return baseRadius * 0.7;
  return baseRadius;
}

// ─── Control rig (box + ring controllers, AdvancedSkeleton style) ───
// The dot-per-bone cloud is gone. Instead each real joint gets a shape:
//   • limb segments (clavicle / upper-arm / forearm / thigh / calf) → a
//     wireframe BOX wrapping the bone, coloured by side.
//   • spine / neck / head / pelvis → a horizontal RING at the joint.
//   • wrists / ankles keep their IK circle handles (built separately).
// Twist-rolls, cloth, fingers, toes and facial bones get NO control, so
// the rig reads clean. Colour convention: red = character's right, gold =
// left, green = centre/spine. Selection still runs through poseJointHandles
// (pickers carry userData.poseBone), so FK-rotate + undo are unchanged.
const CTRL_COLOR_R = 0xf5c518;   // character's right → gold
const CTRL_COLOR_L = 0xef4444;   // character's left  → red  (matches the AS reference)
const CTRL_COLOR_C = 0x33d17a;   // centre / spine
const _CTRL_Y = new THREE.Vector3(0, 1, 0);
const _CTRL_Z = new THREE.Vector3(0, 0, 1);
const _poseUnitScale = new THREE.Vector3(1, 1, 1);

// instead of the limb under the cursor. Wires are display-only — the
// invisible mesh pickers do all hit-testing — so disable their raycast.
const _ctrlNoRaycast = function () {};

// Registry so every LineMaterial's pixel-resolution can be refreshed on
// resize (required, or fat lines render at the wrong width).

  const v = new THREE.Vector2();
  try { renderer.getSize(v); } catch (e) { v.set(window.innerWidth || 1, window.innerHeight || 1); }
  if (v.x < 1 || v.y < 1) v.set(window.innerWidth || 1, window.innerHeight || 1);
  return v;
}
function _fatLineMat(color, widthPx, opacity, depthTest) {
  const res = _fatRes();

    color, linewidth: widthPx, worldUnits: false,
    transparent: true, opacity,
    depthTest, depthWrite: false, toneMapped: false, dashed: false,
  });
  m.resolution.set(res.x, res.y);
  _fatMats.push(m);
  return m;
}
function refreshFatLineResolution() {
  const res = _fatRes();

// tinting/hover/selection. `geo` = LineSegmentsGeometry (box/bones) or
// LineGeometry (ring loop); `loop` picks Line2 vs LineSegments2.
function buildFatWire(geo, loop, color, widthPx, roBase) {
  const Ctor = loop ? Line2 : LineSegments2;
  const casingMat = _fatLineMat(0x0a0a0f, widthPx + 1.6, 0.9, false);
  const colorMat = _fatLineMat(color, widthPx, 0.98, false);
  const casing = new Ctor(geo, casingMat);
  const line = new Ctor(geo, colorMat);
  const ro = roBase || 998;
  casing.renderOrder = ro; line.renderOrder = ro + 1;
  casing.raycast = _ctrlNoRaycast; line.raycast = _ctrlNoRaycast;
  casing.frustumCulled = false; line.frustumCulled = false;
  const g = new THREE.Group();
  g.add(casing); g.add(line);
  g.userData.colorMat = colorMat;
  g.userData.casingMat = casingMat;
  g.userData.colorLine = line;
  g.userData.baseWidth = widthPx;
  return g;
}

// ── Thick skeleton bone lines ───────────────────────────────────────
// The full mocap chain drawn as fat cased lines through every joint
// (pelvis→spine→head, clavicle→arm→hand→fingers, thigh→calf→foot→toe),
// updated each frame from bone world positions. This is the "see the
// lines" the user asked for; _animBoneOk already covers fingers/hands/toes.
let _boneLines = null;   // { group, geo, pairs, buf }
const _boneLV = new THREE.Vector3();
function ensureBoneLines() {
  if (_boneLines || !poseBones || !poseBones.length) return;
  const pairs = [];
  for (const b of poseBones) {
    if (!_animBoneOk(b.name)) continue;
    let p = b.parent;
    while (p && p.isBone && !_animBoneOk(p.name)) p = p.parent;
    if (p && p.isBone && _animBoneOk(p.name)) pairs.push([p, b]);
  }
  if (!pairs.length) return;
  const buf = new Float32Array(pairs.length * 6);
  const geo = new LineSegmentsGeometry();
  geo.setPositions(buf);
  const group = buildFatWire(geo, false, 0xE6ECFF, 2.2, 990); // behind the control wires
  scene.add(group);
  _boneLines = { group, geo, pairs, buf };
  updateBoneLines();
}
function updateBoneLines() {
  if (!_boneLines || !_boneLines.group.visible) return;
  const { pairs, buf, geo } = _boneLines;
  for (let i = 0; i < pairs.length; i++) {
    pairs[i][0].getWorldPosition(_boneLV); buf[i * 6] = _boneLV.x; buf[i * 6 + 1] = _boneLV.y; buf[i * 6 + 2] = _boneLV.z;
    pairs[i][1].getWorldPosition(_boneLV); buf[i * 6 + 3] = _boneLV.x; buf[i * 6 + 4] = _boneLV.y; buf[i * 6 + 5] = _boneLV.z;
  }
  geo.setPositions(buf);
}
function setBoneLinesVisible(v) { if (_boneLines) _boneLines.group.visible = !!v; }
function disposeBoneLines() {
  if (!_boneLines) return;
  scene.remove(_boneLines.group);
  try { _boneLines.geo.dispose(); } catch (e) {}
  _boneLines.group.children.forEach(c => c.material && c.material.dispose());
  _boneLines = null;
}

function controlRigBoneKind(name) {
  const n = name || '';
  // Fingers: SKEL_[LR]_Finger00..42 (5 fingers × 3 phalanges) → small boxes.
  if (/SKEL_[LR]_Finger[0-4][0-2](_|$)/i.test(n)) return 'fingerbox';
  // Limb segments incl. hands, feet, toes now (fuller coverage).
  if (/SKEL_[LR]_(Clavicle|UpperArm|Forearm|Hand|Thigh|Calf|Foot|Toe0)(_|$)/i.test(n)) return 'box';
  // Denser spine: pelvis + spine0..3 + neck + head = 7 rings.
  if (/SKEL_(Pelvis|Spine0|Spine1|Spine2|Spine3|Neck|Head)(_|$)/i.test(n) && !/Nub/i.test(n)) return 'ring';
  return null;   // spine_root, twist-rolls, cloth, face → no control
}
function controlRigColor(name) {
  const r = classifyBoneRegion(name);
  if (r === 'fingerR') return 0xFFDE7A;   // pale gold (subordinate to gold arm)
  if (r === 'fingerL') return 0xFF9A6B;   // coral (subordinate to red arm)
  if (r === 'armR' || r === 'legR') return CTRL_COLOR_R;
  if (r === 'armL' || r === 'legL') return CTRL_COLOR_L;
  return CTRL_COLOR_C;
}
// Longest bone-child offset = the segment this bone drives (its "length").
function ctrlPrimaryChildOffset(bone) {
  let best = null, bl = 0;
  for (const c of bone.children) {
    if (!c.isBone) continue;
    const l = c.position.length();
    if (l > bl) { bl = l; best = c; }
  }
  return best ? best.position.clone() : null;
}
// Local-space axis + length for a bone's wrapping box. Handles the messy
// cases: the HAND (aim down the middle finger, not the thumb, so the palm
// box points forward) and LEAF tips (fingertips/toe tips have no child, so
// continue the parent→this direction with a short length instead of a big
// stray box pointing +Y).
const _cbW = new THREE.Vector3(), _cbPW = new THREE.Vector3(), _cbQ = new THREE.Quaternion();
function ctrlBoxDir(bone, R, isFinger) {
  const nm = bone.name || '';
  if (/SKEL_[LR]_Hand(_|$)/i.test(nm)) {
    for (const c of bone.children) {
      if (c.isBone && /Finger2\d/i.test(c.name || '')) return { dir: c.position.clone(), len: Math.max(c.position.length(), R * 0.04) };
    }
  }
  const off = ctrlPrimaryChildOffset(bone);
  if (off && off.lengthSq() > 1e-10) return { dir: off, len: off.length() };
  // Leaf: continue the finger/toe in the parent→this direction, short.
  bone.updateWorldMatrix(true, false);
  bone.getWorldPosition(_cbW);
  let len = bone.position.length();
  if (len < 1e-6) len = isFinger ? R * 0.02 : R * 0.05;
  len *= 0.7;
  if (bone.parent && bone.parent.isBone) {
    bone.parent.getWorldPosition(_cbPW);
    const wd = _cbW.clone().sub(_cbPW);
    if (wd.lengthSq() > 1e-10) {
      bone.getWorldQuaternion(_cbQ).invert();
      return { dir: wd.applyQuaternion(_cbQ).normalize().multiplyScalar(len), len };
    }
  }
  return { dir: null, len };
}

function buildPoseJointHandles(bones, modelBoundsRadius) {
  // NB: name kept for the call sites / disposal path; it builds the fat
  // cased control rig (limb boxes + finger boxes + spine rings) + invisible
  // mesh pickers. Wires are Groups (casing+colour fat lines); pickers do all
  // hit-testing (userData.poseBone) so FK-rotate + undo are unchanged.
  const R = modelBoundsRadius || 1;
  // Shared geometries (disposed once via the Set in exitPoseMode).
  const boxLineGeo = new LineSegmentsGeometry().fromEdgesGeometry(new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)));
  const boxPickGeo = new THREE.BoxGeometry(1, 1, 1);
  const circFlat = [];
  for (let i = 0; i <= 48; i++) { const a = i / 48 * Math.PI * 2; circFlat.push(Math.cos(a), Math.sin(a), 0); }
  const ringLineGeo = new LineGeometry().setPositions(circFlat);
  const ballGeo = new THREE.SphereGeometry(1, 12, 10);   // ring picker (clickable from any angle)
  const _worldUp = new THREE.Vector3(0, 1, 0);
  const handles = [];

  for (const bone of bones) {
    const kind = controlRigBoneKind(bone.name);
    if (!kind) continue;                       // declutter: no control here
    const color = controlRigColor(bone.name);
    const region = classifyBoneRegion(bone.name);
    const isFinger = (kind === 'fingerbox');
    const pickMat = new THREE.MeshBasicMaterial({ visible: false, depthTest: false });

    let wire, picker, baseScale, q, pos;

    if (kind === 'box' || kind === 'fingerbox') {
      const ax = ctrlBoxDir(bone, R, isFinger);
      const len = Math.max(ax.len, isFinger ? R * 0.01 : R * 0.03);
      const d = ax.dir ? ax.dir.clone().normalize() : _CTRL_Y.clone();
      const thick = isFinger
        ? Math.min(R * 0.0095, Math.max(R * 0.005, len * 0.45))
        : Math.min(R * 0.042, Math.max(R * 0.02, len * 0.36));
      baseScale = new THREE.Vector3(thick, len * (isFinger ? 0.8 : 0.82), thick);
      q = new THREE.Quaternion().setFromUnitVectors(_CTRL_Y, d);
      pos = d.clone().multiplyScalar(len * 0.5);

      wire = buildFatWire(boxLineGeo, false, color, isFinger ? 2.0 : 2.6, 996);
      picker = new THREE.Mesh(boxPickGeo, pickMat);
      picker.quaternion.copy(q); picker.position.copy(pos);
      // Fingers are packed close — keep the pick target snug (a big one
      // overlaps neighbours and selects the wrong finger).
      picker.scale.copy(baseScale).multiplyScalar(isFinger ? 1.25 : 1.06);
    } else {
      // ring: keep it HORIZONTAL in world at bind pose regardless of the
      // bone's local axes (GTA spine bones are not Y-up locally). Compute the
      // bone's world orientation and counter-rotate so the ring's axis points
      // world-up; the ring then follows the bone naturally once posed.
      bone.updateWorldMatrix(true, false);
      const bwq = bone.getWorldQuaternion(new THREE.Quaternion());
      const localUp = _worldUp.clone().applyQuaternion(bwq.invert()).normalize();
      const nm = bone.name;
      let rr = R * 0.072;
      if (/Neck/i.test(nm)) rr = R * 0.048;
      else if (/Head/i.test(nm)) rr = R * 0.062;
      else if (/Pelvis/i.test(nm)) rr = R * 0.085;
      else if (/Spine/i.test(nm)) rr = R * 0.07;
      baseScale = new THREE.Vector3(rr, rr, rr);
      q = new THREE.Quaternion().setFromUnitVectors(_CTRL_Z, localUp);
      pos = new THREE.Vector3(0, 0, 0);

      wire = buildFatWire(ringLineGeo, true, color, 2.6, 996);
      picker = new THREE.Mesh(ballGeo, pickMat);
      picker.scale.setScalar(rr * 0.9);
      picker.position.copy(pos);
    }

    wire.quaternion.copy(q);
    wire.position.copy(pos);
    wire.scale.copy(baseScale);
    wire.raycast = _ctrlNoRaycast;             // group has no geometry, but be explicit
    wire.userData.poseBone = bone;
    wire.userData.isPoseDot = true;            // reuse dot show/hide/tint path
    wire.userData.regionColor = color;
    wire.userData.baseScale = baseScale;       // refreshPoseJointDots restores this
    wire.userData.region = region;
    wire.userData.isFinger = isFinger;
    bone.add(wire);

    picker.userData.poseBone = bone;
    picker.userData.isPicker = true;
    picker.userData.visibleHandle = wire;
    bone.add(picker);

    handles.push(wire);
    handles.push(picker);
  }
  return handles;
}

// ─── FiveOS animator rig (FK + limb IK) ─────────────────────────────
// Clean controls — not Blender box spam, not Maya curve forests.
//   FK: rotate major joints with the trackball gizmo
//   IK: translate hand/foot handles; two-bone solve writes FK rotations

function isMajorFkBone(name) {
  const n = (name || '').replace(/_\d+$/, '');
  return /^(SKEL_Pelvis|SKEL_Spine2|SKEL_Spine3|SKEL_Neck_1|SKEL_Head|SKEL_[LR]_Clavicle|SKEL_[LR]_UpperArm|SKEL_[LR]_Forearm|SKEL_[LR]_Hand|SKEL_[LR]_Thigh|SKEL_[LR]_Calf|SKEL_[LR]_Foot)$/i.test(n);
}

function poseBoneByBaseName(base) {
  const want = String(base || '').replace(/_\d+$/, '');
  let fallback = null;
  for (const b of poseBones) {
    if (!b || !b.name) continue;
    const n = b.name.replace(/_\d+$/, '');
    if (n !== want) continue;
    let underGame = false;
    for (let p = b; p; p = p.parent) {
      if ((p.name || '').toUpperCase().includes('GAME_RIG')) { underGame = true; break; }
    }
    if (underGame) return b;
    if (!fallback) fallback = b;
  }
  return fallback;
}

const _ikAimCurrent = new THREE.Vector3();
const _ikAimDesired = new THREE.Vector3();
const _ikWorldQ = new THREE.Quaternion();
const _ikParentQ = new THREE.Quaternion();
const _ikParentP = new THREE.Vector3();
const _ikParentS = new THREE.Vector3();
const _ikDeltaQ = new THREE.Quaternion();
const _ikMat = new THREE.Matrix4();

/** Rotate `bone` so its primary child direction aims at `worldTarget`. */
const _ikAimAxis = new THREE.Vector3();
const _ikTwistOld = new THREE.Quaternion();
const _ikTwistNew = new THREE.Quaternion();
const _ikQOld = new THREE.Quaternion();

// Twist component of local quaternion q about the unit axis (swing-twist
// split, q = swing ∘ twist). Standard projection: twist = normalize((axis·v)
// on the axis, w) where v is q's vector part.
function _ikTwistAbout(q, axis, out) {
  const d = q.x * axis.x + q.y * axis.y + q.z * axis.z;
  out.set(axis.x * d, axis.y * d, axis.z * d, q.w);
  const len = Math.hypot(out.x, out.y, out.z, out.w);
  if (len < 1e-9) out.set(0, 0, 0, 1);
  else { out.x /= len; out.y /= len; out.z /= len; out.w /= len; }
  return out;
}

function aimBoneAt(bone, worldTarget) {
  if (!bone) return;
  const child = bone.children.find(c => c.isBone && !(c.userData && c.userData.poseHidden));
  if (!child || child.position.lengthSq() < 1e-10) return;

  bone.updateMatrixWorld(true);
  const bonePos = new THREE.Vector3().setFromMatrixPosition(bone.matrixWorld);
  _ikAimDesired.copy(worldTarget).sub(bonePos);
  if (_ikAimDesired.lengthSq() < 1e-10) return;
  _ikAimDesired.normalize();

  _ikAimCurrent.copy(child.position).normalize().transformDirection(bone.matrixWorld).normalize();
  _ikDeltaQ.setFromUnitVectors(_ikAimCurrent, _ikAimDesired);

  _ikQOld.copy(bone.quaternion);

  _ikMat.copy(bone.matrixWorld);
  _ikWorldQ.setFromRotationMatrix(_ikMat);
  _ikWorldQ.premultiply(_ikDeltaQ);

  if (bone.parent) {
    bone.parent.matrixWorld.decompose(_ikParentP, _ikParentQ, _ikParentS);
    bone.quaternion.copy(_ikParentQ).invert().multiply(_ikWorldQ);
  } else {
    bone.quaternion.copy(_ikWorldQ);
  }

  // ── Twist lock ──────────────────────────────────────────────────────
  // Every GTA tool poses the deform skeleton FK-only; when IK writes into
  // it, uncontrolled roll accumulates (a chain of shortest-arc swings
  // winds twist into elbows/knees — "twisted shoulders" artifacts). Lock
  // the bone's twist about its own aim axis to the PRE-solve value: aim
  // still lands on the target (twist leaves the aim axis fixed), roll can
  // only be changed deliberately with the FK rotate gizmo.
  _ikAimAxis.copy(child.position).normalize();
  _ikTwistAbout(_ikQOld, _ikAimAxis, _ikTwistOld);
  _ikTwistAbout(bone.quaternion, _ikAimAxis, _ikTwistNew);
  // qFinal = (qNew ∘ twistNew⁻¹) ∘ twistOld  — swap new twist for old.
  bone.quaternion.multiply(_ikTwistNew.invert()).multiply(_ikTwistOld).normalize();
}

const _ikA = new THREE.Vector3();
const _ikB = new THREE.Vector3();
const _ikC = new THREE.Vector3();
const _ikT = new THREE.Vector3();
const _ikAc = new THREE.Vector3();
const _ikPole = new THREE.Vector3();
const _ikMid = new THREE.Vector3();

/** Analytic two-bone IK → local FK quaternions on boneA / boneB. */
function solveTwoBoneIk(boneA, boneB, boneC, targetWorld) {
  if (!boneA || !boneB || !boneC || !targetWorld) return;
  boneA.updateMatrixWorld(true);
  boneB.updateMatrixWorld(true);
  boneC.updateMatrixWorld(true);

  boneA.getWorldPosition(_ikA);
  boneB.getWorldPosition(_ikB);
  boneC.getWorldPosition(_ikC);
  _ikT.copy(targetWorld);

  const lab = _ikA.distanceTo(_ikB);
  const lbc = _ikB.distanceTo(_ikC);
  if (lab < 1e-5 || lbc < 1e-5) return;

  let lat = _ikA.distanceTo(_ikT);
  lat = Math.max(1e-4, Math.min(lat, lab + lbc - 1e-4));

  _ikAc.copy(_ikT).sub(_ikA);
  if (_ikAc.lengthSq() < 1e-10) return;
  _ikAc.normalize();

  // Pole = current elbow/knee offset from the root→target axis (keeps bend side).
  _ikPole.copy(_ikB).sub(_ikA);
  const along = _ikAc.dot(_ikPole);
  _ikPole.addScaledVector(_ikAc, -along);
  if (_ikPole.lengthSq() < 1e-8) {
    _ikPole.set(0, 0, 1);
    if (Math.abs(_ikAc.dot(_ikPole)) > 0.9) _ikPole.set(0, 1, 0);
    _ikPole.addScaledVector(_ikAc, -_ikAc.dot(_ikPole));
  }
  _ikPole.normalize();

  const cosA = (lab * lab + lat * lat - lbc * lbc) / (2 * lab * lat);
  const angA = Math.acos(THREE.MathUtils.clamp(cosA, -1, 1));

  _ikMid.copy(_ikA)
    .addScaledVector(_ikAc, Math.cos(angA) * lab)
    .addScaledVector(_ikPole, Math.sin(angA) * lab);

  aimBoneAt(boneA, _ikMid);
  boneA.updateMatrixWorld(true);
  aimBoneAt(boneB, _ikT);
  boneB.updateMatrixWorld(true);
}

function disposeControlRigWidgets() {
  const seen = new Set();
  for (const w of poseControlRigWidgets) {
    if (w.parent) w.parent.remove(w);
    if (w.geometry && !seen.has(w.geometry)) { w.geometry.dispose(); seen.add(w.geometry); }
    if (w.material) {
      if (Array.isArray(w.material)) w.material.forEach(m => m && m.dispose());
      else w.material.dispose();
    }
  }
  poseControlRigWidgets = [];
}

function disposeIkHandles() {
  for (const h of poseIkHandles) {
    if (h.mesh) {
      if (h.mesh.parent) h.mesh.parent.remove(h.mesh);
      h.mesh.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
    }
    if (h.target) {
      if (h.target.parent) h.target.parent.remove(h.target);
    }
  }
  poseIkHandles = [];
  poseIkActiveHandle = null;
  poseHoverIkHandle = null;
  // Drop the FABRIK solver + its chains; buildFiveOsIkHandles rebuilds a
  // fresh one against the current (bind-pose) skeleton on the next call.
  if (poseFabrik) { try { poseFabrik.removeAllChains(); } catch (e) {} }
  poseFabrik = null;
  poseFabrikSkeleton = null;
}

// Full-body IK rig. Each entry can carry TWO solvers that run in sequence
// on drag:
//   • fabrik  — ordered [effector … root]. Multi-bone FABRIK (upf-gti) so
//               the reach carries the clavicle + upper chest (arms) or bends
//               the whole spine / aims the head (torso, head handles).
//   • twoBone — [root, mid, effector]. The proven analytic solver runs
//               AFTER fabrik to cleanly re-place the last two bones, so
//               elbows/knees never invert or hyperextend even though the
//               body leaned. Feet use twoBone only (planted, pelvis stays).
// `iters` tunes how far the fabrik body-lean converges before the analytic
// pass nails the effector: arms lean gently (analytic owns the reach),
// torso/head reach fully (they have no analytic clean-up).
// Wrist + ankle IK circles only. The spine/head are posed FK via the green
// rings now (AdvancedSkeleton style), so the torso/head IK handles are gone
// — they clashed with the rings and dropped a stray purple blob mid-back.
// Circle colours follow the box rig: left = red, right = gold, feet = cyan.
const FIVEOS_IK_CHAINS = [
  { id: 'handL', kind: 'hand', color: 0xef4444, iters: 4,
    twoBone: ['SKEL_L_UpperArm', 'SKEL_L_Forearm', 'SKEL_L_Hand'],
    fabrik: ['SKEL_L_Hand', 'SKEL_L_Forearm', 'SKEL_L_UpperArm', 'SKEL_L_Clavicle', 'SKEL_Spine3'] },
  { id: 'handR', kind: 'hand', color: 0xf5c518, iters: 4,
    twoBone: ['SKEL_R_UpperArm', 'SKEL_R_Forearm', 'SKEL_R_Hand'],
    fabrik: ['SKEL_R_Hand', 'SKEL_R_Forearm', 'SKEL_R_UpperArm', 'SKEL_R_Clavicle', 'SKEL_Spine3'] },
  { id: 'footL', kind: 'foot', color: 0x38BDF8, iters: 0,
    twoBone: ['SKEL_L_Thigh', 'SKEL_L_Calf', 'SKEL_L_Foot'] },
  { id: 'footR', kind: 'foot', color: 0x38BDF8, iters: 0,
    twoBone: ['SKEL_R_Thigh', 'SKEL_R_Calf', 'SKEL_R_Foot'] },
];

// Bones a given handle's solve can rotate — used to snapshot/diff for undo.
function ikAffectedBones(handle) {
  if (!handle) return [];
  const out = [];
  const push = (b) => { if (b && out.indexOf(b) < 0) out.push(b); };
  if (handle.fabrikBones) handle.fabrikBones.forEach(push);
  if (handle.twoBone) { push(handle.twoBone.a); push(handle.twoBone.b); push(handle.twoBone.c); }
  return out;
}

// Build the visible manipulator for one IK handle: a bright ring + inner
// core that reads as a grabbable target, wrapped in a generous invisible
// picker sphere so clicks near it register. Materials are stashed on
// userData so hover / active states can retint without rebuilding.
function buildIkHandleMesh(def) {
  const group = new THREE.Group();
  group.name = `FiveOsIkMesh_${def.id}`;
  const isBig = def.kind === 'torso';
  const ringR = isBig ? 0.052 : (def.kind === 'foot' ? 0.052 : 0.045);
  // Thin clean ring + small core = a clear grab target (only shown in IK mode,
  // so it never clutters FK posing). NOT the old thick "cloud".
  const ringMat = new THREE.MeshBasicMaterial({ color: def.color, depthTest: false, transparent: true, opacity: 0.9, toneMapped: false });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(ringR, 0.005, 8, 40), ringMat);
  ring.rotation.x = Math.PI / 2;
  const coreMat = new THREE.MeshBasicMaterial({ color: def.color, depthTest: false, transparent: true, opacity: 0.95, toneMapped: false });
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.012, 12, 10), coreMat);
  // Generous SPHERE picker so in IK mode a click anywhere on the handle grabs
  // it. In FK mode the joint (box) is checked first, so this never steals a
  // rotate click — the FK/IK toggle decides which wins.
  const picker = new THREE.Mesh(
    new THREE.SphereGeometry(ringR + 0.022, 10, 8),
    new THREE.MeshBasicMaterial({ visible: false, depthTest: false }),
  );
  picker.userData.isPicker = true;
  group.add(ring); group.add(core); group.add(picker);
  group.renderOrder = 986;
  group.userData.isIkHandle = true;
  group.userData.ikId = def.id;
  group.userData.ringMat = ringMat;
  group.userData.coreMat = coreMat;
  group.userData.baseColor = def.color;
  return group;
}

// Retint / resize a handle for its interaction state so the rig gives
// live feedback: the grabbed handle glows white-hot and swells, a hovered
// handle brightens slightly, the rest sit at rest.
function setIkHandleVisual(h) {
  if (!h || !h.mesh) return;
  const active = poseIkActiveHandle === h;
  const hover = poseHoverIkHandle === h;
  const scale = active ? 1.28 : (hover ? 1.14 : 1.0);
  h.mesh.scale.setScalar(scale);
  const ringMat = h.mesh.userData.ringMat;
  const coreMat = h.mesh.userData.coreMat;
  const col = active ? 0xFFFFFF : h.color;
  if (ringMat) { ringMat.color.setHex(col); ringMat.opacity = active ? 1.0 : (hover ? 0.98 : 0.92); }
  if (coreMat) { coreMat.color.setHex(active ? 0xFFFFFF : h.color); coreMat.opacity = active ? 1.0 : 0.95; }
}

function refreshIkHandleVisuals() {
  for (const h of poseIkHandles) setIkHandleVisual(h);
}

function buildFiveOsIkHandles() {
  disposeIkHandles();
  disposeControlRigWidgets();
  if (!poseMode) return;

  // One FABRIK solver over the primary deform skeleton drives every
  // multi-bone chain. Built here at bind pose so its precomputed bind
  // rotations stay valid. Chains are added disabled; only the handle
  // actually being dragged is enabled (see attachIkHandle), so limbs
  // never fight each other.
  const skinned = findRigInScene(currentModel);
  poseFabrikSkeleton = (skinned && skinned.skeleton) ? skinned.skeleton : null;
  poseFabrik = poseFabrikSkeleton ? new FABRIKSolver(poseFabrikSkeleton) : null;
  if (poseFabrik) {
    poseFabrik.setConfiguration({ iterations: 8, thresholdTargetSq: 1e-6 });
    poseFabrik.setChainEnablerAll(false);
  }
  const boneIndex = (b) => poseFabrikSkeleton ? poseFabrikSkeleton.bones.indexOf(b) : -1;

  for (const def of FIVEOS_IK_CHAINS) {
    // Analytic two-bone triplet (arms / legs).
    let twoBone = null;
    if (def.twoBone) {
      const a = poseBoneByBaseName(def.twoBone[0]);
      const b = poseBoneByBaseName(def.twoBone[1]);
      const c = poseBoneByBaseName(def.twoBone[2]);
      if (!a || !b || !c) continue;   // limb incomplete → skip this handle
      twoBone = { a, b, c };
    }

    // FABRIK bone list; drop any the rig lacks. Need >=2 to solve.
    let fabrikBones = null;
    if (def.fabrik) {
      const resolved = def.fabrik.map(poseBoneByBaseName).filter(Boolean);
      if (resolved.length >= 2) fabrikBones = resolved;
      else if (def.id === 'head' && resolved.length === 1 && resolved[0].parent && resolved[0].parent.isBone) {
        // poseBoneByBaseName strips a trailing _<n>, so "SKEL_Neck_1" (a real
        // GTA bone name, not an index) never matches. Walk the hierarchy
        // instead: head + its parent (the neck) is a valid 2-bone aim chain.
        fabrikBones = [resolved[0], resolved[0].parent];
      }
    }

    // Effector = where the handle sits. fabrik[0] is the effector by
    // convention; pure-analytic limbs use the two-bone tip.
    const effector = fabrikBones ? fabrikBones[0] : (twoBone ? twoBone.c : null);
    if (!effector) continue;

    const target = new THREE.Object3D();
    target.name = `FiveOsIk_${def.id}`;
    scene.add(target);

    const group = buildIkHandleMesh(def);
    scene.add(group);

    const handle = {
      id: def.id, kind: def.kind, color: def.color, iters: def.iters || 0,
      target, mesh: group, effector, twoBone, fabrikBones, hasFabrik: false,
    };

    // Register the FABRIK chain (disabled until grabbed).
    if (fabrikBones && poseFabrik) {
      const idx = fabrikBones.map(boneIndex);
      if (idx.every(i => i >= 0)) {
        poseFabrik.createChain(idx, null, target, def.id);
        poseFabrik.setChainEnabler(def.id, false);
        handle.hasFabrik = true;
      }
    }

    // Back-reference from every descendant so a raycast hit at any depth
    // resolves to the handle.
    group.userData.ikHandle = handle;
    group.traverse(o => { if (o.userData) o.userData.ikHandle = handle; });
    poseIkHandles.push(handle);
  }
  syncIkHandleTransforms(true);
  refreshIkHandleVisuals();
}

function syncIkHandleTransforms(force) {
  if (!poseIkHandles.length) return;
  if (!force && poseIkActiveHandle && transformControls.dragging) return;
  const wp = new THREE.Vector3();
  for (const h of poseIkHandles) {
    if (!h.effector || !h.target || !h.mesh) continue;
    if (!force && poseIkActiveHandle === h && transformControls.dragging) continue;
    h.effector.getWorldPosition(wp);
    h.target.position.copy(wp);
    h.mesh.position.copy(wp);
  }
}

function refreshIkHandleVisibility() {
  const animPlaying = !!(posePlaying || (_rt && _rt.playing));
  // IK handles only show in IK mode, so FK posing stays clean and the mode is
  // visible at a glance (rings appear at hands/feet ⇒ you're in IK mode).
  const show = !animPlaying && poseRigDisplayMode === 'fiveos' && poseIkMode;
  for (const h of poseIkHandles) {
    if (h.mesh) h.mesh.visible = show;
  }
}

// FK/IK mode toggle (host toolbar). FK: click a limb to rotate it. IK: drag a
// hand/foot and the shoulder, chest and other side follow (full-body FABRIK).
window.poseSetIkMode = function (on) {
  poseIkMode = !!on;
  if (!poseIkMode) { poseHoverIkHandle = null; }
  try { refreshIkHandleVisibility(); } catch (e) {}
  try { refreshIkHandleVisuals(); } catch (e) {}
  try { renderer.domElement.style.cursor = ''; } catch (e) {}
  requestRender();
  return poseIkMode;
};

function refreshSkeletonHelperVisibility() {
  const animPlaying = !!(posePlaying || (_rt && _rt.playing));
  const show = !animPlaying && poseRigDisplayMode === 'markers';
  const apply = (h) => { if (h) h.visible = show; };
  apply(poseSkeletonHelper);
  for (const h of poseExtraSkeletonHelpers) apply(h);
}

function applyPoseRigDisplay() {
  poseJointDotsEnabled = (poseRigDisplayMode === 'fiveos' || poseRigDisplayMode === 'markers');
  refreshPoseJointDots();
  refreshIkHandleVisibility();
  refreshSkeletonHelperVisibility();
  syncIkHandleTransforms(true);
  // Thick skeleton bone lines run with the FiveOS control rig.
  try {
    ensureBoneLines();
    const animPlaying = !!(posePlaying || (_rt && _rt.playing));
    setBoneLinesVisible(_boneLinesOn && poseRigDisplayMode === 'fiveos' && !animPlaying);
    updateBoneLines();
  } catch (e) {}
  requestRender();
}

function refreshPoseJointDots() {
  const animPlaying = !!(posePlaying || (_rt && _rt.playing));
  const modeOk = poseRigDisplayMode === 'fiveos' || poseRigDisplayMode === 'markers';
  const hideAll = !poseJointDotsEnabled || animPlaying || !modeOk;
  const selectedBones = new Set(poseSelection || []);
  const anySelected = selectedBones.size > 0;
  for (const h of poseJointHandles) {
    if (!h || !h.userData || !h.userData.isPoseDot) continue;
    const bone = h.userData.poseBone;
    let show = !hideAll && !h.userData.regionHidden;
    // Fingers can be collapsed with the Fingers toggle without touching the
    // rest of the rig.
    if (h.userData.isFinger && _fingersMode === 'off') show = false;
    if (show) {
      if (bone && h.parent !== bone) bone.add(h);
      h.visible = true;
      // Box/ring controls carry their own oriented scale — restore that,
      // not a unit scale (a unit box would collapse the limb wrapper).
      if (h.userData.baseScale) h.scale.copy(h.userData.baseScale);
      else h.scale.set(1, 1, 1);
      const cm = h.userData.colorMat;
      if (cm) {
        // Fat cased wire (Group). Selected = white + thicker; when something
        // else is selected, dim this one so the selection pops (spotlight).
        const isOn = selectedBones.has(bone);
        const bw = h.userData.baseWidth || 2.5;
        cm.visible = true;
        if (h.userData.casingMat) h.userData.casingMat.visible = true;
        cm.color.setHex(isOn ? 0xFFFFFF : (h.userData.regionColor ?? POSE_JOINT_COLOR));
        cm.linewidth = isOn ? bw + 2.0 : bw;
        cm.opacity = isOn ? 1.0 : (anySelected ? 0.6 : 0.98);
      } else if (h.material) {
        h.material.visible = true;
        h.material.opacity = 0.92;
        const isOn = selectedBones.has(bone);
        h.material.color.setHex(isOn ? POSE_JOINT_COLOR_ACTIVE : (h.userData.regionColor ?? POSE_JOINT_COLOR));
        h.material.needsUpdate = true;
      }
    } else {
      if (h.parent) h.parent.remove(h);
      h.visible = false;
      h.scale.set(0, 0, 0);
      if (h.material) {
        h.material.visible = false;
        h.material.opacity = 0;
        h.material.needsUpdate = true;
      }
    }
  }
  refreshIkHandleVisibility();
  refreshSkeletonHelperVisibility();
}
poseDotsSyncEnabled = true;

window.poseSetJointDots = function (enabled) {
  if (enabled) {
    if (poseRigDisplayMode === 'none') poseRigDisplayMode = 'fiveos';
  } else {
    poseRigDisplayMode = 'none';
  }
  applyPoseRigDisplay();
};

window.poseSetRigDisplay = function (mode) {
  const m = String(mode || '').toLowerCase();
  // Map retired "control"/"both" onto the new FiveOS rig.
  if (m === 'control' || m === 'both') poseRigDisplayMode = 'fiveos';
  else if (m === 'markers' || m === 'fiveos' || m === 'none') poseRigDisplayMode = m;
  applyPoseRigDisplay();
  try {
    postToHost({
      kind: 'pose-rig-display',
      mode: poseRigDisplayMode,
      enabled: poseRigDisplayMode !== 'none',
    });
  } catch (_) {}
};

function attachIkHandle(handle) {
  if (!handle) return;
  poseIkActiveHandle = handle;
  poseSelection = [];
  posePickedBone = handle.effector || null;
  // Enable ONLY this handle's FABRIK chain so a hand drag can't disturb
  // the feet / torso; every other chain stays frozen at its effector.
  if (poseFabrik) {
    poseFabrik.setChainEnablerAll(false);
    if (handle.hasFabrik) poseFabrik.setChainEnabler(handle.id, true);
  }
  if (currentModel) currentModel.updateMatrixWorld(true);
  syncIkHandleTransforms(true);
  transformControls.attach(handle.target);
  transformControls.setMode('translate');
  gizmoBar.style.display = 'none';
  postToHost({ kind: 'rig-selected-for-transform', rigId: null });
  postToHost({
    kind: 'pose-bone-selected',
    name: handle.effector ? handle.effector.name : handle.id,
    index: handle.effector ? poseBones.indexOf(handle.effector) : -1,
    selection: 1,
    ik: handle.id,
  });
  refreshPoseJointDots();
  refreshIkHandleVisuals();
  updatePoseHud();
  requestRender();
}

function applyActiveIkSolve() {
  if (!poseIkActiveHandle) return;
  const h = poseIkActiveHandle;

  // 0) Re-solve from the pose captured at grab time. FABRIK converges a
  //    little more every frame, so without this the body-lean would keep
  //    creeping toward a full bend whenever the cursor pauses. Restoring
  //    the grab-time quats makes each solve depend only on where the target
  //    is now — the lean stays proportional to the reach, and the analytic
  //    pole below stays stable (no elbow/knee flipping).
  if (poseIkDragCapture) {
    for (const [idx, q] of poseIkDragCapture) {
      const b = poseBones[idx];
      if (b) b.quaternion.set(q[0], q[1], q[2], q[3]);
    }
    if (currentModel) currentModel.updateMatrixWorld(true);
  }

  // 1) FABRIK body-lean — arms carry the clavicle + upper chest toward the
  //    reach; the torso / head handles bend the spine / aim the head. Only
  //    this handle's chain is enabled, so nothing else moves. iters tunes
  //    how far the lean converges (arms lean gently, torso/head reach fully).
  if (h.hasFabrik && poseFabrik) {
    poseFabrik.iterations = Math.max(1, h.iters || 8);
    poseFabrik.update();
    if (currentModel) currentModel.updateMatrixWorld(true);
  }

  // 2) Analytic clean of the last two bones so the elbow / knee lands on a
  //    proper pole and never inverts or hyperextends, even after the lean.
  if (h.twoBone) {
    const target = new THREE.Vector3();
    h.target.getWorldPosition(target);
    solveTwoBoneIk(h.twoBone.a, h.twoBone.b, h.twoBone.c, target);
  }

  if (typeof poseSyncSkeletonMeshes === 'function') poseSyncSkeletonMeshes();
  syncIkHandleTransforms(true);
}

function findRigInScene(root) {
  // Prefer the GAME_RIG deform SkinnedMesh when the freemode glb also
  // carries control_rig / MixamoSrc skins — posing must drive skel.
  let gameRig = null;
  let fallback = null;
  root.traverse(node => {
    if (!node.isSkinnedMesh || !node.skeleton || !node.skeleton.bones.length) return;
    let underGame = false;
    for (let p = node; p; p = p.parent) {
      if ((p.name || '').toUpperCase().includes('GAME_RIG')) { underGame = true; break; }
    }
    if (underGame && !gameRig) gameRig = node;
    else if (!fallback) fallback = node;
  });
  return gameRig || fallback;
}

// Append one rig's bones + joint markers + skeleton overlay to the
// current pose session. Returns the number of bones added (0 if no
// SkinnedMesh found inside the given root). Used by enterPoseMode for
// the primary ped, and by the secondary-load path so adding a second
// character extends the existing session in place instead of
// rebuilding it. Bone-index keys (used by keyframes / history /
// strips) stay stable because new bones are APPENDED to poseBones,
// never inserted or reordered.
function attachRigToPoseSession(rootModel, isPrimary) {
  if (!rootModel) return 0;
  const skinned = findRigInScene(rootModel);
  if (!skinned) return 0;

  const newBones = skinned.skeleton.bones.filter(b => {
    if (b.userData && b.userData.poseHidden) return false;
    const name = b.name || '';
    if (/^FB_|^FACIAL_/i.test(name)) return false;
    if (classifyBoneRegion(name) === 'face') return false;
    return true;
  });
  if (!newBones.length) return 0;

  // Tag each bone with its owning model so future per-rig operations
  // (export, retarget, mirror, per-rig undo, etc.) can disambiguate
  // bones that share a name across primary and secondary skeletons.
  for (const b of newBones) {
    b.userData = b.userData || {};
    b.userData.poseRigRoot = rootModel;
  }

  poseBones.push(...newBones);
  for (const b of newBones) {
    poseInitialQuats.push(b.quaternion.clone());
    poseInitialPositions.push(b.position.clone());
  }

  // Register the rig's auxiliary bones (filtered out of poseBones above /
  // by loadGtaSkeleton's poseHidden flag) so imported clip tracks can
  // still bind to them. Rest is captured NOW — the rig is at bind pose.
  rootModel.updateMatrixWorld(true);
  const auxPattern = /^(RB|MH|PH|IK)_/i;
  for (const b of skinned.skeleton.bones) {
    if (poseBones.includes(b)) continue;
    const nm = b.name || '';
    if (!auxPattern.test(nm)) continue;
    b.userData = b.userData || {};
    if (!b.userData.poseAuxRest) {
      b.userData.poseAuxRest = {
        q: b.quaternion.clone(),
        p: b.position.clone(),
        wq: b.getWorldQuaternion(new THREE.Quaternion()),
      };
    }
    poseAuxBones.push(b);
    if (!poseAuxByName.has(nm)) poseAuxByName.set(nm, b);
    const strippedNm = nm.replace(/_\d+$/, '');
    if (!poseAuxByName.has(strippedNm)) poseAuxByName.set(strippedNm, b);
  }

  // ThighRolls parent to the PELVIS, not the thigh — when nothing drives
  // them they stay behind as the thigh bends and the thigh band tears
  // (the same bones Sollumz special-cases for Blender preview). When no
  // clip track owns them, rigid-follow the thigh's delta-from-rest.
  for (const [rollBase, srcBase] of [
    ['RB_L_ThighRoll', 'SKEL_L_Thigh'],
    ['RB_R_ThighRoll', 'SKEL_R_Thigh'],
  ]) {
    const roll = poseAuxByName.get(rollBase);
    const src = poseBoneByBaseName(srcBase);
    if (!roll || !src || !roll.parent) continue;
    if (poseAuxFollow.some(f => f.bone === roll)) continue;
    poseAuxFollow.push({
      bone: roll,
      src,
      boneRestW: roll.userData.poseAuxRest.wq.clone(),
      srcRestW: src.getWorldQuaternion(new THREE.Quaternion()),
    });
  }

  // Rig overlay (line segments between parent/child bones). Primary
  // claims poseSkeletonHelper for back-compat with single-rig code
  // paths; extras land in poseExtraSkeletonHelpers so exitPoseMode
  // disposes them all. Hidden in control-rig display mode.
  const helper = new THREE.SkeletonHelper(skinned);
  helper.material.depthTest = false;
  helper.material.transparent = true;
  helper.material.opacity = 0.55;
  helper.material.linewidth = 2;
  helper.visible = (poseRigDisplayMode === 'markers');
  scene.add(helper);
  if (isPrimary) poseSkeletonHelper = helper;
  else poseExtraSkeletonHelpers.push(helper);

  // Per-bone joint click targets, sized to the model's bounding box
  // so a tall mech and a short cat both get readable marker spheres.
  const box = new THREE.Box3().setFromObject(rootModel);
  const radius = box.getSize(new THREE.Vector3()).length() * 0.5;
  const newHandles = buildPoseJointHandles(newBones, radius);
  poseJointHandles.push(...newHandles);

  // Rebuild FiveOS IK handles against the full bone list.
  buildFiveOsIkHandles();
  applyPoseRigDisplay();

  return newBones.length;
}

// Stable identifier for whichever root a bone was attached from.
// Returns 'primary' / 'secondary' for ped slots, falls back to the
// root's display name otherwise. The host outliner groups bones by
// this so the Blender-style hierarchy reads as
// "Primary > bones / Secondary > bones".
function rigIdFor(rootModel) {
  if (!rootModel) return 'primary';
  if (rootModel === currentModel) return 'primary';
  if (rootModel === secondaryPed) return 'secondary';
  return rootModel.name || 'rig';
}

// Derive a human-readable label for a rig root. The outliner shows
// this verbatim, so prefer an explicit displayName stashed by the
// loader, then strip GTA preset prefixes / file extensions off the
// raw object name so "GtaFreemodePreset_mp_m_freemode_01" reads as
// "mp_m_freemode_01" and "ig_floyd.glb" reads as "ig_floyd".
function rigDisplayNameFor(rootModel) {
  if (!rootModel) return 'Rig';
  const explicit = rootModel.userData && rootModel.userData.displayName;
  if (explicit) return explicit;
  let raw = rootModel.name || '';
  raw = raw.replace(/^Gta(?:Freemode|Skeleton)(?:Preset|Secondary)_/, '');
  raw = raw.replace(/\.(glb|gltf|fbx|obj)$/i, '');
  raw = raw.trim();
  return raw || 'Rig';
}

// Resolve a rigId to the actual root model. Used by the host's
// "click a rig in the outliner" path so the gizmo can attach to
// the right object for move / rot / scale.
function rigRootForId(id) {
  if (id === 'primary' || id === '') return currentModel;
  if (id === 'secondary') return secondaryPed;
  // Fallback for future rigs (third pose targets, named props):
  // walk the scene looking for a root whose effective rig id matches.
  if (currentModel && rigIdFor(currentModel) === id) return currentModel;
  if (secondaryPed && rigIdFor(secondaryPed) === id) return secondaryPed;
  return null;
}

// Blender-style "Object mode" for a rig: pull the gizmo off any
// selected bone, attach it to the rig's root, and switch to free
// translate / rotate / scale on the whole model. The outliner's
// rig-row click handler calls this; clicking a bone afterwards
// flips back to pose-rotate via attachPoseBone.
window.selectRigForTransform = function (rigId) {
  const root = rigRootForId(rigId);
  if (!root) {
    fosTelemetry.warn('system', 'selectRigForTransform: no root for rigId', { rigId });
    return false;
  }
  // Drop any active bone selection so the gizmo doesn't bounce
  // between bone-rotate and model-translate state.
  poseSelection = [];
  posePickedBone = null;
  transformControls.detach();
  // Same size logic as the 3D model viewer (maxDim * 0.6).
  updateGizmoSizeFromModel();
  transformControls.attach(root);
  transformControls.setMode('translate');
  gizmoBar.style.display = 'flex';
  refreshPoseJointDots();
  postToHost({ kind: 'rig-selected-for-transform', rigId });
  requestRender();
  return true;
};

// Step back out of model-transform mode without picking a bone.
window.deselectRigTransform = function () {
  transformControls.detach();
  gizmoBar.style.display = 'none';
  updateGizmoSizeFromModel();
  refreshPoseJointDots();
  postToHost({ kind: 'rig-selected-for-transform', rigId: null });
  requestRender();
};

// Send the current bone list to the host so the outliner refreshes.
// Used both when entering pose mode and when a secondary ped joins
// the session — same wire format either way. Each bone carries its
// owning rig's id so the host can build the nested outliner tree
// without a separate lookup pass.
function postPoseModeEntered() {
  // Re-scan secondary-motion bones every time the bone array changes
  // (initial enter, secondary-ped attach) so follow-through covers the
  // newly-loaded skeleton. Cheap — name regex over ~80 bones.
  poseDetectSecondaryBones();
  poseSecondaryReset();
  // Onion-skin pair list mirrors the bone array; rebuild when the
  // skeleton changes so the line-segment indices stay valid.
  poseBuildOnionSkin();
  // Build the rigs list from the unique root models referenced by
  // the bone array. Primary first, then any secondary, then anything
  // else (future extensions like props or third peds).
  const rigOrder = [];
  const seen = new Set();
  for (const b of poseBones) {
    const root = b.userData && b.userData.poseRigRoot;
    const id = rigIdFor(root);
    if (!seen.has(id)) {
      seen.add(id);
      rigOrder.push({ id, name: rigDisplayNameFor(root) });
    }
  }
  postToHost({
    kind: 'pose-mode-entered',
    rigs: rigOrder,
    bones: poseBones.map((b, i) => ({
      index: i,
      name: b.name || ('bone_' + i),
      parent: b.parent && b.parent.isBone ? (b.parent.name || '') : '',
      rigId: rigIdFor(b.userData && b.userData.poseRigRoot),
    })),
  });
}

window.enterPoseMode = function () {
  if (!currentModel) {
    postToHost({ kind: 'pose-error', message: 'No model loaded. Open a rigged .glb / .fbx first.' });
    return;
  }
  if (poseMode) return;  // idempotent

  const skinned = findRigInScene(currentModel);
  if (!skinned) {
    postToHost({ kind: 'pose-error', message: 'No skeleton found in the loaded model. Pose mode needs a rigged .glb / .fbx (SkinnedMesh with bones).' });
    return;
  }

  poseMode = true;
  // Sub-mesh selection is a prop-authoring tool; drop it entering pose mode
  // so its overlays/chip never linger over the rig.
  resetSubMeshSelection();
  propAnimShow(false);
  disableHdriLighting();
  // Same gizmo size logic as the 3D model viewer: world cap = 60% of the
  // model's largest dimension, screen-constant up close via
  // updateGizmoWorldSize(). Pose mode only changes the attach target
  // (bone vs root), not the sizing formula.
  updateGizmoSizeFromModel();

  // Reset per-rig accumulators before attaching, so re-entry after
  // exitPoseMode starts from clean state regardless of any leftover
  // refs (exitPoseMode also clears these, but being explicit is
  // defensive against a future caller skipping the exit path).
  poseBones = [];
  poseInitialQuats = [];
  poseInitialPositions = [];
  poseAuxBones = [];
  poseAuxByName = new Map();
  poseAuxFollow = [];
  poseJointHandles = [];
  poseInvalidateBoneNameMap();

  attachRigToPoseSession(currentModel, true);
  // Co-pose: if a secondary ped is already in the scene when pose mode
  // boots, light her up at the same time so the user doesn't have to
  // click "Add Ped B" again to get joint markers on her.
  if (secondaryPed) attachRigToPoseSession(secondaryPed, false);

  // Force gizmo into rotate mode and hide the scale/translate buttons
  // in the overlay — the host owns mode selection in pose mode (rotate
  // is the only meaningful op on a bone pivot).
  transformControls.detach();
  transformControls.setMode('rotate');
  gizmoBar.style.display = 'none';

  // Reset per-session pose-editing state: clear any prior selection /
  // history / axis lock so opening a new rig starts from a clean slate.
  poseSelection = [];
  poseHistory.length = 0;
  poseRedoStack.length = 0;
  axisLockMask = { x: true, y: true, z: true };
  applyAxisLockToGizmo();
  updatePoseHud();

  postPoseModeEntered();
  fosTelemetry.info('system', `pose mode entered: ${poseBones.length} bones`);
  _posePaintPending = true;   // host holds its boot splash until 'pose-painted'
  requestRender();
};

window.exitPoseMode = function () {
  if (!poseMode) return;
  poseMode = false;
  enableHdriLighting();

  updateGizmoSizeFromModel();

  transformControls.detach();
  if (poseSkeletonHelper) {
    scene.remove(poseSkeletonHelper);
    poseSkeletonHelper.dispose && poseSkeletonHelper.dispose();
    poseSkeletonHelper = null;
  }
  // Dispose any extra rig overlays attached for secondary peds.
  for (const h of poseExtraSkeletonHelpers) {
    scene.remove(h);
    if (h.dispose) h.dispose();
  }
  poseExtraSkeletonHelpers = [];
  disposeControlRigWidgets();
  disposeIkHandles();
  disposeBoneLines();
  // Joint handles are now Groups (fat cased wires) + mesh pickers. Traverse
  // each to dispose geometries (shared → dedup via Set) and every material.
  const disposedGeoms = new Set();
  for (const h of poseJointHandles) {
    if (h.parent) h.parent.remove(h);
    h.traverse(o => {
      if (o.geometry && !disposedGeoms.has(o.geometry)) { o.geometry.dispose(); disposedGeoms.add(o.geometry); }
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m && m.dispose());
    });
  }
  _fatMats.length = 0;   // all fat-line materials were pose-session-scoped
  poseJointHandles = [];
  poseBones = [];
  poseInitialQuats = [];
  poseInitialPositions = [];
  poseAuxBones = [];
  poseAuxByName = new Map();
  poseAuxFollow = [];
  poseInvalidateBoneNameMap();
  posePickedBone = null;
  // Wipe per-session editing state too — selection/history/axis-lock
  // are bound to specific bone indices, so a rig swap invalidates them.
  poseSelection = [];
  poseHistory.length = 0;
  poseRedoStack.length = 0;
  axisLockMask = { x: true, y: true, z: true };
  applyAxisLockToGizmo();
  updatePoseHud();
  // Wipe timeline state too -- keyframes captured against a previous rig
  // hold bone-index references that no longer point at anything valid.
  poseKeyframes = [];
  poseKeyframeSource = null;
  poseBoneSpace = 'glb';
  // History entries hold bone indices from the old rig — popping them
  // against the new one would corrupt the pose. Drop + tell the host.
  poseClearHistory('rig-changed');
  poseTime = 0;
  posePlaying = false;
  fosTelemetry.info('system', 'pose mode exited');
  postToHost({ kind: 'pose-mode-exited' });
  postToHost({ kind: 'pose-timeline-update', keyframes: [], time: 0, duration: poseDuration, fps: poseFps, playing: false });
  requestRender();
};

window.resetPose = function () {
  if (!poseMode) return;
  // Snapshot before/after so reset is undoable. We only push a history
  // entry when the pose actually differs from bind — otherwise reset
