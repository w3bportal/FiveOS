    if (k.root) rootMax = Math.max(rootMax, Math.hypot(k.root[0], k.root[1], k.root[2]));
  }
  fosTelemetry.info('timeline', `imported ${rebuilt.length} keyframe(s)`, {
    droppedBones, duration: poseDuration, fps: poseFps,
    hasRoot, rootTravel: +rootMax.toFixed(3), rootTarget: poseRootTarget ? (poseRootTarget.name || 'model') : 'none',
  });
  if (!silent) {
    postToHost({
      kind: 'pose-timeline-update',
      keyframes: rebuilt.map(k => k.time),
      time: 0, duration: poseDuration, fps: poseFps, playing: false,
    });
  }
  // Skeleton overlay + bone-tree are opt-in diagnostics (window.setSkeletonOverlay /
  // window.showBoneTree), NOT shown on every import — keep the preview clean.
  requestRender();
  return rebuilt.length;
};

// Fast path for .ycd / FBX imports: per-bone quaternion arrays instead of
// per-frame keyframe objects (10–50× smaller JSON, skips setKeyframes+bake).
function buildClipFromBoneTracks(payload, clipName) {
  if (!poseBones.length || !payload?.tracks?.length) return null;
  const nameMap = poseBuildBoneNameMap();
  let frameCount = 0;
  for (const tr of payload.tracks)
    frameCount = Math.max(frameCount, tr.q?.length || 0, tr.p?.length || 0);
  if (frameCount < 2) return null;
  const duration = typeof payload.duration === 'number' ? payload.duration : 0;
  const times = new Float32Array(frameCount);
  for (let f = 0; f < frameCount; f++)
    times[f] = frameCount > 1 ? (f / (frameCount - 1)) * duration : 0;

  const tracks = [];
  for (const tr of payload.tracks) {
    if (!tr?.name || !Array.isArray(tr.q) || tr.q.length < 2) continue;
    const idx = nameMap.get(tr.name);
    const bone = idx != null ? poseBones[idx] : null;
    if (!bone?.name) continue;
    const values = new Float32Array(tr.q.length * 4);
    for (let i = 0; i < tr.q.length; i++) {
      const q = tr.q[i];
      if (!Array.isArray(q) || q.length < 4) continue;
      values[i * 4] = q[0];
      values[i * 4 + 1] = q[1];
      values[i * 4 + 2] = q[2];
      values[i * 4 + 3] = q[3];
    }
    tracks.push(new THREE.QuaternionKeyframeTrack(`${bone.name}.quaternion`, times, values));
  }
  if (!tracks.length && !payload.tracks.some(t => Array.isArray(t.p) && t.p.length >= 2)) return null;
  const animClip = new THREE.AnimationClip((clipName || '').trim() || 'imported', duration, tracks);
  // Keep the source arrays for playback — THREE track sampling is flaky on
  // skinned GLTF rigs; poseApplyRawTracksAtTime reads these directly.
  animClip.userData = animClip.userData || {};
  animClip.userData.rawTracks = payload.tracks;
  return animClip;
}

window.importBoneTracksAsClip = function (payloadOrJson, clipName) {
  if (!poseMode) return { ok: false, reason: 'pose-mode-inactive' };
  let payload = payloadOrJson;
  if (typeof payload === 'string') {
    try { payload = JSON.parse(payload); }
    catch (e) { return { ok: false, reason: 'bad-json', msg: String(e) }; }
  }
  if (!payload || !Array.isArray(payload.tracks) || payload.tracks.length === 0)
    return { ok: false, reason: 'no-tracks' };

  let frameCount = 0;
  for (const tr of payload.tracks)
    frameCount = Math.max(frameCount, tr.q?.length || 0, tr.p?.length || 0);
  if (frameCount < 2) return { ok: false, reason: 'need-frames', count: frameCount };

  // ── Normalize .ycd / bone-track imports onto the pose rig ───────────
  // Rotations: root = rest∘qNative; body bones = raw native absolutes
  // (compose double-rotated — FK-verified 2026-07-16).
  // Positions: RAGE Z-up absolutes ≠ freemode rest. Subtracting rest left
  // hips pinned. Rotate p by bone restQ, then frame-0 deltas (players do
  // rest+delta). Entity travel comes from payload.root (YCD Track 5).
  //
  // Anim-import (Mixamo / mocap retarget): quats are Assimp GAME_RIG
  // locals. Assimp RestRot ≠ THREE poseInitialQuats for the same freemode
  // glb — applying Assimp locals raw melts the ped. Rebase first:
  //   qThree = poseInitial * inverse(assimpBind) * qAssimp
  const wasNative = payload.boneSpace === 'native'
    || payload.source === 'ycd-import';
  const needsAssimpRebase = (payload.source === 'anim-import'
      || payload.boneSpace === 'assimp')
    && payload.assimpBind
    && typeof payload.assimpBind === 'object';
  if (!payload.__normalized) {
    payload.__normalized = true;
    const nameMap = poseBuildBoneNameMap();
    const restQ = new THREE.Quaternion();
    const qN = new THREE.Quaternion();
    const qOut = new THREE.Quaternion();
    const invBind = new THREE.Quaternion();
    const v = new THREE.Vector3();
    let rebased = 0;

    if (needsAssimpRebase) {
      const kept = [];
      for (const tr of payload.tracks) {
        if (!tr?.name || !Array.isArray(tr.q) || tr.q.length < 1) continue;
        const idx = nameMap.get(tr.name);
        if (idx == null || !poseInitialQuats[idx]) continue;
        // Never drive feet/toes from Assimp retarget — freemode skin spikes.
        const baseName = tr.name.replace(/_\d+$/, '');
        if (/Foot|Toe/i.test(baseName)) continue;
        const bind = payload.assimpBind[tr.name] || payload.assimpBind[baseName];
        // No Assimp bind → leave bone at THREE rest (do NOT apply Assimp raw).
        if (!Array.isArray(bind) || bind.length < 4) continue;
        invBind.set(bind[0], bind[1], bind[2], bind[3]).normalize().invert();
        restQ.copy(poseInitialQuats[idx]);
        tr.q = tr.q.map(q => {
          if (!Array.isArray(q) || q.length < 4) return q;
          qN.set(q[0], q[1], q[2], q[3]).normalize();
          // Drop degenerate quats (NaN / near-zero) — they spike the mesh.
          const len = Math.hypot(q[0], q[1], q[2], q[3]);
          if (!Number.isFinite(len) || len < 1e-6) {
            return [restQ.x, restQ.y, restQ.z, restQ.w];
          }
          qOut.copy(restQ).multiply(invBind).multiply(qN);
          return [qOut.x, qOut.y, qOut.z, qOut.w];
        });
        kept.push(tr);
        rebased++;
      }
      payload.tracks = kept;
      fosTelemetry.info('timeline', 'assimp→three bone rebase', {
        rebased, bindKeys: Object.keys(payload.assimpBind).length,
      });
    }

    for (const tr of payload.tracks) {
      if (!tr?.name) continue;
      const idx = nameMap.get(tr.name);
      const aux = idx == null
        ? (poseAuxByName.get(tr.name) || poseAuxByName.get(tr.name.replace(/_\d+$/, '')))
        : null;
      if (idx == null && !aux) continue;
      const isRoot = tr.name.replace(/_\d+$/, '') === 'SKEL_ROOT';
      const boneRestQ = idx != null ? poseInitialQuats[idx]
        : (aux?.userData?.poseAuxRest?.q || null);

      // YCD native root only — anim-import skips SKEL_ROOT entirely.
      if (wasNative && isRoot && boneRestQ) {
        restQ.copy(boneRestQ);
        if (Array.isArray(tr.q)) {
          tr.q = tr.q.map(q => {
            if (!Array.isArray(q) || q.length < 4) return q;
            qN.set(q[0], q[1], q[2], q[3]);
            qOut.copy(restQ).multiply(qN);
            return [qOut.x, qOut.y, qOut.z, qOut.w];
          });
        }
      }

      if (Array.isArray(tr.p) && tr.p.length >= 2) {
        // Only SKEL_ROOT.p is world-ish — rotate by restQ (Z-up→Y-up bake).
        // Pelvis/limb positions are parent-local; rotating by the bone's own
        // rest quat scrambles them and pins the hips.
        if (wasNative && isRoot && boneRestQ) {
          restQ.copy(boneRestQ);
          tr.p = tr.p.map(p => {
            if (!Array.isArray(p) || p.length < 3) return p;
            v.set(p[0], p[1], p[2]).applyQuaternion(restQ);
            return [v.x, v.y, v.z];
          });
        }
        const p0 = tr.p[0];
        if (Array.isArray(p0) && p0.length >= 3) {
          tr.p = tr.p.map(p => {
            if (!Array.isArray(p) || p.length < 3) return p;
            return [p[0] - p0[0], p[1] - p0[1], p[2] - p0[2]];
          });
        }
      }
    }
    payload.boneSpace = 'glb';
  }

  // Entity mover: prefer payload.root (Track 5). Fallback: root/pelvis.p
  // deltas when the pack baked travel into bone-local instead of mover.
  let rootTravel = null;
  let boneLocalMoverName = null;
  if (Array.isArray(payload.root) && payload.root.length >= 2) {
    rootTravel = payload.root.map(p =>
      Array.isArray(p) && p.length >= 3 ? [p[0], p[1], p[2]] : [0, 0, 0]);
  } else {
    let src = payload.tracks.find(t => (t.name || '').replace(/_\d+$/, '') === 'SKEL_ROOT');
    if (!src || !Array.isArray(src.p) || src.p.length < 2)
      src = payload.tracks.find(t => (t.name || '').replace(/_\d+$/, '') === 'SKEL_Pelvis');
    if (src && Array.isArray(src.p) && src.p.length >= 2) {
      let maxH = 0;
      for (const p of src.p) {
        if (Array.isArray(p) && p.length >= 3)
          maxH = Math.max(maxH, Math.hypot(p[0], p[2]));
      }
      if (maxH > 0.001) {
        rootTravel = src.p.map(p => Array.isArray(p) && p.length >= 3 ? [p[0], p[1], p[2]] : [0, 0, 0]);
        boneLocalMoverName = (src.name || '').replace(/_\d+$/, '');
      }
    }
  }

  const rtBones = [];
  for (const tr of payload.tracks) {
    if (!tr?.name) continue;
    const hasQ = Array.isArray(tr.q) && tr.q.length >= 2;
    // When travel was lifted from this bone's .p onto the model mover,
    // drop bone .p so we don't apply the same delta twice.
    const stripP = boneLocalMoverName
      && (tr.name || '').replace(/_\d+$/, '') === boneLocalMoverName;
    const hasP = !stripP && Array.isArray(tr.p) && tr.p.length >= 2;
    if (hasQ || hasP)
      rtBones.push({ name: tr.name, q: hasQ ? tr.q : undefined, p: hasP ? tr.p : undefined });
  }
  if (!rtBones.length) return { ok: false, reason: 'no-bones-matched' };

  const trimmed = (clipName || '').trim() || generatePoseClipName();
  if (typeof payload.duration === 'number') poseDuration = Math.max(0.1, Math.min(60, payload.duration));
  if (typeof payload.fps === 'number') poseFps = Math.max(1, Math.min(120, Math.round(payload.fps)));
  if (typeof payload.source === 'string' && payload.source) poseKeyframeSource = payload.source;
  if (typeof payload.boneSpace === 'string' && payload.boneSpace) poseBoneSpace = payload.boneSpace;
  // Default the preview to in-place unless the payload asks to travel. Payloads
  // without the field (older/editor clips) keep the legacy travelling behaviour.
  poseRootMotionPreview = payload.rootPreview !== false;
  poseKeyframes = [];
  poseClearHistory('clip-import');

  poseRootTarget = currentModel || null;
  if (poseRootTarget) {
    poseRootTarget.userData = poseRootTarget.userData || {};
    if (!poseRootTarget.userData._poseBasePos)
      poseRootTarget.userData._poseBasePos = poseRootTarget.position.clone();
    poseRootBase = poseRootTarget.userData._poseBasePos.clone();
    if (!poseRootTarget.userData._poseBaseQuat)
      poseRootTarget.userData._poseBaseQuat = poseRootTarget.quaternion.clone();
    poseRootBaseQuat = poseRootTarget.userData._poseBaseQuat;
    poseApplyRootYaw(null);   // clear any stale heading before the spin read below
  } else {
    poseRootBase = null;
    poseRootBaseQuat = null;
  }

  // Spin mover deltas into the model frame (male freemode is 180°). Store
  // the spun roots on the clip so strip scrub / export match rt playback.
  let rootsForClip = null;
  if (rootTravel && rootTravel.length >= 2) {
    const spin = poseRootTarget ? poseRootTarget.quaternion : null;
    const v = new THREE.Vector3();
    const n = rootTravel.length;
    const dur = poseDuration || 0;
    rootsForClip = rootTravel.map((p, i) => {
      let x = 0, y = 0, z = 0;
      if (Array.isArray(p) && p.length >= 3) {
        if (spin) {
          v.set(p[0], p[1], p[2]).applyQuaternion(spin);
          x = v.x; z = v.z; // flatten Y — same as rtLoad
        } else {
          x = p[0]; y = p[1]; z = p[2];
        }
      }
      return { t: n > 1 ? (i / (n - 1)) * dur : 0, v: [x, y, z] };
    });
  }

  // rtLoad stops + resets only after bones match — keep prior pose on failure.
  // Anim-import / ycd library previews already author feet for freemode;
  // viewer foot-plant IK yanks foot.position in parent space, balloons
  // ankles/heels, and a throw mid-_rtApply used to kill the play RAF.
  const allowFootPlant = payload.source !== 'anim-import'
    && payload.source !== 'ycd-import'
    && payload.footPlant !== false;
  let rtResult;
  try {
    rtResult = JSON.parse(window.rtLoad({
      fps: payload.fps || poseFps,
      frames: frameCount,
      duration: poseDuration,
      loop: poseLoop,
      timelineSync: true,
      followCam: true,
      root: rootTravel,
      modelRoot: poseRootTarget,
      bones: rtBones,
      footPlant: allowFootPlant,
    }));
  } catch (e) {
    return { ok: false, reason: 'rt-load-failed', msg: String(e && e.message ? e.message : e) };
  }
  if (!rtResult.ok) return { ok: false, reason: 'no-bones-matched', matched: rtResult.matched || 0 };

  let clipId = null;
  const clip = buildClipFromBoneTracks(payload, trimmed);
  if (clip) {
    clipId = registerClip(trimmed, 'imported', clip, {
      source: poseKeyframeSource || 'ycd-import',
      boneSpace: poseBoneSpace || 'glb',
      sourceData: payload,
      roots: rootsForClip,
    });
    window.poseAddStrip(clipId, 0);
  }

  poseTime = 0;
  posePlaying = false;
  requestRender();
  postToHost({
    kind: 'pose-timeline-update',
    keyframes: [], time: 0, duration: poseDuration, fps: poseFps, playing: false,
  });
  fosTelemetry.info('timeline', 'imported bone-tracks clip (rt driver)', {
    matched: rtResult.matched, frames: frameCount, duration: poseDuration,
  });
  return {
    ok: true, clipId, tracks: rtResult.matched,
    frames: frameCount, duration: poseDuration, driver: 'rt',
  };
};

// Import dense animation data straight into a clip strip — never floods the
// host keyframe lane with hundreds of diamonds. Returns {ok, clipId, ...}.
// Library / .ycd → EDITABLE keyframes (2026-07-17): run the full clip import
// (its normalization handles assimp AND ycd-native spaces and builds the root
// travel), then convert the normalized per-frame tracks into pose keyframes
// and drop the strip + _rt player so nothing outranks the keys.
window.importBoneTracksAsEditableKeys = function (payload, clipName) {
  // Snapshot FIRST: importBoneTracksAsClip wipes poseKeyframes before it can
  // fail, so a single bad clip while browsing the library used to leave a
  // dead A-pose timeline with nothing to play. Any failure restores.
  const prevKeys = poseKeyframes, prevDur = poseDuration, prevFps = poseFps,
        prevSrc = poseKeyframeSource, prevSpace = poseBoneSpace;
  const restorePrev = () => {
    poseSquelchTimelineEcho = false;
    try {
      poseKeyframes = prevKeys; poseDuration = prevDur; poseFps = prevFps;
      poseKeyframeSource = prevSrc; poseBoneSpace = prevSpace;
      poseEvaluate(Math.min(poseTime, poseDuration));
      requestRender();
    } catch (e) {}
  };
  let res;
  // Squelch the clip importer's intermediate timeline echoes (empty-keys
  // update, temp-strip grow). Browsing the library used to blast 3-4 stale
  // states per click at the WPF timeline — the axis/bars flicker.
  poseSquelchTimelineEcho = true;
  try { res = window.importBoneTracksAsClip(payload, clipName); }
  catch (e) { res = { ok: false, reason: 'exception', msg: String(e && e.message ? e.message : e) }; }
  if (!res || !res.ok) { poseSquelchTimelineEcho = false; restorePrev(); return res || { ok: false, reason: 'import-failed' }; }
  try {
    try { if (typeof window.rtStop === 'function') window.rtStop(); } catch (e) {}
    try { if (_rt) { _rt.playing = false; _rt.timelineSync = false; } } catch (e) {}
    try { poseStrips.splice(0, poseStrips.length); } catch (e) {}
    // The clip importer registers a poseClips entry per import; the editable
    // path strips it right back out, so without this the Clips panel
    // accumulates a dead row per browsed library clip.
    try { poseClips.splice(0, poseClips.length); } catch (e) {}
    try { if (typeof postStripsUpdate === 'function') postStripsUpdate(); } catch (e) {}

    const tracks = payload.tracks || [];
    const fps = Math.max(1, Math.min(120, payload.fps || 30));
    const nameMap = poseBuildBoneNameMap();
    let frames = 0;
    for (const tr of tracks) frames = Math.max(frames, (tr.q && tr.q.length) || 0);
    if (frames < 1) { restorePrev(); return { ok: false, reason: 'no-frames' }; }

    const built = [];
    for (let f = 0; f < frames; f++) {
      const snap = [];
      for (const tr of tracks) {
        if (!tr || !tr.name || !Array.isArray(tr.q) || !tr.q.length) continue;
        const idx = nameMap.get(tr.name);
        if (idx == null) continue;
        const q = tr.q[Math.min(f, tr.q.length - 1)];
        if (Array.isArray(q) && q.length >= 4) snap.push({ i: idx, q: [q[0], q[1], q[2], q[3]] });
      }
      let root = null;
      if (Array.isArray(payload.root) && payload.root.length) {
        const rv = payload.root[Math.min(f, payload.root.length - 1)];
        if (Array.isArray(rv) && rv.length >= 3) root = [+rv[0] || 0, +rv[1] || 0, +rv[2] || 0];
      }
      // Mover heading (.ycd Track 6) — radians about world up, frame-0
      // relative. Turning clips slide without it.
      let yaw = null;
      if (Array.isArray(payload.rootYaw) && payload.rootYaw.length) {
        const yv = +payload.rootYaw[Math.min(f, payload.rootYaw.length - 1)];
        if (isFinite(yv)) yaw = yv;
      }
      const key = { time: +(f / fps).toFixed(3), bones: snap, root, yaw, ease: 'linear' };
      poseEnsureKeyId(key);
      built.push(key);
    }
    if (!built.length) { restorePrev(); return { ok: false, reason: 'no-keys' }; }
    poseKeyframes = built;
    poseKeyframeSource = 'anim-import';
    poseBoneSpace = 'glb';   // tracks were normalized to glb space by the clip import
    poseDuration = Math.max(0.1, Math.min(60, (frames - 1) / fps));
    poseFps = fps;
    poseTime = 0;
    poseEvaluate(0);
    // Final state is committed — this ONE echo is the import's announcement.
    poseSquelchTimelineEcho = false;
    postToHost({
      kind: 'pose-timeline-update',
      keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })),
      keyIds: poseKeyframes.map(k => k.id),
      time: poseTime, duration: poseDuration, fps: poseFps,
      playing: posePlaying, loop: poseLoop,
    });
    requestRender();
    return { ok: true, matched: tracks.length, frames };
  } catch (e) {
    restorePrev();
    return { ok: false, reason: 'exception', msg: String(e && e.message ? e.message : e) };
  }
};

window.importKeyframesAsClip = function (payloadOrJson, clipName) {
  if (!poseMode) return { ok: false, reason: 'pose-mode-inactive' };
  let payload = payloadOrJson;
  if (typeof payload === 'string') {
    try { payload = JSON.parse(payload); }
    catch (e) { return { ok: false, reason: 'bad-json', msg: String(e) }; }
  }
  if (!payload) return { ok: false, reason: 'empty-payload' };
  if (payload.format === 'bone-tracks' && Array.isArray(payload.tracks))
    return window.importBoneTracksAsClip(payload, clipName);
  if (!Array.isArray(payload.keyframes) || payload.keyframes.length < 2) {
    return { ok: false, reason: 'need-keyframes', count: payload?.keyframes?.length || 0 };
  }
  const n = window.setKeyframes(payload, { silent: true });
  if (!n || n < 2) return { ok: false, reason: 'set-keyframes-failed', count: n || 0 };
  const hasBones = poseKeyframes.some(k => k.bones && k.bones.length > 0);
  if (!hasBones) return { ok: false, reason: 'no-bones-matched', count: n };
  try {
    const clipId = window.poseBakeToClip((clipName || '').trim() || undefined, {
      sourceData: payload,
    });
    const c = poseClips.find(x => x.id === clipId);
    const trackCount = c?.clip?.tracks?.length || 0;
    return { ok: true, clipId, keyframes: n, duration: poseDuration, tracks: trackCount };
  } catch (e) {
    return { ok: false, reason: 'bake-failed', msg: String(e && e.message ? e.message : e) };
  }
};

// Quaternion slerp helper (operates on plain [x,y,z,w] arrays).
function poseSlerp(a, b, t) {
  let ax = a[0], ay = a[1], az = a[2], aw = a[3];
  let bx = b[0], by = b[1], bz = b[2], bw = b[3];
  // Shortest-arc: flip b if the dot is negative.
  let dot = ax * bx + ay * by + az * bz + aw * bw;
  if (dot < 0) { bx = -bx; by = -by; bz = -bz; bw = -bw; dot = -dot; }
  if (dot > 0.9995) {
    // Nearly parallel — linear with renorm avoids the sin(0)/0.
    const x = ax + t * (bx - ax), y = ay + t * (by - ay),
          z = az + t * (bz - az), w = aw + t * (bw - aw);
    const n = Math.hypot(x, y, z, w) || 1;
    return [x / n, y / n, z / n, w / n];
  }
  const theta = Math.acos(dot);
  const s = Math.sin(theta);
  const k0 = Math.sin((1 - t) * theta) / s;
  const k1 = Math.sin(t * theta) / s;
  return [ax * k0 + bx * k1, ay * k0 + by * k1, az * k0 + bz * k1, aw * k0 + bw * k1];
}

// ─── Spherical-cubic (SQUAD) interpolation primitives ───
// Hamilton quaternion product (a * b). [x,y,z,w] convention matches three.js.
function poseQuatMul(a, b) {
  const ax = a[0], ay = a[1], az = a[2], aw = a[3];
  const bx = b[0], by = b[1], bz = b[2], bw = b[3];
  return [
    aw * bx + ax * bw + ay * bz - az * by,
    aw * by - ax * bz + ay * bw + az * bx,
    aw * bz + ax * by - ay * bx + az * bw,
    aw * bw - ax * bx - ay * by - az * bz,
  ];
}
// Conjugate / inverse of a unit quaternion.
function poseQuatInv(q) { return [-q[0], -q[1], -q[2], q[3]]; }
// log(q) for unit quaternion q -> pure quat [vx, vy, vz, 0].
function poseQuatLog(q) {
  const v = Math.hypot(q[0], q[1], q[2]);
  if (v < 1e-8) return [0, 0, 0, 0];
  const a = Math.atan2(v, q[3]) / v;
  return [q[0] * a, q[1] * a, q[2] * a, 0];
}
// exp(q) for pure quat q=[vx,vy,vz,0] -> unit quaternion.
function poseQuatExp(q) {
  const v = Math.hypot(q[0], q[1], q[2]);
  if (v < 1e-8) return [0, 0, 0, 1];
  const s = Math.sin(v) / v;
  return [q[0] * s, q[1] * s, q[2] * s, Math.cos(v)];
}
// SQUAD intermediate control quat for the middle key given its neighbors.
// s_i = q_i * exp( -(log(q_i^-1 * q_{i-1}) + log(q_i^-1 * q_{i+1})) / 4 )
function poseQuatIntermediate(qPrev, qCur, qNext) {
  // Force shortest-arc against qCur so log() picks the geodesic that the
  // neighbouring slerp will travel — without this, a key on the far side
  // of the hypersphere makes the in-between snap.
  const align = (q) => {
    const d = q[0] * qCur[0] + q[1] * qCur[1] + q[2] * qCur[2] + q[3] * qCur[3];
    return d < 0 ? [-q[0], -q[1], -q[2], -q[3]] : q;
  };
  const p = align(qPrev), n = align(qNext);
  const inv = poseQuatInv(qCur);
  const lp = poseQuatLog(poseQuatMul(inv, p));
  const ln = poseQuatLog(poseQuatMul(inv, n));
  const avg = [-(lp[0] + ln[0]) / 4, -(lp[1] + ln[1]) / 4, -(lp[2] + ln[2]) / 4, 0];
  return poseQuatMul(qCur, poseQuatExp(avg));
}
// Spherical-cubic interpolation: smooths the tangent at every keyframe
// so a 3-key arc no longer reads as two straight slerp lines meeting
// at a kink. Falls back to slerp at boundaries when no useful s1/s2
// could be computed.
function poseSquad(q1, q2, s1, s2, t) {
  const c = poseSlerp(q1, q2, t);
  const d = poseSlerp(s1, s2, t);
  return poseSlerp(c, d, 2 * t * (1 - t));
}

// ─── Onion-skinning (ghost rigs at prev/next keys) ───
// Renders a translucent line skeleton at the previous and next
// keyframes around the scrubber so the user can see, while posing
// the in-between frame, where their pose is coming from and where
// it's going to. The "ghost frames" technique is standard across
// 2D and 3D animation authoring tools.
//
// Two LineSegments objects (one per neighbour) reuse a per-bone pair
// list built once at pose-mode entry. Each scrub or playback tick
// temporarily swaps the live skeleton's quaternions to the snapshot,
// reads world positions, restores the live state, and uploads new
// vertices to the ghost geometry. ~6k matrix ops per update for an
// 80-bone rig — comfortably under one frame at 60Hz.
let onionSkinEnabled = true;
let onionPrev = null;
let onionNext = null;
let onionPairs = [];   // [{ child: boneIdx, parent: boneIdx }]
const ONION_PREV_COLOR = 0xFF6B47;   // warm orange-red — "where we came from"
const ONION_NEXT_COLOR = 0x55D6BE;   // cool teal       — "where we're heading"

function poseBuildOnionSkin() {
  // Tear down any prior helpers — pose-mode re-entry rebuilds the
  // bone list, so the index pairs would otherwise dangle.
  if (onionPrev) { scene.remove(onionPrev); onionPrev.geometry.dispose(); onionPrev.material.dispose(); onionPrev = null; }
  if (onionNext) { scene.remove(onionNext); onionNext.geometry.dispose(); onionNext.material.dispose(); onionNext = null; }
  onionPairs = [];
  for (let i = 0; i < poseBones.length; i++) {
    const b = poseBones[i];
    if (!b || !b.parent || !b.parent.isBone) continue;
    const parentIdx = poseBones.indexOf(b.parent);
    if (parentIdx < 0) continue;
    onionPairs.push({ child: i, parent: parentIdx });
  }
  const segCount = onionPairs.length;
  if (segCount === 0) return;
  function makeGhost(color) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(segCount * 6);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    // depthTest off + high renderOrder so the ghost reads as an
    // overlay even when the live mesh occludes the same joints.
    const mat = new THREE.LineBasicMaterial({
      color, transparent: true, opacity: 0.40,
      depthTest: false, depthWrite: false,
    });
    const ls = new THREE.LineSegments(geo, mat);
    ls.renderOrder = 9999;
    ls.visible = false;
    ls.frustumCulled = false;
    return ls;
  }
  onionPrev = makeGhost(ONION_PREV_COLOR);
  onionNext = makeGhost(ONION_NEXT_COLOR);
  scene.add(onionPrev);
  scene.add(onionNext);
}

function poseHideOnionSkin() {
  if (onionPrev) onionPrev.visible = false;
  if (onionNext) onionNext.visible = false;
}

// Temp scratch vectors reused across paint — avoids GC churn from
// allocating six Vector3s per bone per frame.
const _onionA = new THREE.Vector3();
const _onionB = new THREE.Vector3();

function poseUpdateOnionSkin() {
  if (!poseMode || !currentModel || !onionPrev) { poseHideOnionSkin(); return; }
  if (!onionSkinEnabled || poseKeyframes.length < 2) { poseHideOnionSkin(); return; }
  // Find the bracketing keyframes. Tolerance keeps "exactly on a key"
  // from leaving both ghosts on the same pose as the live skeleton —
  // when poseTime sits on a key we hide that side instead.
  const cur = poseTime;
  let prevKF = null, nextKF = null;
  for (let i = 0; i < poseKeyframes.length; i++) {
    const k = poseKeyframes[i];
    if (k.time < cur - 1e-3) prevKF = k;
    if (k.time > cur + 1e-3 && nextKF == null) { nextKF = k; break; }
  }
  // Snapshot the live quats so we can paint ghosts without disturbing
  // the user's in-flight pose.
  const saved = new Array(poseBones.length);
  for (let i = 0; i < poseBones.length; i++) {
    const b = poseBones[i];
    if (b) {
      const q = b.quaternion;
      saved[i] = [q.x, q.y, q.z, q.w];
    }
  }
  function paint(ghost, kf) {
    if (!kf) { ghost.visible = false; return; }
    const byIdx = new Map();
    for (const e of kf.bones) byIdx.set(e.i, e.q);
    for (let i = 0; i < poseBones.length; i++) {
      const q = byIdx.get(i);
      if (q && poseBones[i]) poseBones[i].quaternion.set(q[0], q[1], q[2], q[3]);
    }
    currentModel.updateMatrixWorld(true);
    const positions = ghost.geometry.attributes.position.array;
    for (let i = 0; i < onionPairs.length; i++) {
      const p = onionPairs[i];
      poseBones[p.child].getWorldPosition(_onionA);
      poseBones[p.parent].getWorldPosition(_onionB);
      const o = i * 6;
      positions[o    ] = _onionA.x; positions[o + 1] = _onionA.y; positions[o + 2] = _onionA.z;
      positions[o + 3] = _onionB.x; positions[o + 4] = _onionB.y; positions[o + 5] = _onionB.z;
    }
    ghost.geometry.attributes.position.needsUpdate = true;
    ghost.visible = true;
  }
  paint(onionPrev, prevKF);
  paint(onionNext, nextKF);
  // Restore live quats so the next render shows the user's actual pose.
  for (let i = 0; i < poseBones.length; i++) {
    const s = saved[i], b = poseBones[i];
    if (s && b) b.quaternion.set(s[0], s[1], s[2], s[3]);
  }
  currentModel.updateMatrixWorld(true);
}

window.poseSetOnionSkin = function (enabled) {
  onionSkinEnabled = !!enabled;
  if (!onionSkinEnabled) poseHideOnionSkin();
  else poseUpdateOnionSkin();
  requestRender();
  fosTelemetry.info('view', `onion skin: ${onionSkinEnabled ? 'on' : 'off'}`);
};

// ─── Spring-damper secondary motion ───
// During playback, "secondary" bones (head, hands, hair, spine tip,
// tail, skirt-cloth) lag the keyframed target rotation with a damped
// spring. The visual effect is follow-through / overlap — the head
// settles a beat after a body turn; a ponytail trails behind the
// head; hands continue past their key when an arm decelerates. Pure
// analytical, no ML, ~60 lines.
//
// Tuning: stiffness K and damping C give a spring ω = √K, damping
// ratio ζ = C / (2√K). Default ω ≈ 9 rad/s with ζ ≈ 0.6 reads as a
// soft overshoot — visible without being cartoony.
let poseSecondaryEnabled   = true;
let poseSecondaryStiffness = 80;
let poseSecondaryDamping   = 11;
let poseSecondaryBones     = [];   // indices into poseBones
let poseSecondaryState     = new Map();  // boneIndex -> { applied:[x,y,z,w], vel:[x,y,z] }

// Bones whose names match any of these patterns get follow-through by
// default. Tuned against GTA-V ped skeletons (SKEL_Head, SKEL_Spine3,
// SKEL_L_Hand, etc.) and the Mixamo / Sollumz conventions our imports
// pass through. End-user can clear/extend the list at runtime via the
// host setter.
const POSE_SECONDARY_REGEX = /(^|_)(head|neck|hand|finger|thumb|spine[_]?[34]|ponytail|tail|hair|skirt|cloth|tit|breast|ear)([_]|$)/i;

function poseDetectSecondaryBones() {
  poseSecondaryBones = [];
  for (let i = 0; i < poseBones.length; i++) {
    const n = poseBones[i] && poseBones[i].name;
    if (n && POSE_SECONDARY_REGEX.test(n)) poseSecondaryBones.push(i);
  }
}

function poseSecondaryReset() {
  poseSecondaryState.clear();
  for (const i of poseSecondaryBones) {
    const b = poseBones[i];
    if (!b) continue;
    const q = b.quaternion;
    poseSecondaryState.set(i, {
      applied: [q.x, q.y, q.z, q.w],
      vel:     [0, 0, 0],
    });
  }
}

// Integrate one spring step against the target rotation poseEvaluate
// has already written into each secondary bone. Replaces the bone's
// quaternion with the lagged version so the renderer picks it up.
function poseSecondaryStep(dt) {
  if (!poseSecondaryEnabled || poseSecondaryBones.length === 0) return;
  if (dt <= 0) return;
  // Cap dt so a hitched frame doesn't catapult the spring.
  if (dt > 0.1) dt = 0.1;
  const k = poseSecondaryStiffness, c = poseSecondaryDamping;
  for (const i of poseSecondaryBones) {
    const bone = poseBones[i];
    if (!bone) continue;
    let st = poseSecondaryState.get(i);
    if (!st) {
      st = { applied: [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w], vel: [0, 0, 0] };
      poseSecondaryState.set(i, st);
    }
    const target = [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w];
    // Rotation needed to go applied -> target, as an axis*angle vec3.
    // Shortest arc: flip target if dot < 0 so the spring never takes
    // the long way around.
    let tx = target[0], ty = target[1], tz = target[2], tw = target[3];
    const ax = st.applied[0], ay = st.applied[1], az = st.applied[2], aw = st.applied[3];
    if (ax * tx + ay * ty + az * tz + aw * tw < 0) { tx = -tx; ty = -ty; tz = -tz; tw = -tw; }
    // delta = log(target * inv(applied)) * 2  (axis*angle radians)
    const inv = [-ax, -ay, -az, aw];
    const rel = poseQuatMul([tx, ty, tz, tw], inv);
    const log = poseQuatLog(rel);
    const dx = log[0] * 2, dy = log[1] * 2, dz = log[2] * 2;
    // Spring acceleration: a = K * delta - C * v
    const accx = k * dx - c * st.vel[0];
    const accy = k * dy - c * st.vel[1];
    const accz = k * dz - c * st.vel[2];
    st.vel[0] += accx * dt;
    st.vel[1] += accy * dt;
    st.vel[2] += accz * dt;
    // Integrate angular velocity into rotation: applied = exp(v*dt/2) * applied
    const sx = st.vel[0] * dt * 0.5, sy = st.vel[1] * dt * 0.5, sz = st.vel[2] * dt * 0.5;
    const stepQ = poseQuatExp([sx, sy, sz, 0]);
    const next = poseQuatMul(stepQ, st.applied);
    // Renormalize against drift accumulated over thousands of frames.
    const n = Math.hypot(next[0], next[1], next[2], next[3]) || 1;
    st.applied = [next[0] / n, next[1] / n, next[2] / n, next[3] / n];
    bone.quaternion.set(st.applied[0], st.applied[1], st.applied[2], st.applied[3]);
  }
}

// Host-callable: toggle secondary motion + set intensity (0..1 maps
// stiffness/damping along a perceptually-OK curve). Intensity 0 = off
// (snappy / no lag), 0.5 = default soft overshoot, 1 = noticeably
// floaty.
window.poseSetSecondaryMotion = function (enabled, intensity) {
  poseSecondaryEnabled = !!enabled;
  if (typeof intensity === 'number') {
    const a = Math.max(0, Math.min(1, intensity));
    // Lower stiffness = slower follow-through; lower damping = more bounce.
    poseSecondaryStiffness = 160 - 120 * a;   // 160 .. 40
    poseSecondaryDamping   = 18  - 11 * a;    // 18  .. 7
  }
  poseSecondaryReset();
  fosTelemetry.info('timeline', `secondary motion: ${enabled ? 'on' : 'off'} k=${poseSecondaryStiffness.toFixed(1)} c=${poseSecondaryDamping.toFixed(1)} (${poseSecondaryBones.length} bones)`);
};

// ─── Per-key easing curves ───
// Each keyframe carries an `ease` mode controlling how the outgoing
// segment blends to the next key:
//   'auto'    — smoothstep (3t² - 2t³)  ← default, soft natural feel
//   'linear'  — constant velocity
//   'in'      — ease-in (slow start, fast end)
//   'out'     — ease-out (fast start, slow end)
//   'hold'    — no interpolation; snap to next key at the boundary
function poseApplyEase(alpha, mode) {
  switch (mode) {
    case 'linear': return alpha;
    case 'in':     return alpha * alpha;
    case 'out':    return 1 - (1 - alpha) * (1 - alpha);
    case 'easeInOut': return alpha < 0.5 ? 2 * alpha * alpha : 1 - Math.pow(-2 * alpha + 2, 2) / 2;
    case 'hold':   return 0;
    case 'auto':
    default:       return alpha * alpha * (3 - 2 * alpha);
  }
}

// Evaluate the pose at time t by spherical-cubic (SQUAD) interpolation
// between bracketing keyframes, with per-key easing. No keyframes ->
// no-op (leaves the user's in-flight pose alone).
//
// SQUAD wins over plain slerp whenever there are 3+ keys: the tangent
// at every interior key is averaged from its neighbours, so a sequence
// of three poses arcs smoothly instead of changing direction abruptly
// at the middle one. With only two keys the path collapses to a slerp
// (there are no neighbours to average against).
function poseEvaluate(t) {
  if (poseKeyframes.length === 0) return;
  // Out-of-range or single keyframe: clamp to nearest.
  if (poseKeyframes.length === 1 || t <= poseKeyframes[0].time) {
    poseApplySnapshot(poseKeyframes[0].bones);
    poseApplyRoot(poseKeyframes[0].root, poseKeyframes[0].yaw);
    return;
  }
  if (t >= poseKeyframes[poseKeyframes.length - 1].time) {
    const last = poseKeyframes[poseKeyframes.length - 1];
    poseApplySnapshot(last.bones);
    poseApplyRoot(last.root, last.yaw);
    return;
  }
  // Find bracketing pair.
  let i = 0;
  while (i < poseKeyframes.length - 1 && poseKeyframes[i + 1].time <= t) i++;
  const a = poseKeyframes[i], b = poseKeyframes[i + 1];
  const span = b.time - a.time;
  let alpha = span > 1e-6 ? (t - a.time) / span : 0;

  // The outgoing key owns the segment's easing — natural read since
  // "leaving this pose" is what the curve modifier shapes.
  // 'hold' short-circuits the entire bone loop — snap to the previous
  // pose and skip the math.
  const easeMode = a.ease || 'auto';
  if (easeMode === 'hold') {
    poseApplySnapshot(a.bones);
    poseApplyRoot(a.root, a.yaw);
    return;
  }
  alpha = poseApplyEase(alpha, easeMode);

  // SQUAD needs four keys (prev / a / b / next) to derive smooth
  // tangents at a and b. 'linear' explicitly opts out of cubic
  // smoothing — handy when the user wants robotic ramp-style motion.
  const useSquad = poseKeyframes.length >= 3 && easeMode !== 'linear';
  const prev = useSquad ? poseKeyframes[Math.max(0, i - 1)]                          : null;
  const next = useSquad ? poseKeyframes[Math.min(poseKeyframes.length - 1, i + 2)]   : null;
  const aMap = new Map(); for (const e of a.bones) aMap.set(e.i, e.q);
  const bMap = new Map(); for (const e of b.bones) bMap.set(e.i, e.q);
  let pMap = null, nMap = null;
  if (useSquad) {
    pMap = new Map(); for (const e of prev.bones) pMap.set(e.i, e.q);
    nMap = new Map(); for (const e of next.bones) nMap.set(e.i, e.q);
  }

  for (const e of a.bones) {
    const bq = bMap.get(e.i);
    if (!bq) continue;
    let q;
    if (useSquad) {
      // Sparse-storage safety: if a bone isn't represented in the
      // neighbour key (e.g. it was masked off), fall back to the
      // current key's value for that side of the tangent estimate.
      const pq = pMap.get(e.i) ?? e.q;
      const nq = nMap.get(e.i) ?? bq;
      const s1 = poseQuatIntermediate(pq, e.q, bq);
      const s2 = poseQuatIntermediate(e.q, bq, nq);
      q = poseSquad(e.q, bq, s1, s2, alpha);
    } else {
      q = poseSlerp(e.q, bq, alpha);
    }
    const bone = poseBones[e.i];
    if (bone) bone.quaternion.set(q[0], q[1], q[2], q[3]);
  }

  // Root motion: lerp SKEL_ROOT's offset across the segment (eased alpha,
  // same as the rotations). Missing on either side counts as zero so a clip
  // with a partial root track still travels smoothly.
  if (!poseSuppressRootApply && poseRootTarget && poseRootBase && (a.root || b.root)) {
    // In-place preview keeps the vertical (crouch / hop) but drops horizontal
    // travel; Root Motion mode applies all three. See poseRootMotionPreview.
    const ar = a.root || [0, 0, 0], br = b.root || [0, 0, 0];
    const trav = poseRootMotionPreview ? 1 : 0;
    poseRootTarget.position.set(
      poseRootBase.x + (ar[0] + (br[0] - ar[0]) * alpha) * trav,
      poseRootBase.y + ar[1] + (br[1] - ar[1]) * alpha,
      poseRootBase.z + (ar[2] + (br[2] - ar[2]) * alpha) * trav);
  }
  // Mover heading: plain lerp — yaw deltas arrive unwrapped from import,
  // so no ±π seam can sit between two adjacent keys. Suppressed with travel.
  if (poseRootMotionPreview && (typeof a.yaw === 'number' || typeof b.yaw === 'number')) {
    const ay = typeof a.yaw === 'number' ? a.yaw : 0;
    const by = typeof b.yaw === 'number' ? b.yaw : 0;
    poseApplyRootYaw(ay + (by - ay) * alpha);
  } else {
    poseApplyRootYaw(null);
  }
}

// Set the easing mode for the keyframe at the given time. Returns true
// if a key was updated. Modes: 'auto' | 'linear' | 'in' | 'out' | 'hold'.
window.poseSetKeyframeEase = function (time, mode) {
  const valid = ['auto', 'linear', 'in', 'out', 'hold'];
  if (!valid.includes(mode)) return false;
  const i = poseKeyframes.findIndex(k => Math.abs(k.time - +time) < 1e-3);
  if (i < 0) return false;
  poseKeyframes[i].ease = mode;
  // Reapply at the scrubber so the user sees the curve change without
  // having to scrub off and back on.
  poseEvaluate(poseTime);
  requestRender();
  postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
  fosTelemetry.info('timeline', `KF ease set: ${time.toFixed?.(3) ?? time}s -> ${mode}`);
  return true;
};

// Snapshot the timeline state for the host so it can bake a multi-frame
// .ycd from the keyframes. Returns enough data for the host to slerp
// per-frame on its own: every bone's name + per-keyframe quat, plus the
// keyframe times. The host's writer handles interp + RAGE serialisation.
window.getKeyframes = function () {
  if (!poseMode) return null;
  return JSON.stringify({
    duration: poseDuration,
    fps: poseFps,
    source: poseKeyframeSource || 'editor',
    boneSpace: poseBoneSpace || 'glb',
    bones: poseBones.map((b, i) => ({
      index: i,
      name: b.name || ('bone_' + i),
    })),
    keyframes: poseKeyframes.map(k => ({
      time: k.time,
      // Sparse: only the bones the keyframe actually changed -- but
      // since poseAddKeyframe snapshots all bones, this is currently
      // a full snapshot. The writer can compute "changed" by
      // diffing.
      bones: k.bones,
      // Root-motion offset if this keyframe carries one;
      // absent for image / .ycd / manually-added keyframes. Viewer units
      // (Y-up); the host maps to RAGE Z-up on export.
      root: k.root || null,
    })),
  });
};

// Sample the timeline through the SAME evaluator the preview uses, then
// read each frame via getPose(). Matches the proven single-pose export
// path (raw glTF locals, SKEL_ROOT skipped on the host) so animated
// clips look identical in-game to what you see while scrubbing.
window.samplePoseClipForExport = function () {
  if (!poseMode) return null;
  const fps = poseFps;
  let t0 = 0;
  let t1 = poseDuration;
  let exportSource = poseKeyframeSource || 'editor';
  let exportBoneSpace = poseBoneSpace || 'glb';
  // When only clip strips are on the timeline, export the trimmed span —
  // the UNION of all strips (multi-layer stacks/staggered strips must all
  // land in the export, not just the longest one). Source/boneSpace
  // metadata still comes from the longest strip's clip.
  if (poseKeyframes.length < 2 && poseStrips.length > 0) {
    t0 = Math.min(...poseStrips.map(s => s.start));
    t1 = Math.max(...poseStrips.map(s => s.start + s.duration));
    const s = poseStrips.reduce((a, b) => (a.duration > b.duration ? a : b));
    const c = poseClips.find(x => x.id === s.clipId);
    if (c) {
      if (c.source) exportSource = c.source;
      if (c.boneSpace) exportBoneSpace = c.boneSpace;
    }
  }
  const exportDur = Math.max(1 / fps, t1 - t0);
  const frames = Math.max(2, Math.round(exportDur * fps));
  const wasPlaying = posePlaying;
  if (posePlaying) {
    posePlaying = false;
    postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: false });
  }
  const poses = [];
  const roots = [];
  for (let f = 0; f < frames; f++) {
    const t = t0 + f / fps;
    if (_rt && _rt.timelineSync && _rt.tracks.length > 0) {
      const frame = (poseDuration > 1e-6 && _rt.frames > 1)
        ? Math.round((t / poseDuration) * (_rt.frames - 1))
        : 0;
      _rtApply(frame);
    } else if (!poseEvaluateStrips(t)) poseEvaluate(t);
    poses.push(JSON.parse(window.getPose()));
    if (poseRootTarget && poseRootBase) {
      roots.push([
        +(poseRootTarget.position.x - poseRootBase.x).toFixed(4),
        +(poseRootTarget.position.y - poseRootBase.y).toFixed(4),
        +(poseRootTarget.position.z - poseRootBase.z).toFixed(4),
      ]);
    }
  }
  return JSON.stringify({
    fps, frames, duration: exportDur, poses, roots,
    source: exportSource, boneSpace: exportBoneSpace,
    floorOffsetY: poseFloorOffsetY || 0,
  });
};

window.poseSetTime = function (t, scrubbing) {
  if (!poseMode) return;
  poseTime = Math.max(0, Math.min(poseDuration, +t));
  const isScrub = !!scrubbing;
  if (_rt && _rt.timelineSync && _rt.tracks.length > 0) {
    const frame = (poseDuration > 1e-6 && _rt.frames > 1)
      ? Math.round((poseTime / poseDuration) * (_rt.frames - 1))
      : 0;
    window.rtSeek(frame);
    poseSyncSkeletonMeshes();
    poseSecondaryReset();
    // Onion skin does two full matrixWorld passes — skip during scrub.
    if (!isScrub) poseUpdateOnionSkin();
    requestRender();
    const now = performance.now();
    if (!isScrub || now - poseLastHostTickMs >= 50) {
      poseLastHostTickMs = now;
      postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: posePlaying });
    }
    return;
  }
  // Scrub respects strips too — drag the playhead through a strip and
  // bones land on the right frame of the clip without needing to press
  // play first.
  const stripsWrote = poseEvaluateStrips(poseTime);
  if (!stripsWrote) poseEvaluate(poseTime);
  poseSyncSkeletonMeshes();
  // Foot IK solve is noticeable on dense clips — skip mid-scrub, run on settle.
  if (!isScrub) poseApplyPreviewFootIk();
  // Scrubbing isn't continuous-time motion, so spring follow-through
  // shouldn't accumulate state across drag deltas. Reset on every
  // setTime: secondary bones snap to their target during a scrub but
  // animate properly the moment the user hits play.
  poseSecondaryReset();
  if (!isScrub) poseUpdateOnionSkin();
  requestRender();
  // Always throttle host ticks — the old `|| !posePlaying` branch posted
  // an unthrottled tick on every scrub mousemove and flooded WPF.
  const now = performance.now();
  if (!isScrub || now - poseLastHostTickMs >= 50) {
    poseLastHostTickMs = now;
    postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: posePlaying });
  }
};

window.poseSetDuration = function (sec) {
  poseDuration = Math.max(0.1, Math.min(60, +sec));
  if (poseTime > poseDuration) poseTime = poseDuration;
  postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
};

window.poseSetFps = function (fps) {
  poseFps = Math.max(1, Math.min(120, Math.round(+fps)));
  postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
};

window.posePlay = function () {
  if (!poseMode) {
    postToHost({ kind: 'pose-timeline-warn', message: 'Load a rig before playing.' });
    return false;
  }
  if (_rt && _rt.timelineSync && _rt.tracks.length > 0) {
    if (_rt.frames <= 1) {
      postToHost({ kind: 'pose-timeline-warn', message: 'Clip has no playable frames.' });
      return false;
    }
    posePlaying = true;
    poseLastTickMs = performance.now();
    poseSecondaryReset();
    _rt.loop = poseLoop;
    window.rtPlay();
    return true;
  }
  // Need *something* playable — either an authored keyframe sequence
  // (2+ diamonds, so there's motion to interpolate between) or at
  // least one clip placed as a strip on the timeline. After Bake the
  // diamonds get consumed into a strip, so the keyframe-only check
  // would lock the user out of playing back their own baked clips.
  if (poseKeyframes.length < 2 && poseStrips.length === 0) {
    postToHost({ kind: 'pose-timeline-warn', message: 'Add 2+ keyframes or place a clip on the timeline before playing.' });
    return false;
  }
  posePlaying = true;
  poseLastTickMs = performance.now();
  // Reset secondary-motion state so playback starts with zero angular
  // velocity rather than carrying stale follow-through from the last
  // run (which would manifest as a jolt on the first tick).
  poseSecondaryReset();
  refreshPoseJointDots();
  postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: true });
  return true;
};

// Library / import convenience: seek to 0 and play in one turn so a
// deferred pose-timeline-update(playing:false) from import can't land
// between two host script calls and leave transport stuck at 0:00.
window.poseRestartPlay = function () {
  if (!poseMode) return false;
  try {
    if (typeof window.poseSetTime === 'function') window.poseSetTime(0);
  } catch (e) {}
  return !!window.posePlay();
};

window.posePause = function () {
  if (_rt && _rt.playing) window.rtPause();
  posePlaying = false;
  refreshPoseJointDots();
  postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: false });
};

window.poseToggleLoop = function () {
  poseLoop = !poseLoop;
  if (_rt) _rt.loop = poseLoop;
  postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying, loop: poseLoop });
};

// Driven from the existing tick() render loop -- advances poseTime, lerps
// bones, asks for a re-render. Cheap to call when not playing (early
// return on the flag).
function poseTimelineTick() {
  if (!posePlaying) return;
  // YCD / bone-track imports drive bones via _rt RAF — don't double-advance.
  // If the RAF died but the playing flag stuck (exception in _rtApply),
  // restart the driver instead of deadlocking the transport at 0:00.
  if (_rt && _rt.timelineSync && _rt.playing) {
    if (!_rt.raf) {
      try { window.rtPlay(); } catch (e) { _rt.playing = false; }
    }
    return;
  }
  const now = performance.now();
  const dt = (now - poseLastTickMs) / 1000;
  poseLastTickMs = now;
  poseTime += dt;
  if (poseTime >= poseDuration) {
    if (poseLoop) {
      poseTime = poseTime % poseDuration;
    } else {
      poseTime = poseDuration;
      posePlaying = false;
      // Timeline ran to its end — bring the control rig back.
      refreshPoseJointDots();
    }
  }
  // Strips win at any time they cover; keyframes fill the gaps. This
  // lets users keep authoring with the gizmo (writes to poseKeyframes)
  // while strips from the library overlay onto specific spans.
  const stripsWrote = poseEvaluateStrips(poseTime);
  if (!stripsWrote) poseEvaluate(poseTime);
  poseSyncSkeletonMeshes();
  poseApplyPreviewFootIk();
  syncIkHandleTransforms(false);
  // Spring-damper follow-through reads each secondary bone's freshly-
  // written target rotation and overwrites with the lagged version,
  // so the renderer picks it up the same frame. Scrub paths reset
  // state via poseSecondaryReset so a drag doesn't smear motion
  // across silent frames.
  poseSecondaryStep(dt);
  // Onion ghosts only re-pick when the scrubber crosses a key, but
  // re-painting every tick keeps them aligned even if a keyframe
  // pose was edited mid-playback (cheap).
  poseUpdateOnionSkin();
  requestRender();
  // THROTTLE the host tick. The render loop runs at up to 60 fps, but the WPF
  // timeline only needs the playhead a few times a second. Posting a message
  // every frame floods the UI thread — on a heavy clip (hundreds of keyframes)
  // it starves the keyframe-marker redraw (empty timeline) and swallows button
  // clicks (the "can't stop it / nothing works" freeze). ~20 Hz is plenty for a
  // smooth playhead; always emit the final frame so the bar lands exactly.
  if (now - poseLastHostTickMs >= 50 || !posePlaying) {
    poseLastHostTickMs = now;
    postToHost({ kind: 'pose-timeline-tick', time: poseTime, playing: posePlaying });
  }
}

function attachPoseBone(bone, additive = false) {
  if (!bone) return;
  // FK joint pick clears any active IK handle and freezes every IK chain
  // so a later FK rotate can't accidentally re-trigger a solve.
  poseIkActiveHandle = null;
  if (poseFabrik) poseFabrik.setChainEnablerAll(false);
  refreshIkHandleVisuals();
  // Selection list management. Single-click = replace; shift-click =
  // toggle (clicking an already-selected bone removes it; primary
  // becomes whatever was last added).
  if (additive) {
    const existing = poseSelection.indexOf(bone);
    if (existing >= 0) {
      poseSelection.splice(existing, 1);
    } else {
      poseSelection.push(bone);
    }
  } else {
    poseSelection = [bone];
  }
  // Primary (gizmo-target) is the last element. Empty selection means
  // nothing is being edited right now.
  const primary = poseSelection.length ? poseSelection[poseSelection.length - 1] : null;
  posePickedBone = primary;       // legacy: keep the single-ref consumers working

  // matrixWorld refresh BEFORE attach so the gizmo lands on the actual
  // joint, not its stale position from a prior frame. Without this, the
  // rotation rings can drift visibly off the bone after sibling edits or
  // camera moves — a non-obvious bug that's bitten the pose-mode rig
  // attachment in multiple revisions.
  if (currentModel) currentModel.updateMatrixWorld(true);

  if (primary) {
    transformControls.attach(primary);
    transformControls.setMode('rotate');
    applyAxisLockToGizmo();
    // Hide the translate/rotate/scale toolbar — bone posing is rotate-only.
    // Size logic stays identical to the 3D model viewer.
    gizmoBar.style.display = 'none';
    updateGizmoSizeFromModel();
    // The model is no longer the gizmo target — let the host clear
    // any "rig selected for transform" highlight in the outliner.
    postToHost({ kind: 'rig-selected-for-transform', rigId: null });
  } else {
    transformControls.detach();
  }

  // Re-tint / sync joint markers (selected = orange; hidden while
  // animating or when the user has markers toggled off).
  refreshPoseJointDots();

  if (primary) {
    postToHost({ kind: 'pose-bone-selected', name: primary.name || '', index: poseBones.indexOf(primary), selection: poseSelection.length });
    fosTelemetry.info('pose', `selected ${primary.name}`, { total: poseSelection.length });
  } else {
    postToHost({ kind: 'pose-bone-selected', name: '', index: -1, selection: 0 });
  }
  updatePoseHud();
  requestRender();
}

// In pose mode, hit-test joint markers on POINTERDOWN and freeze OrbitControls
// if the click started over one. Without this, OrbitControls starts an
// orbit immediately on mousedown and the camera spins for the duration
// of the drag — the user thinks the model is glitching but it's actually
// the camera flying around while they try to click on a tiny joint marker.
// The hit-test runs in capture phase so we beat OrbitControls' own
// pointerdown handler to the punch.
// Track which gizmo handle (if any) was under the cursor at pointerdown
// time so the pose-mode pointerup handler can distinguish "user clicked
// the gizmo" from "user clicked a joint marker". Also remember which
// joint marker was hit so the pointerup path can pick that exact bone
// without re-raycasting (avoids ambiguity when the cursor wobbles
// between pointerdown and pointerup).
let pointerDownOnJointMarker = false;
let pointerDownOnGizmoHandle = false;
let pointerDownPickedBone = null;
let pointerDownIkHandle = null;

// Raycast the transform gizmo's generous grab volumes ("pickers").
// TransformControls keeps those picker meshes as visible:false so they
// never render — but the stock THREE.Raycaster SKIPS invisible objects, so
// a plain intersectObject(transformControls) only ever catches the
// razor-thin VISIBLE handles and almost never reports a hit. That is why
// the IK picker was stealing rotate-ring drags ("the rotation gizmo just
// doesn't work"): our gizmo hit-test came back empty even when the cursor
// was right on a ring. Force the current mode's picker group visible for
// the duration of the raycast so we detect a gizmo grab exactly where
// TransformControls itself does, then restore visibility (synchronous, so
// nothing ever renders in the forced-on state).
function raycastGizmoPickers() {
  const tc = transformControls;
  const gizmo = tc.object && tc._gizmo ? tc._gizmo : null;
  const picker = gizmo && gizmo.picker ? gizmo.picker[tc.mode] : null;
  if (!picker) return [];
  const saved = [];
  picker.traverse(o => { saved.push([o, o.visible]); o.visible = true; });
  const hits = raycaster.intersectObject(picker, true);
  for (let i = 0; i < saved.length; i++) saved[i][0].visible = saved[i][1];
  return hits;
}

// Does the current pick ray actually hit a gizmo ring / arrow / cube?
function pickRayHitsGizmo() {
  if (!transformControls.object) return false;
  return raycastGizmoPickers().length > 0;
}

renderer.domElement.addEventListener('pointerdown', e => {
  pointerDownOnJointMarker = false;
  pointerDownOnGizmoHandle = false;
  pointerDownIkHandle = null;
  if (!poseMode || (poseJointHandles.length === 0 && poseIkHandles.length === 0)) return;
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);

  if (currentModel) currentModel.updateMatrixWorld(true);

  const ikMeshes = poseIkHandles.map(h => h.mesh).filter(Boolean);
  const ikHits = ikMeshes.length ? raycaster.intersectObjects(ikMeshes, true) : [];
  const jointHits = poseJointHandles.length ? raycaster.intersectObjects(poseJointHandles, false) : [];
  const gizmoHits = raycastGizmoPickers();
  const ikDist = ikHits.length > 0 ? ikHits[0].distance : Infinity;
  const jointDist = jointHits.length > 0 ? jointHits[0].distance : Infinity;
  const gizmoDist = gizmoHits.length > 0 ? gizmoHits[0].distance : Infinity;

  // Grab helpers (used in both mode orders below).
  const grabJoint = () => {
    pointerDownOnJointMarker = true;
    pointerDownPickedBone = jointHits[0].object.userData.poseBone || null;
    pointerDownAt = { x: e.clientX, y: e.clientY };
    controls.enabled = false;
    e.preventDefault();
  };
  const grabIk = () => {
    let h = ikHits[0].object.userData.ikHandle;
    for (let o = ikHits[0].object; o && !h; o = o.parent) h = o.userData && o.userData.ikHandle;
    pointerDownIkHandle = h || null;
    pointerDownOnJointMarker = true;
    pointerDownAt = { x: e.clientX, y: e.clientY };
    controls.enabled = false;
    e.preventDefault();
  };

  // Click priority (order matters).
  //   1. gizmo handle ALWAYS wins — a real rotate/translate handle under the
  //      cursor lets a selected bone be manipulated even when a picker sits on
  //      top of it. (This was the "rotation was broken" fix.)
  //   2. then FK vs IK, decided by the toolbar FK/IK toggle:
  //        FK mode → joint (box/ring) wins; limbs rotate, IK handles are hidden.
  //        IK mode → IK handle wins at the hands/feet; dragging one makes the
  //                  shoulder+chest+other side follow. Spine rings / limb boxes
  //                  with no IK handle still FK-rotate.
  if (gizmoHits.length > 0) {
    pointerDownOnGizmoHandle = true;
    return;
  }

  if (poseIkMode) {
    if (ikHits.length > 0) { grabIk(); return; }
    if (jointHits.length > 0) { grabJoint(); return; }
  } else {
    if (jointHits.length > 0) { grabJoint(); return; }
    if (ikHits.length > 0) { grabIk(); return; }
  }
}, true);

// Hover feedback for the IK ring handles: brighten + enlarge the one under
// the cursor and show a grab cursor so the big targets read as grabbable.
// Only retints on change, so it's cheap despite firing on every move.
renderer.domElement.addEventListener('pointermove', e => {
  if (!poseMode || poseIkHandles.length === 0 || transformControls.dragging) return;
  const meshes = poseIkHandles.map(h => h.mesh).filter(m => m && m.visible);
  if (meshes.length === 0) { if (poseHoverIkHandle) { poseHoverIkHandle = null; refreshIkHandleVisuals(); requestRender(); } return; }
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(meshes, true);
  let hovered = null;
  if (hits.length) {
    for (let o = hits[0].object; o && !hovered; o = o.parent) hovered = o.userData && o.userData.ikHandle;
  }
  if (hovered !== poseHoverIkHandle) {
    poseHoverIkHandle = hovered;
    refreshIkHandleVisuals();
    renderer.domElement.style.cursor = hovered ? 'grab' : '';
    requestRender();
  }
});

renderer.domElement.addEventListener('pointerup', e => {
  if (pointerDownOnJointMarker) {
    // Re-enable orbit. transformControls' dragging-changed handler also
    // toggles it, but that only fires for gizmo handle drags. For joint
    // marker clicks we own the lifecycle here.
    controls.enabled = true;
    pointerDownOnJointMarker = false;
  }
  // Always clear the gizmo-hit flag on release — if the user clicked a
  // handle but never dragged, the bone-pick pointerup path consumes the
  // flag itself, but if anything bailed early upstream we still want a
  // clean slate before the next pointerdown.
  pointerDownOnGizmoHandle = false;
}, true);

// Intercept clicks BEFORE the default "select prop" handler runs. In pose
// mode we route to bone-pick instead. Listening on capture phase so we
// preempt the existing pointerup listener.
renderer.domElement.addEventListener('pointerup', e => {
  if (!poseMode) return;
  // NOTE: we intentionally do NOT stopImmediatePropagation up here.
  // The default prop-mode pointerup handler at the top of the file
  // already bails on `if (poseMode) return`, AND TransformControls'
  // own pointerup needs to bubble through to finalize gizmo drags
  // (otherwise `dragging` stays true after a rotate-ring drag and
  // every subsequent mouse move keeps applying rotation — the
  // "rotates with the mouse moving" glitch). Only the joint-pick
  // branch at the bottom needs stopImmediatePropagation, and that's
  // mostly belt-and-braces now that the default handler is pose-aware.
  const start = pointerDownAt;
  // Don't reset pointerDownAt here — the default handler still consumes
  // it on the bubble phase. We rely on it being already set.
  if (!start) return;
  if (Math.hypot(e.clientX - start.x, e.clientY - start.y) > 4) return;
  if (transformControls.dragging || transformControls.axis) return;
  // Mirror the pointerdown guard: if the click started on a gizmo
  // handle, don't try to re-pick a bone on release. The gizmo's own
  // mouseUp will run on bubble and the existing selection stays put.
  if (pointerDownOnGizmoHandle) {
    pointerDownOnGizmoHandle = false;
    return;
  }

  // Honor the pointerdown decision. We key off pointerDownPickedBone
  // (not the boolean flag) because there's a sibling capture-phase
  // pointerup handler registered above that re-enables OrbitControls
  // and clears pointerDownOnJointMarker as part of its bookkeeping —
  // capture-phase listeners on the same element fire in registration
  // order, so that other handler runs first and the flag is already
  // false by the time we check it. pointerDownPickedBone is owned
  // exclusively by this pair of handlers (pointerdown sets, pointerup
  // consumes), so it's the reliable signal.
  if (pointerDownIkHandle) {
    const h = pointerDownIkHandle;
    pointerDownIkHandle = null;
    pointerDownPickedBone = null;
    attachIkHandle(h);
    return;
  }

  if (pointerDownPickedBone) {
    const targetBone = pointerDownPickedBone;
    pointerDownPickedBone = null;
    const additive = e.shiftKey || e.ctrlKey || e.metaKey;
    attachPoseBone(targetBone, additive);
    // No stopImmediatePropagation — let TransformControls' document
    // pointerup listener still fire (it's a no-op when no drag is in
    // flight, but matters when the user happened to be hovering a
    // ring at click time and TransformControls had captured the
    // pointer). The default prop-mode pointerup bails on poseMode.
    return;
  }

  // Fallback: nothing was claimed at pointerdown. Treat as click-on-
  // empty-space — deselect (unless modifiers are held to preserve
  // the current set for box-select-style workflows).
  if (!e.shiftKey && !e.ctrlKey && !e.metaKey) {
    // Click on empty space clears, but Shift-click on empty space keeps
    // the current selection (so users can drag-select around without
    // accidentally dropping everything).
    poseSelection = [];
    posePickedBone = null;
    poseIkActiveHandle = null;
    if (poseFabrik) poseFabrik.setChainEnablerAll(false);
    transformControls.detach();
    refreshPoseJointDots();
    refreshIkHandleVisuals();
    updatePoseHud();
    requestRender();
  }
  // No stopImmediatePropagation — the default prop-mode pointerup is
  // already guarded by `if (poseMode) return`, and TransformControls'
  // document-level pointerup needs to fire so its setPointerCapture
  // releases. Stopping propagation here was what caused mouse moves
  // to keep tracking after a click — the captured pointer kept
  // routing all pointermove events to the gizmo.
}, true);

// Per-frame gizmo-drag handler. Two responsibilities:
//   1. Multi-bone delta propagation — the primary bone (the one the
//      gizmo is actually attached to) drives a rotation delta that we
//      apply to every other selected bone, computed from its drag-start
//      snapshot so the delta accumulates correctly across the drag.
//   2. Push a pose-bone-changed message to the host so the sidebar can
//      flag the bone as modified without polling.
const _deltaTmpA = new THREE.Quaternion();
const _deltaTmpB = new THREE.Quaternion();
transformControls.addEventListener('objectChange', () => {
  if (!poseMode) return;

  // IK translate: solve limb chain into FK rotations every drag frame.
  if (poseIkActiveHandle && transformControls.mode === 'translate') {
    applyActiveIkSolve();
    requestRender();
    return;
  }

  // FK rotate — keep IK rings glued to hands/feet.
  syncIkHandleTransforms(true);

  if (!posePickedBone) return;

  // Multi-select: drive other selected bones by the same delta the
  // primary just took. This only runs when there's a captured
  // drag-start snapshot (i.e. a real interactive drag, not a
  // programmatic quaternion poke).
  if (poseSelection.length > 1 && dragQuatCapture) {
    const primaryIdx = poseBones.indexOf(posePickedBone);
    const primaryStart = dragQuatCapture.get(primaryIdx);
    if (primaryStart) {
      // delta = primaryStart⁻¹ * primaryNow
      _deltaTmpA.set(primaryStart[0], primaryStart[1], primaryStart[2], primaryStart[3]).invert();
      _deltaTmpA.multiply(posePickedBone.quaternion);
      for (const otherBone of poseSelection) {
        if (otherBone === posePickedBone) continue;
        const oIdx = poseBones.indexOf(otherBone);
        const oStart = dragQuatCapture.get(oIdx);
        if (!oStart) continue;
        // otherNow = otherStart * delta. Re-multiplying from snapshot
        // each tick keeps the deltas additive rather than compounding.
        _deltaTmpB.set(oStart[0], oStart[1], oStart[2], oStart[3]);
        _deltaTmpB.multiply(_deltaTmpA);
        otherBone.quaternion.copy(_deltaTmpB);
      }
    }
  }

  postToHost({
    kind: 'pose-bone-changed',
    name: posePickedBone.name || '',
    index: poseBones.indexOf(posePickedBone),
    rot_xyzw: [posePickedBone.quaternion.x, posePickedBone.quaternion.y, posePickedBone.quaternion.z, posePickedBone.quaternion.w],
    multiCount: poseSelection.length,
  });
});

// Catch any uncaught script errors and report to host -- otherwise
// failures inside loadGtaSkeleton / GLTFLoader callbacks etc. happen
// silently from the C# side's perspective.
window.addEventListener('error', e => {
  try {
    postToHost({ kind: 'js-error', message: String(e.message || e), source: String(e.filename || ''), line: e.lineno|0, col: e.colno|0 });
  } catch {}
});
window.addEventListener('unhandledrejection', e => {
  try {
    postToHost({ kind: 'js-error', message: 'unhandled rejection: ' + String(e.reason && e.reason.message || e.reason || ''), source: '', line: 0, col: 0 });
  } catch {}
});

postToHost({ kind: 'ready' });
</script>
</body>
</html>
