  // would clutter the stack with no-ops.
  const before = snapshotAllPoseQuats();
  const beforeAux = snapshotAuxBones();
  for (let i = 0; i < poseBones.length; i++) {
    poseBones[i].quaternion.copy(poseInitialQuats[i]);
    poseBones[i].position.copy(poseInitialPositions[i]);
  }
  // Aux twist/corrective bones back to rest too — an imported clip may
  // have displaced them and they aren't part of poseBones.
  for (const b of poseAuxBones) {
    const r = b.userData && b.userData.poseAuxRest;
    if (r) { b.quaternion.copy(r.q); b.position.copy(r.p); }
  }
  const after = snapshotAllPoseQuats();
  const afterAux = snapshotAuxBones();
  let actuallyChanged = false;
  for (let i = 0; i < before.length; i++) {
    const a = before[i].q, b = after[i].q;
    for (let j = 0; j < 4; j++) {
      if (Math.abs(a[j] - b[j]) > 1e-6) { actuallyChanged = true; break; }
    }
    if (actuallyChanged) break;
  }
  if (actuallyChanged) {
    pushHistory({ kind: 'reset', payload: { before, after, beforeAux, afterAux } });
  }
  poseSelection = [];
  posePickedBone = null;
  transformControls.detach();
  updatePoseHud();
  fosTelemetry.info('pose', 'reset to bind pose', { undoable: actuallyChanged });
  postToHost({ kind: 'pose-reset' });
  requestRender();
};

window.getPose = function () {
  if (!poseMode) return null;
  return JSON.stringify({
    fiveos_pose_version: 1,
    bone_count: poseBones.length,
    bones: poseBones.map((b, i) => ({
      index: i,
      name: b.name || ('bone_' + i),
      parent: b.parent && b.parent.isBone ? (b.parent.name || '') : '',
      // Local rotation (relative to parent bone). xyzw quaternion order —
      // standard glTF / FBX convention; CodeWalker reads the same order.
      rot_xyzw: [b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w],
      // Initial (rest) rotation, captured at pose-mode entry. Diffing
      // current vs initial lets a future .ycd writer drop unchanged
      // bones from the clip — keeps the file small.
      rest_xyzw: [poseInitialQuats[i].x, poseInitialQuats[i].y, poseInitialQuats[i].z, poseInitialQuats[i].w],
      // Local position + its rest — lets hosts/diagnostics see translation
      // tracks (pelvis height, root motion) the same way as rotations.
      pos_xyz: [b.position.x, b.position.y, b.position.z],
      rest_pos_xyz: poseInitialPositions[i]
        ? [poseInitialPositions[i].x, poseInitialPositions[i].y, poseInitialPositions[i].z]
        : [0, 0, 0],
    })),
  });
};

window.selectPoseBone = function (index) {
  // Host-side bone-list click -> attach gizmo to that bone.
  if (!poseMode) return;
  if (index < 0 || index >= poseBones.length) return;
  const bone = poseBones[index];
  // Refuse to retarget the gizmo while a drag is in flight. WPF
  // CollectionView refreshes (triggered by sidebar IsModified dot
  // updates) can re-fire ListBox.SelectionChanged mid-rotation, which
  // would otherwise call right back here and detach + reattach the
  // gizmo every frame — the rings would jitter and the rotation would
  // never commit cleanly.
  if (transformControls.dragging) return;
  // Same-bone no-op: avoids tripping the matrixWorld refresh +
  // transformControls.attach path when the host echoes the current
  // selection back to us (typical after pose-bone-selected ping-pong).
  // Still refresh dots so an echo can't leave markers stuck visible.
  if (poseSelection.length > 0 && poseSelection[poseSelection.length - 1] === bone) {
    refreshPoseJointDots();
    requestRender();
    return;
  }
  // Outliner can hide an entire body region. Refuse host-driven
  // selection for those bones — check regionHidden (not .visible),
  // because joint dots are also hidden while anything is selected.
  const handle = poseJointHandles.find(h =>
    !h.userData.isPicker && h.userData.poseBone === bone);
  if (handle && handle.userData.regionHidden) return;
  attachPoseBone(bone);
};

// Outliner visibility / lock toggle. The host calls this when the user
// hides a body region in the Pose -> Emote sidebar; we flip the matching
// joint sphere(s) off so they're not raycast-pickable in the viewport
// and their selection ring disappears. Indices arrive as a JSON string
// (ExecuteScriptAsync can't pass arrays cleanly).
window.setPoseBoneVisibility = function (indicesJson, visible) {
  if (!poseMode || poseJointHandles.length === 0) return;
  let indices;
  try { indices = JSON.parse(indicesJson || '[]'); }
  catch { return; }
  if (!Array.isArray(indices)) return;
  const show = visible !== false;
  let detachedGizmo = false;
  for (const idx of indices) {
    const bone = poseBones[idx];
    if (!bone) continue;
    for (const h of poseJointHandles) {
      if (h.userData.poseBone !== bone) continue;
      h.userData.regionHidden = !show;
      // Pickers stay raycastable when the region is shown.
      if (h.userData.isPicker) h.visible = show;
    }
    // If the hidden group contained the currently-selected bone, detach
    // the gizmo so it doesn't hang in mid-air over an invisible joint.
    if (!show && poseSelection.length > 0 && poseSelection[poseSelection.length - 1] === bone) {
      transformControls.detach();
      poseSelection = [];
      posePickedBone = null;
      detachedGizmo = true;
    }
  }
  refreshPoseJointDots();
  if (detachedGizmo) updatePoseHud();
  requestRender();
};

// Compute the R-side counterpart name for a given bone name by applying
// the inverse of the side-marker rules used by the host's classifier.
// Returns null if the name has no detectable side marker.
function poseFindMirrorName(name) {
  const n = name || '';
  // Most specific first — order matters because some markers are
  // substrings of others ("_LeftArm" contains "_L" if matched naively).
  if (/_L_/.test(n)) return n.replace(/_L_/g, '_R_');
  if (/_R_/.test(n)) return n.replace(/_R_/g, '_L_');
  if (/_Left_/i.test(n)) return n.replace(/_Left_/ig, m => m[0] + 'Right' + m[m.length - 1]);
  if (/_Right_/i.test(n)) return n.replace(/_Right_/ig, m => m[0] + 'Left' + m[m.length - 1]);
  if (/Left/.test(n) && !/Lefts/.test(n)) return n.replace(/Left/g, 'Right');
  if (/Right/.test(n)) return n.replace(/Right/g, 'Left');
  if (/\.L$/.test(n)) return n.replace(/\.L$/, '.R');
  if (/\.R$/.test(n)) return n.replace(/\.R$/, '.L');
  if (/_L$/.test(n)) return n.replace(/_L$/, '_R');
  if (/_R$/.test(n)) return n.replace(/_R$/, '_L');
  return null;
}

// Mirror the current pose across the rig's central plane. For each
// L-side bone we copy its quaternion to the corresponding R-side bone
// with y/z negated — the standard "mirror around local X" rule that
// works for both Mixamo and GTA's SKEL_* conventions. Rigs with
// non-standard bind orientations may need a manual touch-up; this is
// best-effort, not a guaranteed-perfect mirror.
window.mirrorPose = function () {
  if (!poseMode) return 0;
  const byName = new Map();
  for (const b of poseBones) byName.set(b.name, b);

  // Capture full-rig state so the mirror is undoable in one step.
  const before = snapshotAllPoseQuats();

  let count = 0;
  const visited = new Set();
  for (const b of poseBones) {
    if (visited.has(b)) continue;
    const partner = poseFindMirrorName(b.name);
    if (!partner) continue;
    const pBone = byName.get(partner);
    if (!pBone || pBone === b) continue;
    // Determine which is L and which is R by checking the original name.
    // We always copy left -> right; the inverse direction is handled by
    // a second pass below (since visited marks the partner).
    const isLeft = /_L_|_Left_|\.L$|_L$|Left/.test(b.name) && !/Lefts/.test(b.name);
    const src = isLeft ? b : pBone;
    const dst = isLeft ? pBone : b;
    dst.quaternion.set(src.quaternion.x, -src.quaternion.y, -src.quaternion.z, src.quaternion.w);
    visited.add(b);
    visited.add(pBone);
    count++;
  }

  if (count > 0) {
    const after = snapshotAllPoseQuats();
    pushHistory({ kind: 'mirror', payload: { before, after, pairs: count } });
  }

  // Force the SkinnedMesh to re-evaluate its bone matrices on the next
  // frame so the mesh deforms to match the mirrored pose.
  requestRender();
  fosTelemetry.info('pose', `mirrored ${count} bone pair(s)`);
  postToHost({ kind: 'pose-mirrored', pairs: count });
  return count;
};

// ════════════════════════════════════════════════════════════════════
// TIMELINE / KEYFRAMES
//
// A keyframe is a snapshot of every posable bone's local quaternion at a
// given time t in seconds. Playback slerps between bracketing keyframes.
// Bones never explicitly touched by the user stay at their bind rotation
// throughout (we snapshot all bones every keyframe -- the writer can
// drop unchanged channels later for the .ycd compaction pass).
//
// .ycd export side stays single-pose for v9 -- it bakes whatever pose
// is showing at the current scrub time. Multi-frame .ycd writer that
// emits keyframed channels lands in v10.
// ════════════════════════════════════════════════════════════════════
// State is declared up at module-top (see TIMELINE_STATE block earlier)
// because tick() calls poseTimelineTick() which references posePlaying --
// `let` variables hit TDZ if accessed before their declaration runs.

function poseCloneTimelineData(value) {
  if (value == null) return value;
  return JSON.parse(JSON.stringify(value));
}

function poseEnsureKeyId(key, preferredId) {
  if (key.id == null || key.id === '')
    key.id = (preferredId != null && preferredId !== '') ? preferredId : `key-${poseKeyNextId++}`;
  const generated = /^key-(\d+)$/.exec(String(key.id));
  if (generated) poseKeyNextId = Math.max(poseKeyNextId, +generated[1] + 1);
  return key.id;
}

function poseEnsureAllKeyIds() {
  for (const key of poseKeyframes) poseEnsureKeyId(key);
}

// Snapshot the CURRENT pose state for every visible bone. Used by
// addKeyframe and by the "pre-play" save so resuming playback from an
// unchanged frame doesn't snap the user's in-flight edits.
function poseSnapshot() {
  return poseBones.map((b, i) => ({
    i,
    q: [b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w],
  }));
}

function poseApplySnapshot(snap) {
  // Apply a snapshot back onto the bones. Defensive on length mismatch
  // (e.g. keyframes captured before the user reloaded the rig).
  for (const e of snap) {
    if (e.i < 0 || e.i >= poseBones.length) continue;
    poseBones[e.i].quaternion.set(e.q[0], e.q[1], e.q[2], e.q[3]);
  }
}

// Root-motion companion to poseApplySnapshot: place SKEL_ROOT at
// base + the keyframe's offset (or back at base when the keyframe carries
// no root track). No-op unless a video clip populated poseRootTarget.
// Root-motion companion to poseApplySnapshot: place SKEL_ROOT at
// base + the keyframe's offset (or back at base when the keyframe carries
// no root track). No-op unless a video clip populated poseRootTarget.
function poseGetCurrentRootOffset() {
  if (poseStrips.length > 0) {
    // Topmost layer wins — mirror poseEvaluateStrips' compositing order.
    const ordered = poseStrips.slice().sort((a, b) => (b.lane || 0) - (a.lane || 0));
    for (const s of ordered) {
      const stripEnd = s.start + s.duration;
      if (poseTime < s.start - 1e-4 || poseTime > stripEnd + 1e-4) continue;
      const c = poseClips.find(x => x.id === s.clipId);
      if (!c) continue;
      const srcStart = (typeof s.sourceStart === 'number') ? s.sourceStart : 0;
      const srcEnd = (typeof s.sourceEnd === 'number') ? s.sourceEnd : c.duration;
      let local = (poseTime - s.start) * (s.timeScale || 1) + srcStart;
      local = Math.max(srcStart, Math.min(srcEnd, local));
      const r = poseSampleClipRoot(c, local);
      return r || [0, 0, 0];
    }
    return [0, 0, 0];
  }
  if (poseKeyframes.length === 0) return [0, 0, 0];
  if (poseKeyframes.length === 1 || poseTime <= poseKeyframes[0].time)
    return poseKeyframes[0].root || [0, 0, 0];
  if (poseTime >= poseKeyframes[poseKeyframes.length - 1].time)
    return poseKeyframes[poseKeyframes.length - 1].root || [0, 0, 0];
  let i = 0;
  while (i < poseKeyframes.length - 1 && poseKeyframes[i + 1].time <= poseTime) i++;
  const a = poseKeyframes[i], b = poseKeyframes[i + 1];
  const span = b.time - a.time;
  const alpha = span > 1e-6 ? (poseTime - a.time) / span : 0;
  const ar = a.root || [0, 0, 0], br = b.root || [0, 0, 0];
  return [
    ar[0] + (br[0] - ar[0]) * alpha,
    ar[1] + (br[1] - ar[1]) * alpha,
    ar[2] + (br[2] - ar[2]) * alpha,
  ];
}

// After the user moves the whole model (gizmo / snap / sidebar), re-base
// root motion so playback keeps the new height instead of snapping back.
function poseSyncRootBaseFromCurrentPosition() {
  if (!poseRootTarget || !poseRootBase) return;
  const off = poseGetCurrentRootOffset();
  poseRootBase.set(
    poseRootTarget.position.x - off[0],
    poseRootTarget.position.y - off[1],
    poseRootTarget.position.z - off[2]
  );
  poseRootTarget.userData = poseRootTarget.userData || {};
  poseRootTarget.userData._poseBasePos = poseRootBase.clone();
}

function poseApplyPreviewFootIk() {
  if (!posePreviewFootIk || !poseMode || !currentModel) return;
  // Baked imports (Cascadeur/Mixamo/FBX) already went through C# retarget +
  // foot-lock. Nudging root Y every frame from foot height fights the clip
  // and reads as shake/jitter — especially on walk cycles.
  if (poseKeyframeSource === 'anim-import') return;
  if (poseStrips.some(s => {
    const c = poseClips.find(x => x.id === s.clipId);
    return c && c.kind === 'imported';
  })) return;
  let mesh = null;
  currentModel.traverse(o => { if (o.isSkinnedMesh) mesh = o; });
  if (!mesh?.skeleton) return;
  mesh.updateMatrixWorld(true);
  let minY = Infinity;
  for (const bone of mesh.skeleton.bones) {
    const n = (bone.name || '').toUpperCase();
    if (!n.includes('FOOT') || n.includes('TOE')) continue;
    bone.getWorldPosition(_poseFootTmp);
    if (_poseFootTmp.y < minY) minY = _poseFootTmp.y;
  }
  if (!isFinite(minY) || minY < 0.008 || minY > 0.35) return;
  if (poseRootTarget && !poseSuppressRootApply)
    poseRootTarget.position.y -= minY;
}

// Mover HEADING (yaw about world up, radians, frame-0-relative — .ycd
// Track 6). Turning clips animate the legs through the turn; without
// rotating the body to match, planted feet skate sideways. Yaw
// premultiplies the base orientation so it turns about world up no
// matter how the model itself is spun (freemode 180° etc.).
function poseApplyRootYaw(yaw) {
  if (!poseRootTarget || !poseRootBaseQuat || poseSuppressRootApply) return;
  if (typeof yaw === 'number' && isFinite(yaw)) {
    if (!poseUpAxis) poseUpAxis = new THREE.Vector3(0, 1, 0);
    poseRootTarget.quaternion.setFromAxisAngle(poseUpAxis, yaw).multiply(poseRootBaseQuat);
    poseRootYawApplied = true;
  } else if (poseRootYawApplied) {
    // Clip without heading data — put the base orientation back once.
    poseRootTarget.quaternion.copy(poseRootBaseQuat);
    poseRootYawApplied = false;
  }
}

function poseApplyRoot(rootArr, yaw) {
  if (!poseRootTarget || !poseRootBase) return;
  if (poseSuppressRootApply) return;
  // In-place preview keeps the VERTICAL root (crouch / hop — the performance)
  // but drops the HORIZONTAL travel + heading, so the ped dances in place
  // instead of sliding. The full mover stays in the keyframes for export.
  if (Array.isArray(rootArr)) {
    poseRootTarget.position.set(
      poseRootBase.x + (poseRootMotionPreview ? rootArr[0] : 0),
      poseRootBase.y + rootArr[1],
      poseRootBase.z + (poseRootMotionPreview ? rootArr[2] : 0));
  } else {
    poseRootTarget.position.copy(poseRootBase);
  }
  poseApplyRootYaw(poseRootMotionPreview ? yaw : undefined);
}

// Toggle whether the PREVIEW slides the ped along the clip's root mover. Called
// from the host when the Movement dropdown changes (In Place → false, Root
// Motion → true). Snaps the ped back to base immediately when turning off so a
// paused frame updates without needing a scrub.
window.poseSetRootMotionPreview = function (enabled) {
  poseRootMotionPreview = enabled !== false;
  try {
    if (!poseRootMotionPreview && poseRootTarget && poseRootBase) {
      poseRootTarget.position.x = poseRootBase.x;   // drop horizontal travel now,
      poseRootTarget.position.z = poseRootBase.z;   // keep .y (crouch / hop)
      poseApplyRootYaw(undefined);
    }
  } catch (e) { /* best effort */ }
  return poseRootMotionPreview;
};

// Pose save / apply use window.getPose + window.applyPose (defined
// further down — schema includes rest_xyzw + parent name + version
// stamp). The shorter snapshot helpers that briefly lived here were a
// duplicate; the host now uses the richer pair exclusively.


// ─── Clip library ────────────────────────────────────────────────────
// Send the metadata view of poseClips to the host so the Outliner can
// list available clips. Three.js objects (THREE.AnimationClip, tracks)
// stay on this side; the host only needs id/name/kind/duration to draw
// the list and request actions back.
function postClipLibrary() {
  postToHost({
    kind: 'clip-library-update',
    clips: poseClips.map(c => ({
      id: c.id,
      name: c.name,
      kind: c.kind,
      duration: c.duration,
      trackCount: c.clip ? c.clip.tracks.length : 0,
    })),
  });
}

// Register a THREE.AnimationClip in the library. Returns the assigned
// id so callers (importer, baker) can reference the new entry.
// meta.roots: [{t, v:[x,y,z]}] per-frame root offsets for travel.
function registerClip(name, kind, clip, meta) {
  meta = meta || {};
  const clipId = meta.id != null ? meta.id : poseClipNextId++;
  if (typeof clipId === 'number') poseClipNextId = Math.max(poseClipNextId, clipId + 1);
  const entry = {
    id: clipId,
    name: name || (clip && clip.name) || `clip_${poseClipNextId}`,
    kind,
    duration: clip ? clip.duration : 0,
    clip,
    roots: meta.roots || null,
    source: meta.source || null,
    boneSpace: meta.boneSpace || 'glb',
    rawTracks: (clip && clip.userData && clip.userData.rawTracks) || null,
    // Keep the editable/import representation alongside the optimized
    // THREE.AnimationClip. The strip player still uses .clip/.rawTracks,
    // while timeline clients can reopen the original keys losslessly.
    editableKeys: poseCloneTimelineData(meta.editableKeys || null),
    sourceData: poseCloneTimelineData(meta.sourceData || null),
  };
  entry.tracks = (clip?.tracks || []).map((track, index) => ({
    id: `track-${entry.id}-${index + 1}`,
    index,
    name: track.name || `track_${index + 1}`,
    valueSize: typeof track.getValueSize === 'function' ? track.getValueSize() : null,
    keyIds: Array.from(track.times || [], (_, keyIndex) => `track-${entry.id}-${index + 1}-key-${keyIndex + 1}`),
    eases: Array.from(track.times || [], () => 'auto'),
    locked: false,
    muted: false,
  }));
  poseClips.push(entry);
  postClipLibrary();
  return entry.id;
}

// Drop all 'imported' clips. Called from clearModel() so swapping rigs
// doesn't leave stale clips bound to a SkinnedMesh that's already been
// disposed. Pose-baked clips survive — they're authored against the
// active rig and the user expects them to persist.
function clearImportedClips() {
  const removedIds = new Set(poseClips.filter(c => c.kind === 'imported').map(c => c.id));
  const before = poseClips.length;
  poseClips = poseClips.filter(c => c.kind !== 'imported');
  // Drop strips that referenced clips we just removed — leaving a
  // strip with a dangling clipId would show "(missing)" in the host
  // list and silently produce no bones on playback.
  let stripsBefore = poseStrips.length;
  poseStrips = poseStrips.filter(s => !removedIds.has(s.clipId));
  if (poseClips.length !== before) postClipLibrary();
  if (poseStrips.length !== stripsBefore) postStripsUpdate();
}

// Build a THREE.AnimationClip from the current poseKeyframes array.
// Only bones that received at least one keyed rotation contribute a
// track — silent bones stay at their bind pose when the clip plays.
// Times are normalised so the clip starts at zero: the caller is
// responsible for positioning the resulting strip at the original
// first-keyframe time. Without this, a clip with keys at [2s, 5s]
// would render as a 5s strip with 2s of dead start time before any
// motion happens. Throws if there are fewer than 2 keyframes — a
// single-key clip would have no animation to advance through.
function bakeKeyframesToClip(name) {
  if (poseKeyframes.length < 2) {
    throw new Error('Need at least 2 keyframes to bake a clip');
  }
  if (!poseBones.length) throw new Error('No rig active');

  const sorted = poseKeyframes.slice().sort((a, b) => a.time - b.time);
  const firstTime = sorted[0].time;
  const times = sorted.map(k => k.time - firstTime);

  // Collect per-bone quaternion sequences keyed by normalised time.
  // Bones not present in a given keyframe inherit the previous keyed
  // value; bones never touched get no track (skipped at SkinnedMesh).
  const byBone = new Map();
  for (let i = 0; i < sorted.length; i++) {
    const k = sorted[i];
    const tNorm = times[i];
    for (const e of k.bones) {
      if (e.i < 0 || e.i >= poseBones.length) continue;
      if (!byBone.has(e.i)) byBone.set(e.i, new Map());
      byBone.get(e.i).set(tNorm, e.q);
    }
  }

  const tracks = [];
  for (const [boneIdx, keyedAtTime] of byBone) {
    const bone = poseBones[boneIdx];
    if (!bone || !bone.name) continue;
    const values = new Float32Array(times.length * 4);
    // Forward-fill: any frame missing this bone gets the previous keyed
    // value (or the bind quaternion before the first key).
    let lastQ = [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w];
    for (let i = 0; i < times.length; i++) {
      const q = keyedAtTime.get(times[i]);
      if (q) lastQ = q;
      values[i * 4 + 0] = lastQ[0];
      values[i * 4 + 1] = lastQ[1];
      values[i * 4 + 2] = lastQ[2];
      values[i * 4 + 3] = lastQ[3];
    }
    tracks.push(new THREE.QuaternionKeyframeTrack(`${bone.name}.quaternion`, times, values));
  }

  const duration = times[times.length - 1];
  const clip = new THREE.AnimationClip(name, duration, tracks);
  // Root-motion samples (travel) ride alongside the quaternion tracks.
  // userData isn't guaranteed to exist on every three.js AnimationClip
  // build, so create it before writing.
  const roots = sorted.map((k, i) => ({
    t: times[i],
    v: Array.isArray(k.root) ? [k.root[0], k.root[1], k.root[2]] : [0, 0, 0],
  }));
  if (!clip.userData) clip.userData = {};
  clip.userData.roots = roots;
  return clip;
}

// Pick the next unused "Pose Clip N" name. Beats a timestamp slug for
// readability and stays unique because we scan existing entries.
function generatePoseClipName() {
  let n = 1;
  while (poseClips.some(c => c.name === `Pose Clip ${n}`)) n++;
  return `Pose Clip ${n}`;
}

window.poseBakeToClip = function (name, metadata) {
  if (poseKeyframes.length < 2) {
    throw new Error('Need at least 2 keyframes to bake a clip');
  }
  poseEnsureAllKeyIds();
  const trimmed = (name || '').trim() || generatePoseClipName();
  const sorted = poseKeyframes.slice().sort((a, b) => a.time - b.time);
  const firstTime = sorted[0].time;
  const clip = bakeKeyframesToClip(trimmed);
  const kind = (poseKeyframeSource === 'anim-import' || poseKeyframeSource === 'video-import' || poseKeyframeSource === 'ycd-import')
    ? 'imported' : 'pose';
  const clipId = registerClip(trimmed, kind, clip, {
    roots: (clip.userData && clip.userData.roots) || null,
    source: poseKeyframeSource || 'editor',
    boneSpace: poseBoneSpace || 'glb',
    editableKeys: sorted,
    sourceData: metadata && metadata.sourceData,
  });
  window.poseAddStrip(clipId, firstTime);
  poseKeyframes = [];
  postToHost({
    kind: 'pose-timeline-update',
    keyframes: [],
    time: poseTime,
    duration: poseDuration,
    fps: poseFps,
    playing: posePlaying,
    loop: poseLoop,
  });
  return clipId;
};

window.poseGetClipLibrary = function () {
  return poseClips.map(c => ({
    id: c.id, name: c.name, kind: c.kind, duration: c.duration,
    trackCount: c.tracks?.length || 0,
    editableKeyCount: c.editableKeys?.length || 0,
  }));
};

window.poseDeleteClip = function (id) {
  const i = poseClips.findIndex(c => c.id === id);
  if (i < 0) return false;
  poseClips.splice(i, 1);
  // Strips referring to the deleted clip become dangling — drop them
  // so the user sees the library and timeline stay consistent.
  const stripsBefore = poseStrips.length;
  poseStrips = poseStrips.filter(s => s.clipId !== id);
  postClipLibrary();
  if (poseStrips.length !== stripsBefore) postStripsUpdate();
  return true;
};

window.poseRenameClip = function (id, newName) {
  const c = poseClips.find(c => c.id === id);
  if (!c) return false;
  const trimmed = (newName || '').trim();
  if (!trimmed) return false;
  c.name = trimmed;
  postClipLibrary();
  return true;
};

// ─── NLA Strips ──────────────────────────────────────────────────────
// Strips are timed placements of library clips on the timeline. M2 is
// single-lane; the strip-track canvas in the host XAML sits above the
// existing keyframe track and shares the same time axis.
//
// Mixer model: one poseStripMixer rebuilt whenever the rig's root
// changes (model swap). Each strip lazy-binds a paused AnimationAction
// via clipAction(); per tick we set action.time directly and call
// mixer.update(0) to apply. Paused actions don't advance themselves,
// which lets us drive playback from the host scrubber without three.js
// fighting the timeline's own time math.

// Pick the root the strip mixer should bind to. AnimationClip tracks
// reference bones by name (e.g. "SKEL_Pelvis.quaternion"), so the root
// just needs to be an ancestor that contains every bone — the active
// model's root works for both pose-baked and imported clips.
function poseStripsResolveRoot() {
  if (poseBones.length && poseBones[0].parent) {
    let n = poseBones[0];
    while (n.parent && n.parent.parent) n = n.parent;
    return n;
  }
  return currentModel || referenceModel || scene;
}

function poseStripsEnsureMixer() {
  const root = poseStripsResolveRoot();
  if (!root) return null;
  if (poseStripMixer && poseStripMixerRoot === root) return poseStripMixer;
  // Root changed (or first use). Drop any actions bound to the old
  // root; lazy-rebind happens next time a strip is evaluated.
  if (poseStripMixer) {
    poseStripMixer.stopAllAction();
    poseStripMixer.uncacheRoot(poseStripMixerRoot);
  }
  poseStripMixer = new THREE.AnimationMixer(root);
  poseStripMixerRoot = root;
  for (const s of poseStrips) s.action = null;
  return poseStripMixer;
}

function poseStripsResetMixer() {
  if (poseStripMixer) {
    poseStripMixer.stopAllAction();
    poseStripMixer.uncacheRoot(poseStripMixerRoot);
    poseStripMixer = null;
    poseStripMixerRoot = null;
  }
  for (const s of poseStrips) s.action = null;
}

function postStripsUpdate() {
  postToHost({
    kind: 'strip-list-update',
    strips: poseStrips.map(s => {
      const c = poseClips.find(c => c.id === s.clipId);
      return {
        id: s.id,
        clipId: s.clipId,
        clipName: c ? c.name : '(missing)',
        kind: c ? c.kind : 'pose',
        start: s.start,
        duration: s.duration,
        sourceStart: s.sourceStart,
        sourceEnd: s.sourceEnd,
        fadeIn: s.fadeIn,
        fadeOut: s.fadeOut,
        fadeInEase: s.fadeInEase || 'linear',
        fadeOutEase: s.fadeOutEase || 'linear',
        lane: s.lane || 0,
      };
    }),
  });
}

window.poseAddStrip = function (clipId, atTime, lane) {
  const c = poseClips.find(c => c.id === clipId);
  if (!c || !c.clip) return null;
  const start = (typeof atTime === 'number') ? atTime : poseTime;
  const strip = {
    id: poseStripNextId++,
    clipId,
    start: Math.max(0, +start.toFixed(3)),
    duration: c.duration,
    timeScale: 1.0,
    sourceStart: 0,
    sourceEnd: c.duration,
    fadeIn: 0,
    fadeOut: 0,
    fadeInEase: 'linear',
    fadeOutEase: 'linear',
    // Layer row (0 = base). Strips on higher lanes composite OVER lower
    // ones where they overlap in time (poseEvaluateStrips sorts by lane).
    lane: Math.max(0, (typeof lane === 'number' ? lane : 0) | 0),
    action: null,
  };
  poseStrips.push(strip);
  // Grow timeline if the strip extends past current end so it doesn't
  // get clipped off-screen the moment it's added.
  const stripEnd = strip.start + strip.duration;
  if (stripEnd > poseDuration) {
    poseDuration = +stripEnd.toFixed(3);
    postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying, loop: poseLoop });
  }
  postStripsUpdate();
  requestRender();
  return strip.id;
};

window.poseRemoveStrip = function (stripId) {
  const i = poseStrips.findIndex(s => s.id === stripId);
  if (i < 0) return false;
  const s = poseStrips[i];
  if (s.action) { s.action.stop(); s.action = null; }
  poseStrips.splice(i, 1);
  postStripsUpdate();
  requestRender();
  return true;
};

window.poseMoveStrip = function (stripId, newStart) {
  const s = poseStrips.find(s => s.id === stripId);
  if (!s) return false;
  s.start = Math.max(0, +newStart.toFixed(3));
  postStripsUpdate();
  requestRender();
  return true;
};

// Commit a full trim range after the host drag handles finish.
window.poseSetStripRange = function (stripId, start, duration, sourceStart, sourceEnd) {
  const s = poseStrips.find(x => x.id === stripId);
  if (!s) return false;
  s.start = Math.max(0, +start);
  s.duration = Math.max(0.05, +duration);
  s.sourceStart = Math.max(0, +sourceStart);
  s.sourceEnd = Math.max(s.sourceStart + 0.05, +sourceEnd);
  if (s.action) { s.action.stop(); s.action = null; }
  postStripsUpdate();
  requestRender();
  return true;
};

// Set fade-in and fade-out for a strip. Either argument can be -1 to
// leave that side unchanged (so the right-click menu items can update
// just one edge without echoing the other back to whatever it was).
// Fades are clamped to the strip's duration since a ramp longer than
// the strip would never reach weight 1.
window.poseSetStripFade = function (stripId, fadeIn, fadeOut) {
  const s = poseStrips.find(s => s.id === stripId);
  if (!s) return false;
  const maxRamp = s.duration;
  if (fadeIn >= 0)  s.fadeIn  = Math.max(0, Math.min(maxRamp, +fadeIn.toFixed(3)));
  if (fadeOut >= 0) s.fadeOut = Math.max(0, Math.min(maxRamp, +fadeOut.toFixed(3)));
  postStripsUpdate();
  requestRender();
  return true;
};

window.poseSetStripFadeEase = function (stripId, fadeInEase, fadeOutEase) {
  const s = poseStrips.find(s => s.id === stripId);
  if (!s) return false;
  if (fadeInEase) s.fadeInEase = fadeInEase;
  if (fadeOutEase) s.fadeOutEase = fadeOutEase;
  postStripsUpdate();
  requestRender();
  return true;
};

window.poseSetClipTrackEnabled = function (enabled) {
  poseClipTrackEnabled = !!enabled;
  if (!poseClipTrackEnabled && poseStripMixer) {
    for (const s of poseStrips) {
      if (s.action) { s.action.enabled = false; s.action.weight = 0; }
    }
    poseStripMixer.update(0);
  }
  requestRender();
  return true;
};

window.poseGetStrips = function () {
  return poseStrips.map(s => ({
    id: s.id, clipId: s.clipId, start: s.start, duration: s.duration,
    sourceStart: s.sourceStart, sourceEnd: s.sourceEnd,
  }));
};

// Strip at the playhead (or the sole strip when only one exists).
window.poseActiveStripId = function () {
  // Topmost layer under the playhead wins (matches compositing order).
  const ordered = poseStrips.slice().sort((a, b) => (b.lane || 0) - (a.lane || 0));
  for (const s of ordered) {
    if (poseTime >= s.start - 1e-4 && poseTime <= s.start + s.duration + 1e-4) return s.id;
  }
  return poseStrips.length === 1 ? poseStrips[0].id : null;
};

// True when the timeline has something to play or export.
window.poseHasAnimatedContent = function () {
  return poseKeyframes.length >= 2 || poseStrips.length > 0;
};

function poseSampleClipRoot(clipEntry, localT) {
  const roots = clipEntry && clipEntry.roots;
  if (!roots || roots.length < 1) return null;
  if (localT <= roots[0].t) return roots[0].v;
  if (localT >= roots[roots.length - 1].t) return roots[roots.length - 1].v;
  for (let i = 1; i < roots.length; i++) {
    if (roots[i].t >= localT) {
      const a = roots[i - 1], b = roots[i];
      const span = b.t - a.t;
      const u = span > 1e-6 ? (localT - a.t) / span : 0;
      return [
        a.v[0] + (b.v[0] - a.v[0]) * u,
        a.v[1] + (b.v[1] - a.v[1]) * u,
        a.v[2] + (b.v[2] - a.v[2]) * u,
      ];
    }
  }
  return roots[roots.length - 1].v;
}

// Trim strip start to the playhead (Set In).
window.poseSetStripIn = function (stripId, atTime) {
  const s = poseStrips.find(x => x.id === stripId);
  if (!s) return false;
  const t = (typeof atTime === 'number') ? atTime : poseTime;
  const end = s.start + s.duration;
  if (t <= s.start + 0.02 || t >= end - 0.02) return false;
  const trim = t - s.start;
  s.sourceStart = +(s.sourceStart + trim).toFixed(3);
  s.start = +t.toFixed(3);
  s.duration = +(end - t).toFixed(3);
  if (s.action) { s.action.stop(); s.action = null; }
  postStripsUpdate();
  requestRender();
  return true;
};

// Trim strip end to the playhead (Set Out).
window.poseSetStripOut = function (stripId, atTime) {
  const s = poseStrips.find(x => x.id === stripId);
  if (!s) return false;
  const t = (typeof atTime === 'number') ? atTime : poseTime;
  if (t <= s.start + 0.02 || t >= s.start + s.duration - 0.02) return false;
  const newDur = t - s.start;
  s.sourceEnd = +(s.sourceStart + newDur).toFixed(3);
  s.duration = +newDur.toFixed(3);
  if (s.action) { s.action.stop(); s.action = null; }
  postStripsUpdate();
  requestRender();
  return true;
};

// Split a strip at the playhead into two adjacent clips.
window.poseSplitStrip = function (stripId, atTime) {
  const s = poseStrips.find(x => x.id === stripId);
  if (!s) return null;
  const t = (typeof atTime === 'number') ? atTime : poseTime;
  const end = s.start + s.duration;
  if (t <= s.start + 0.02 || t >= end - 0.02) return null;
  const offset = t - s.start;
  if (s.action) { s.action.stop(); s.action = null; }
  const rightId = poseStripNextId++;
  poseStrips.push({
    id: rightId,
    clipId: s.clipId,
    start: +t.toFixed(3),
    duration: +(end - t).toFixed(3),
    timeScale: s.timeScale,
    sourceStart: +(s.sourceStart + offset).toFixed(3),
    sourceEnd: s.sourceEnd,
    fadeIn: 0,
    fadeOut: 0,
    fadeInEase: 'linear',
    fadeOutEase: 'linear',
    lane: s.lane || 0,
    action: null,
  });
  s.sourceEnd = +(s.sourceStart + offset).toFixed(3);
  s.duration = +offset.toFixed(3);
  postStripsUpdate();
  requestRender();
  return rightId;
};

// ─── Professional timeline document / command API ───────────────────
// This API is intentionally additive. Existing pose* functions keep their
// numeric clip/strip contracts; editor clients get stable key/track IDs and a
// serialisable document without reaching into the live three.js objects.
function posePublicStrip(s) {
  return {
    id: s.id,
    trackId: 'track-strips-' + ((s.lane || 0) + 1),
    lane: s.lane || 0,
    clipId: s.clipId,
    start: s.start,
    duration: s.duration,
    timeScale: s.timeScale || 1,
    sourceStart: s.sourceStart,
    sourceEnd: s.sourceEnd,
    fadeIn: s.fadeIn || 0,
    fadeOut: s.fadeOut || 0,
    fadeInEase: s.fadeInEase || 'linear',
    fadeOutEase: s.fadeOutEase || 'linear',
  };
}

function posePublicEditableKey(k) {
  return {
    id: poseEnsureKeyId(k),
    trackId: 'track-pose-keys',
    time: k.time,
    ease: k.ease || 'auto',
    root: poseCloneTimelineData(k.root || null),
    bones: poseCloneTimelineData(k.bones || []),
  };
}

function poseClipTrackSnapshot(c, trackMeta) {
  const track = c.clip?.tracks?.[trackMeta.index];
  const times = Array.from(track?.times || []);
  return {
    id: trackMeta.id,
    clipId: c.id,
    name: trackMeta.name,
    valueSize: trackMeta.valueSize,
    keyCount: times.length,
    keys: times.map((time, index) => ({
      id: trackMeta.keyIds[index],
      trackId: trackMeta.id,
      time,
      ease: trackMeta.eases?.[index] || 'auto',
    })),
  };
}

function poseRefreshClipTrackMetadata(c, previousTracks) {
  const priorByName = new Map((previousTracks || c.tracks || []).map(t => [t.name, t]));
  c.tracks = (c.clip?.tracks || []).map((track, index) => {
    const prior = priorByName.get(track.name);
    const id = prior?.id || `track-${c.id}-${index + 1}`;
    return {
      id,
      index,
      name: track.name || `track_${index + 1}`,
      valueSize: typeof track.getValueSize === 'function' ? track.getValueSize() : null,
      keyIds: Array.from(track.times || [], (_, keyIndex) =>
        prior?.keyIds?.[keyIndex] || `${id}-key-${keyIndex + 1}`),
      eases: Array.from(track.times || [], (_, keyIndex) =>
        prior?.eases?.[keyIndex] || 'auto'),
      locked: prior?.locked || false,
      muted: prior?.muted || false,
    };
  });
}

function poseRebuildEditableClip(c) {
  if (!c || !Array.isArray(c.editableKeys)) return false;
  const sorted = c.editableKeys.slice().sort((a, b) => a.time - b.time);
  c.editableKeys = sorted;
  const first = sorted[0]?.time || 0;
  const byBone = new Map();
  for (const key of sorted) {
    for (const bone of key.bones || []) {
      if (bone.i == null || !Array.isArray(bone.q)) continue;
      if (!byBone.has(bone.i)) byBone.set(bone.i, []);
      byBone.get(bone.i).push({ time: Math.max(0, key.time - first), q: bone.q });
    }
  }
  const tracks = [];
  for (const [boneIndex, keys] of byBone) {
    const bone = poseBones[boneIndex];
    if (!bone?.name || !keys.length) continue;
    const times = keys.map(k => k.time);
    const values = keys.flatMap(k => k.q.slice(0, 4));
    tracks.push(new THREE.QuaternionKeyframeTrack(`${bone.name}.quaternion`, times, values));
  }
  const previousTracks = c.tracks;
  c.duration = sorted.length > 1 ? Math.max(0, sorted[sorted.length - 1].time - first) : 0;
  c.clip = new THREE.AnimationClip(c.name, c.duration, tracks);
  c.roots = sorted.map(k => ({
    t: Math.max(0, k.time - first),
    v: Array.isArray(k.root) ? k.root.slice(0, 3) : [0, 0, 0],
  }));
  c.clip.userData = { roots: c.roots };
  poseRefreshClipTrackMetadata(c, previousTracks);
  for (const strip of poseStrips) {
    if (String(strip.clipId) !== String(c.id)) continue;
    if (strip.action) strip.action.stop();
    strip.action = null;
    strip.sourceEnd = Math.min(strip.sourceEnd, c.duration);
    strip.duration = Math.min(strip.duration, Math.max(0.05, strip.sourceEnd - strip.sourceStart));
  }
  return true;
}

window.poseGetTimelineDocument = function () {
  poseEnsureAllKeyIds();
  const clips = poseClips.map(c => ({
    id: c.id,
    name: c.name,
    kind: c.kind,
    duration: c.duration,
    source: c.source,
    boneSpace: c.boneSpace,
    editableKeys: (c.editableKeys || []).map(k => ({
      id: poseEnsureKeyId(k),
      time: k.time,
      ease: k.ease || 'auto',
    })),
    tracks: (c.tracks || []).map(t => poseClipTrackSnapshot(c, t)),
    rawTracks: (c.rawTracks || []).map((track, index) => ({
      id: `raw-track-${c.id}-${index + 1}`,
      clipId: c.id,
      name: track.name || `track_${index + 1}`,
      quaternionKeyIds: Array.from(track.q || [], (_, keyIndex) =>
        `raw-track-${c.id}-${index + 1}-q-key-${keyIndex + 1}`),
      positionKeyIds: Array.from(track.p || [], (_, keyIndex) =>
        `raw-track-${c.id}-${index + 1}-p-key-${keyIndex + 1}`),
    })),
  }));
  return {
    schema: 'fiveos-professional-animation-timeline',
    version: 1,
    duration: poseDuration,
    fps: poseFps,
    time: poseTime,
    playing: posePlaying,
    loop: poseLoop,
    tracks: [
      // One strips lane per used layer (always at least the base lane).
      ...Array.from(
        { length: Math.max(0, ...poseStrips.map(s => (s.lane || 0))) + 1 },
        (_, lane) => ({
          id: 'track-strips-' + (lane + 1),
          type: 'strips',
          name: lane === 0 ? 'Clips' : `Layer ${lane + 1}`,
          lane,
          stripIds: poseStrips.filter(s => (s.lane || 0) === lane).map(s => s.id),
        })),
      {
        id: 'track-pose-keys',
        type: 'pose-keys',
        name: 'Summary',
        keyIds: poseKeyframes.map(k => poseEnsureKeyId(k)),
        keys: poseKeyframes.map(k => ({
          id: poseEnsureKeyId(k), time: k.time, ease: k.ease || 'auto',
        })),
      },
      {
        id: 'track-root-motion',
        type: 'root-motion',
        name: 'Root Motion',
        depth: 0,
        keys: poseClips.flatMap(c => (c.roots || []).map((root, index) => ({
          id: `root-${c.id}-key-${index + 1}`,
          clipId: c.id,
          time: root.t,
          ease: 'linear',
        }))),
      },
      ...poseClips.flatMap(c => (c.tracks || []).map(track => ({
        ...poseClipTrackSnapshot(c, track),
        type: 'bone-keys',
        parentId: `clip-${c.id}`,
        depth: 1,
        name: (track.name || '').replace(/\.(quaternion|position|scale)$/, ''),
        channel: (/\.(quaternion|position|scale)$/.exec(track.name || '') || [null, 'value'])[1],
        locked: !!track.locked,
        muted: !!track.muted,
      }))),
    ],
    clips,
    strips: poseStrips.map(posePublicStrip),
    keys: poseKeyframes.map(posePublicEditableKey),
  };
};

window.poseGetTimelineDocumentJson = function () {
  return JSON.stringify(window.poseGetTimelineDocument());
};

function poseCaptureTimelineState() {
  poseEnsureAllKeyIds();
  return {
    keyframes: poseCloneTimelineData(poseKeyframes),
    clipKeys: poseClips
      .filter(c => Array.isArray(c.editableKeys))
      .map(c => ({ clipId: c.id, keys: poseCloneTimelineData(c.editableKeys) })),
    clipTracks: poseClips.map(c => ({
      clipId: c.id,
      tracks: (c.tracks || []).map(meta => ({
        trackId: meta.id,
        entries: poseTrackEntries(c, meta),
      })),
    })),
    strips: poseStrips.map(s => ({ ...posePublicStrip(s), action: null })),
    duration: poseDuration,
    time: poseTime,
  };
}

function poseRestoreTimelineState(state) {
  if (!state) return false;
  for (const s of poseStrips) {
    if (s.action) s.action.stop();
  }
  poseKeyframes = poseCloneTimelineData(state.keyframes || []);
  poseEnsureAllKeyIds();
  for (const clipState of state.clipKeys || []) {
    const c = poseClips.find(x => String(x.id) === String(clipState.clipId));
    if (!c) continue;
    c.editableKeys = poseCloneTimelineData(clipState.keys || []);
    poseRebuildEditableClip(c);
  }
  for (const clipState of state.clipTracks || []) {
    const c = poseClips.find(x => String(x.id) === String(clipState.clipId));
    if (!c) continue;
    for (const trackState of clipState.tracks || []) {
      const meta = (c.tracks || []).find(x => String(x.id) === String(trackState.trackId));
      if (meta) poseWriteClipTrackEntries(c, meta, trackState.entries || []);
    }
  }
  poseStrips = (state.strips || []).map(s => ({
    id: s.id,
    clipId: s.clipId,
    start: s.start,
    duration: s.duration,
    timeScale: s.timeScale || 1,
    sourceStart: s.sourceStart,
    sourceEnd: s.sourceEnd,
    fadeIn: s.fadeIn || 0,
    fadeOut: s.fadeOut || 0,
    fadeInEase: s.fadeInEase || 'linear',
    fadeOutEase: s.fadeOutEase || 'linear',
    lane: s.lane || 0,
    action: null,
  }));
  poseDuration = state.duration;
  poseTime = Math.max(0, Math.min(poseDuration, state.time));
  postStripsUpdate();
  postToHost({
    kind: 'pose-timeline-update',
    keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })),
    keyIds: poseKeyframes.map(k => k.id),
    time: poseTime, duration: poseDuration, fps: poseFps,
    playing: posePlaying, loop: poseLoop,
  });
  poseEvaluate(poseTime);
  requestRender();
  return true;
}

function poseCommitTimelineMutation(op, mutate) {
  const before = poseCaptureTimelineState();
  const result = mutate();
  const after = poseCaptureTimelineState();
  if (JSON.stringify(before) === JSON.stringify(after)) {
    return { ok: false, op, reason: 'no-change', result };
  }
  poseTimelineUndo.push({ op, before, after, t: performance.now() });
  if (poseTimelineUndo.length > 100) poseTimelineUndo.shift();

        poseWriteClipTrackEntries(group.clip, group.meta, group.entries);
      for (const source of poseStrips.filter(s => stripIds.has(String(s.id)))) {
        poseDuplicateStrip(source, offset);
        count++;
      }
      poseKeyframes.sort((a, b) => a.time - b.time);
      return count;
    }
    if (op === 'split') {
      const ids = poseIdSet(command.stripIds || command.ids || command.stripId);
      const at = command.atTime != null ? +command.atTime : poseTime;
      let count = 0;
      for (const id of ids) if (window.poseSplitStrip(id, at) != null) count++;
      return count;
    }
    if (op === 'trim') {
      const s = poseStrips.find(x =>
        String(x.id) === poseNormalTimelineId(command.stripId ?? command.id ?? command.ids?.[0]));
      if (!s) return 0;
      if (command.edge === 'in') return window.poseSetStripIn(s.id, command.time ?? command.atTime) ? 1 : 0;
      if (command.edge === 'out') return window.poseSetStripOut(s.id, command.time ?? command.atTime) ? 1 : 0;
      return window.poseSetStripRange(
        s.id,
        command.start ?? s.start,
        command.duration ?? s.duration,
        command.sourceStart ?? s.sourceStart,
        command.sourceEnd ?? s.sourceEnd) ? 1 : 0;

    if (op === 'setEase') {
      let count = 0;
      const keyIds = poseIdSet(command.keyIds || command.ids);
      const validEase = ['auto', 'linear', 'in', 'out', 'hold'];
      const ease = command.ease || command.mode || 'auto';
      if (!validEase.includes(ease)) return 0;
      for (const ref of poseEditableKeyRefs()) {
        if (!keyIds.has(String(poseEnsureKeyId(ref.key)))) continue;
        ref.key.ease = ease;
        count++;
      }
      const groupedTracks = new Map();
      for (const ref of poseClipTrackKeyRefs()) {
        if (!keyIds.has(String(ref.id))) continue;
        const groupKey = `${ref.clip.id}|${ref.meta.id}`;
        if (!groupedTracks.has(groupKey))
          groupedTracks.set(groupKey, { clip: ref.clip, meta: ref.meta, entries: poseTrackEntries(ref.clip, ref.meta) });
        const entry = groupedTracks.get(groupKey).entries.find(x => String(x.id) === String(ref.id));
        if (entry) { entry.ease = ease; count++; }
      }
      for (const group of groupedTracks.values())
        poseWriteClipTrackEntries(group.clip, group.meta, group.entries);
      const stripIds = poseIdSet(command.stripIds || (command.type === 'strip' ? command.ids : null));
      for (const s of poseStrips) {
        if (!stripIds.has(String(s.id))) continue;
        if (command.fadeInEase) s.fadeInEase = command.fadeInEase;
        if (command.fadeOutEase) s.fadeOutEase = command.fadeOutEase;
        count++;
      }
      return count;
    }
    return null;
  });
};

// Name → poseBones index, including GLTFLoader dedup suffixes (SKEL_Pelvis_1).
// Prefer GAME_RIG deform bones when duplicates exist (control_rig vs skel).
// Cached: rebuilt only when poseBones is replaced (enter/exit pose mode).
let _poseBoneNameMap = null;
function poseInvalidateBoneNameMap() { _poseBoneNameMap = null; }
function poseBuildBoneNameMap() {
  if (_poseBoneNameMap) return _poseBoneNameMap;
  function underGameRig(bone) {
    for (let n = bone; n; n = n.parent) {
      const nm = (n.name || '').toUpperCase();
      if (nm === 'GAME_RIG' || nm.includes('GAME_RIG')) return true;
    }
    return false;
  }
  const m = new Map();
  for (let i = 0; i < poseBones.length; i++) {
    const bone = poseBones[i];
    const n = bone?.name;
    if (!n) continue;
    const prefer = underGameRig(bone);
    const take = (key) => {
      if (!m.has(key)) { m.set(key, i); return; }
      if (prefer && !underGameRig(poseBones[m.get(key)])) m.set(key, i);
    };
    take(n);
    take(n.replace(/_\d+$/, ''));

  _poseBoneNameMap = m;
  return m;
}

const _afQ1 = new THREE.Quaternion();
const _afQ2 = new THREE.Quaternion();
const _afQ3 = new THREE.Quaternion();

/// Rigid-follow for undriven ThighRoll bones: they parent to the PELVIS,
/// so unless a clip track owns them they must follow the thigh's
/// delta-from-rest or the thigh band tears open when the leg bends.
function poseApplyAuxFollow() {
  if (!poseAuxFollow.length) return;
  for (const fdef of poseAuxFollow) {
    if (_rt && _rt.drivenBones && _rt.drivenBones.has(fdef.bone)) continue;
    fdef.src.updateWorldMatrix(true, false);
    fdef.src.getWorldQuaternion(_afQ1);
    // world delta of the source from rest, applied to the roll's rest world
    _afQ2.copy(fdef.srcRestW).invert().premultiply(_afQ1);  // srcNow ∘ srcRest⁻¹
    _afQ3.copy(fdef.boneRestW).premultiply(_afQ2);          // delta ∘ rollRestW
    fdef.bone.parent.updateWorldMatrix(true, false);
    fdef.bone.parent.getWorldQuaternion(_afQ1);
    fdef.bone.quaternion.copy(_afQ1.invert()).multiply(_afQ3).normalize();
  }
}

function poseSyncSkeletonMeshes() {
  poseApplyAuxFollow();
  for (const root of [currentModel, secondaryPed]) {
    if (!root) continue;
    root.traverse(o => {
      if (o.isSkinnedMesh && o.skeleton) o.skeleton.update();
    });
    root.updateMatrixWorld(true);
  }
  try { if (typeof updateAnimSkeletonLines === 'function') updateAnimSkeletonLines(); } catch (e) {}
  try { updateBoneLines(); } catch (e) {}
}

// Sample per-bone quaternion arrays from the import payload (bypasses
// THREE.KeyframeTrack — more reliable than clip.tracks on GLTF rigs).
function poseApplyRawTracksAtTime(rawTracks, localTime, duration, weight) {
  if (!rawTracks?.length || !poseBones.length) return 0;
  const nameMap = poseBuildBoneNameMap();
  let frameCount = 0;
  for (const tr of rawTracks)
    frameCount = Math.max(frameCount, tr.q?.length || 0, tr.p?.length || 0);
  if (frameCount < 1) return 0;
  const u = duration > 1e-6 ? Math.max(0, Math.min(1, localTime / duration)) : 0;
  const f = u * Math.max(0, frameCount - 1);
  const i0 = Math.min(frameCount - 1, Math.floor(f));
  const i1 = Math.min(frameCount - 1, i0 + 1);
  const alpha = f - i0;
  const w = Math.max(0, Math.min(1, weight || 1));
  let applied = 0;
  for (const tr of rawTracks) {
    if (!tr?.name) continue;
    const idx = nameMap.get(tr.name);
    // Aux twist/corrective bones bind through their own registry.
    const bone = idx != null ? poseBones[idx]
      : (poseAuxByName.get(tr.name) || poseAuxByName.get(tr.name.replace(/_\d+$/, '')));
    if (!bone) continue;
    if (Array.isArray(tr.q) && tr.q.length > i0) {
      const q0 = tr.q[i0], q1 = tr.q[i1];
      if (Array.isArray(q0) && q0.length >= 4) {
        const q = (i0 === i1 || alpha < 1e-4) ? q0
          : poseSlerp(q0, Array.isArray(q1) && q1.length >= 4 ? q1 : q0, alpha);
        if (w >= 0.999) bone.quaternion.set(q[0], q[1], q[2], q[3]);
        else {
          const cur = bone.quaternion;
          const blended = poseSlerp([cur.x, cur.y, cur.z, cur.w], q, w);
          bone.quaternion.set(blended[0], blended[1], blended[2], blended[3]);
        }
        applied++;
      }
    }
    const restPos = idx != null ? poseInitialPositions[idx]
      : (bone.userData && bone.userData.poseAuxRest && bone.userData.poseAuxRest.p);
    if (Array.isArray(tr.p) && tr.p.length > i0 && restPos) {
      const p0 = tr.p[i0], p1 = tr.p[i1] || p0;
      if (Array.isArray(p0) && p0.length >= 3) {
        const rest = restPos;
        const px = (i0 === i1 || alpha < 1e-4) ? p0[0] : p0[0] + (p1[0] - p0[0]) * alpha;
        const py = (i0 === i1 || alpha < 1e-4) ? p0[1] : p0[1] + (p1[1] - p0[1]) * alpha;
        const pz = (i0 === i1 || alpha < 1e-4) ? p0[2] : p0[2] + (p1[2] - p0[2]) * alpha;
        bone.position.set(rest.x + px, rest.y + py, rest.z + pz);
        applied++;
      }
    }
  }
  return applied;
}

function poseClipRawTracks(clip) {
  if (clip?.userData?.rawTracks) return clip.userData.rawTracks;
  const entry = poseClips.find(c => c.clip === clip);
  return (entry && entry.rawTracks) || null;
}

function poseSampleQuatTrack(track, t) {
  const times = track.times;
  const values = track.values;
  const n = times.length;
  if (!n) return null;
  if (t <= times[0]) return [values[0], values[1], values[2], values[3]];
  if (t >= times[n - 1]) {
    const j = (n - 1) * 4;
    return [values[j], values[j + 1], values[j + 2], values[j + 3]];
  }
  // Largest i with times[i] <= t. This ran as a linear scan, which is
  // O(n) per track per playback tick — a long import (thousands of keys)
  // × dozens of tracks × 60 Hz pinned the render loop and froze the app.
  // Binary search makes it O(log n). times[] is sorted ascending and the
  // out-of-range ends are handled above, so i lands in [0, n-2].
  let lo = 0, hi = n - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if (times[mid] <= t) lo = mid; else hi = mid - 1;
  }
  const i = Math.min(lo, n - 2);
  const t0 = times[i], t1 = times[i + 1];
  const u = t1 > t0 ? (t - t0) / (t1 - t0) : 0;
  const q0 = [values[i * 4], values[i * 4 + 1], values[i * 4 + 2], values[i * 4 + 3]];
  const q1 = [values[(i + 1) * 4], values[(i + 1) * 4 + 1], values[(i + 1) * 4 + 2], values[(i + 1) * 4 + 3]];
  return poseSlerp(q0, q1, u);
}

// Sample a baked/imported clip and write bone locals directly. The
// AnimationMixer path fails silently when bones live outside the mixer's
// subtree (common with GLTF skinned rigs), which leaves the ped in bind
// pose while the timeline claims it's playing.
function poseApplyClipAtTime(clip, localTime, weight) {
  const raw = poseClipRawTracks(clip);
  if (raw) return poseApplyRawTracksAtTime(raw, localTime, clip.duration || 0, weight);
  if (!clip || !clip.tracks || !clip.tracks.length) return 0;
  const nameMap = poseBuildBoneNameMap();
  const w = Math.max(0, Math.min(1, weight || 1));
  let applied = 0;
  for (const track of clip.tracks) {
    if (!track.name || !track.name.endsWith('.quaternion')) continue;
    const boneName = track.name.slice(0, -'.quaternion'.length);
    const idx = nameMap.get(boneName);
    if (idx == null) continue;
    const q = poseSampleQuatTrack(track, localTime);
    if (!q) continue;
    const bone = poseBones[idx];
    if (!bone) continue;
    if (w >= 0.999) {
      bone.quaternion.set(q[0], q[1], q[2], q[3]);
    } else {
      const cur = bone.quaternion;
      const blended = poseSlerp([cur.x, cur.y, cur.z, cur.w], q, w);
      bone.quaternion.set(blended[0], blended[1], blended[2], blended[3]);
    }
    applied++;
  }
  return applied;
}

// Evaluate strips at time t. Returns true if any strip wrote bones —
// the timeline tick then skips poseEvaluate(t) so strip output isn't
// immediately overwritten by the keyframe interpolator.
function poseEvaluateStrips(t) {
  if (!poseClipTrackEnabled) return false;
  if (poseStrips.length === 0) return false;

  let bestRoot = null;
  let bestWeight = 0;
  const active = [];

  for (const s of poseStrips) {
    const c = poseClips.find(c => c.id === s.clipId);
    if (!c || !c.clip) continue;
    const srcStart = (typeof s.sourceStart === 'number') ? s.sourceStart : 0;
    const srcEnd = (typeof s.sourceEnd === 'number') ? s.sourceEnd : c.duration;
    const stripEnd = s.start + s.duration;
    if (t < s.start || t > stripEnd) continue;
    let local = (t - s.start) * s.timeScale + srcStart;
    local = Math.max(srcStart, Math.min(srcEnd, local));
    let weight = 1.0;
    if (s.fadeIn > 0 && (t - s.start) < s.fadeIn) {
      const u = (t - s.start) / s.fadeIn;
      weight = Math.min(weight, poseApplyEase(u, s.fadeInEase || 'linear'));
    }
    if (s.fadeOut > 0 && (stripEnd - t) < s.fadeOut) {
      const u = (stripEnd - t) / s.fadeOut;
      weight = Math.min(weight, poseApplyEase(u, s.fadeOutEase || 'linear'));
    }
    weight = Math.max(0, Math.min(1, weight));
    if (weight <= 0) continue;
    active.push({ clip: c.clip, local, weight, roots: c, lane: s.lane || 0, order: active.length });
  }

  if (!active.length) return false;

  // Layer-ordered compositing: lower lanes first, higher lanes painted
  // OVER them (poseApplyClipAtTime overwrites at weight 1, slerps during
  // fades) — same-lane ties keep array order, matching the old behavior.
  active.sort((a, b) => (a.lane - b.lane) || (a.order - b.order));

  // Root motion follows the same priority: the last (topmost) strip with
  // a usable root offset wins; fade weight breaks ties within a lane.
  for (const a of active) {
    const root = poseSampleClipRoot(a.roots, a.local);
    if (root && a.weight >= bestWeight * 0.999) {
      bestWeight = a.weight;
      bestRoot = root;
    }
  }

  // Partial clips only key a subset of bones — start from bind each tick.
  if (poseInitialQuats.length === poseBones.length) {
    for (let i = 0; i < poseBones.length; i++)
      poseBones[i].quaternion.copy(poseInitialQuats[i]);
  }
  if (poseInitialPositions.length === poseBones.length) {
    for (let i = 0; i < poseBones.length; i++)
      poseBones[i].position.copy(poseInitialPositions[i]);
  }

  let wroteAny = false;
  for (const a of active) {
    if (poseApplyClipAtTime(a.clip, a.local, a.weight) > 0) wroteAny = true;
  }

  if (currentModel) currentModel.updateMatrixWorld(true);
  if (secondaryPed) secondaryPed.updateMatrixWorld(true);
  poseSyncSkeletonMeshes();

  if (!poseSuppressRootApply) {
    if (bestRoot) poseApplyRoot(bestRoot);
    else if (poseRootTarget && poseRootBase) poseRootTarget.position.copy(poseRootBase);
  }
  return wroteAny;
}

window.poseAddKeyframe = function () {
  if (!poseMode) return null;
  return commitKeyframesMutation('add-keyframe', () => {
    poseKeyframeSource = 'editor';
    poseBoneSpace = 'glb';
    const snap = poseSnapshot();
    // Replace if a keyframe already exists at this time (snapped to frame).
    const t = +poseTime.toFixed(3);
    const existing = poseKeyframes.findIndex(k => Math.abs(k.time - t) < 1e-3);
    if (existing >= 0) {
      const old = poseKeyframes[existing];
      poseKeyframes[existing] = {
        id: poseEnsureKeyId(old),
        time: t,
        bones: snap,
        root: old.root || null,
        ease: old.ease || 'auto',
      };
    } else {
      const key = { time: t, bones: snap, ease: 'auto' };
      poseEnsureKeyId(key);
      poseKeyframes.push(key);
      poseKeyframes.sort((a, b) => a.time - b.time);
    }
    postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
    // A new key may have just become this frame's prev/next neighbour,
    // so the onion ghosts need to re-pick targets.

    return poseKeyframes.length;

};

window.poseDeleteKeyframeAtTime = function (t) {
  const i = poseKeyframes.findIndex(k => Math.abs(k.time - t) < 1e-3);
  if (i < 0) return false;
  return commitKeyframesMutation('delete-keyframe', () => {
    poseKeyframes.splice(i, 1);
    postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
    return true;
  });
};

window.poseDeleteCurrentKeyframe = function () {
  return window.poseDeleteKeyframeAtTime(+poseTime.toFixed(3));
};

window.poseClearKeyframes = function () {
  return commitKeyframesMutation('clear-keyframes', () => {
    poseKeyframes = [];
    poseKeyframeSource = null;
    poseBoneSpace = 'glb';
    fosTelemetry.info('timeline', 'all keyframes cleared');
    postToHost({ kind: 'pose-timeline-update', keyframes: [], time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
  });
};

// Wipe the whole pose workspace back to freshly-opened: strips, clip
// library, keyframes, pose, playhead. Each per-item path owns only one
// slice of that — poseClearKeyframes drops keyframes but leaves imported
// clips on the timeline, poseDeleteClip takes one clip at a time — so
// "start over" meant deleting strips one by one, then clips one by one.
// The loaded rig and the timeline's duration/fps survive: this clears
// what you made, not what you set up.
window.poseClearAll = function () {
  if (posePlaying) window.posePause();
  // Stop and uncache every strip action BEFORE dropping the strips.
  // An orphaned AnimationAction keeps driving bones off a mixer whose
  // strip no longer exists, which reads as a pose that won't clear.
  poseStripsResetMixer();
  poseStrips = [];
  poseClips = [];
  poseKeyframes = [];
  poseKeyframeSource = null;
  poseBoneSpace = 'glb';
  poseTime = 0;
  // resetPose() no-ops unless poseMode is on, and pushes its own undo
  // entry — clearing an already-bind pose stays off the history stack.
  window.resetPose();
  postStripsUpdate();
  postClipLibrary();
  postToHost({
    kind: 'pose-timeline-update',
    keyframes: [],
    time: poseTime,
    duration: poseDuration,
    fps: poseFps,
    playing: posePlaying,
    loop: poseLoop,
  });
  fosTelemetry.info('timeline', 'workspace cleared (strips + clips + keyframes + pose)');
  // Strips/clips are gone unrecoverably — surviving history entries would
  // replay against a world that no longer exists.
  poseClearHistory('clear-all');
  requestRender();
};

// Re-time an existing keyframe. Used by the host's draggable keyframe
// triangles: the user grabs a marker on the scrubber and drags it left
// or right. `fromTime` identifies the keyframe (matched within an
// epsilon — drag chains can accumulate float drift), `toTime` is the
// new clamped target. Snap-to-fps happens host-side; this function just
// applies the result.
window.poseMoveKeyframe = function (fromTime, toTime) {
  if (!poseMode) return false;
  const f = +(+fromTime).toFixed(4);
  let t = Math.max(0, Math.min(poseDuration, +toTime));
  // Idempotent: skip work if the move target is the same instant.
  if (Math.abs(t - f) < 1e-4) return false;
  const i = poseKeyframes.findIndex(k => Math.abs(k.time - f) < 1e-3);
  if (i < 0) {
    fosTelemetry.warn('timeline', `move KF: no match at ${f.toFixed(3)}s`);
    return false;
  }
  // If another keyframe already lives at the target time, refuse the
  // move — overlapping keyframes would silently merge / drop one.
  const collision = poseKeyframes.findIndex((k, idx) => idx !== i && Math.abs(k.time - t) < 1e-3);
  if (collision >= 0) {
    fosTelemetry.warn('timeline', `move KF: target ${t.toFixed(3)}s occupied`);
    return false;
  }
  return commitKeyframesMutation('move-keyframe', () => {
    poseKeyframes[i].time = +t.toFixed(3);
    poseKeyframes.sort((a, b) => a.time - b.time);
    fosTelemetry.info('timeline', `KF moved ${f.toFixed(3)} -> ${t.toFixed(3)}`);
    postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying });
    return true;
  });
};

// Apply a pose blob to the current rig. Used by the custom-pose
// library (host loads a saved JSON, calls this to restore it). Matches
// the same `bones: [{name, rot_xyzw}]` shape that getPose() emits.
window.applyPose = function (payloadOrJson) {
  if (!poseMode) return 0;
  let payload = payloadOrJson;
  if (typeof payload === 'string') {
    try { payload = JSON.parse(payload); }
    catch (e) {
      fosTelemetry.err('error', 'applyPose: bad JSON', { msg: String(e) });
      return 0;
    }
  }
  if (!payload || !Array.isArray(payload.bones)) {
    fosTelemetry.warn('pose', 'applyPose: no bones array');
    return 0;
  }
  const before = snapshotAllPoseQuats();
  const nameToBone = new Map();
  for (const b of poseBones) nameToBone.set(b.name, b);

  let applied = 0, missing = 0;
  for (const entry of payload.bones) {
    const bone = nameToBone.get(entry.name);
    if (!bone) { missing++; continue; }
    const q = entry.rot_xyzw;
    if (!Array.isArray(q) || q.length < 4) continue;
    bone.quaternion.set(q[0], q[1], q[2], q[3]);
    applied++;
  }
  if (applied > 0) {
    const after = snapshotAllPoseQuats();
    pushHistory({ kind: 'reset', payload: { before, after } });
  }
  fosTelemetry.info('pose', `applyPose: ${applied} applied, ${missing} missing`);
  postToHost({ kind: 'pose-applied', applied, missing });
  requestRender();
  return applied;
};

// ════════════════════════════════════════════════════════════════════
// MULTI-CHARACTER (Ped A / B) — minimal scope
//
// A second skeleton lives on the +X offset. While loaded it just
// renders (no editing), and the user can hot-swap which one is the
// "primary" — that's a model-pointer swap + an exit/enter of pose
// mode so the gizmo + sidebar bone list bind to the new primary's
// skeleton.
// ════════════════════════════════════════════════════════════════════
let secondaryPed = null;                // THREE.Group of the inactive ped
const SECONDARY_OFFSET_X = 1.0;          // metres — roughly one ped-width apart

function disposeGroup(group) {
  if (!group) return;
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const m = Array.isArray(obj.material) ? obj.material : [obj.material];
      m.forEach(mat => mat.dispose());
    }
  });
}

// Bundled freemode preset as Ped B. Mirrors loadGtaSkeleton's helper
// cleanup + clay-material override, but lands the result as the
// secondary ped (offset to the side, isSecondaryPed flag set) instead
// of replacing currentModel. Used by the sidebar's "Add Ped B" button
// so the user gets an instant paired-pose canvas without picking a file.
//
// The clay color shifts cool (0xB5BCC8 vs the primary's 0xC8C5BF) so
// the two silhouettes read as distinct when they overlap.
window.loadSecondaryGtaPed = function (variant) {
  if (!currentModel) {
    fosTelemetry.warn('system', 'loadSecondaryGtaPed: load a primary ped first');
    return;
  }
  const v = variant === 'male' ? 'male' : 'female';
  const url = `./reference/freemode_${v}.glb`;

  if (secondaryPed) {
    scene.remove(secondaryPed);
    disposeGroup(secondaryPed);
    secondaryPed = null;
  }

  // Cool clay — same parameters as the primary, just shifted in hue so
  // the two peds don't look like clones of each other.
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: 0xB5BCC8,
    metalness: 0.0,
    roughness: 0.6,
    transparent: true,
    opacity: 0.88,
    side: THREE.DoubleSide,
    depthWrite: true,
  });

  const loader = new GLTFLoader();
  loader.load(url, gltf => {
    const root = gltf.scene;
    root.name = 'GtaFreemodeSecondary_' + v;

    // Same cleanup pass loadGtaSkeleton runs — strip the helper objects
    // the Sollumz/Blender export bundles inside the .glb (Mixamo retarget
    // rig, bone-widget gizmos, the Plane floor) so they don't show up
    // as floating debris around the secondary ped.
    const hideTopLevelNames = new Set(['MixamoSrc', 'cs_grp', 'Plane', 'IK_Root',
                                       'LEG_L_IK', 'LEG_R_IK', 'LEG_L_POLE',
                                       'LEG_R_POLE', 'IK_L_FA', 'IK_R_FA']);
    const toRemove = [];
    root.traverse(node => {
      if (hideTopLevelNames.has(node.name)) toRemove.push(node);
      if (node.isMesh && node.geometry && node.geometry.attributes.position) {
        const pc = node.geometry.attributes.position.count;
        if (pc <= 8 && node.name.toLowerCase().includes('plane')) toRemove.push(node);
      }
    });
    for (const n of toRemove) { if (n.parent) n.parent.remove(n); }

    root.traverse(node => {
      if ((node.isMesh || node.isSkinnedMesh) && node.visible) {
        node.material = bodyMat;
        node.castShadow = false;
        node.receiveShadow = false;
        node.frustumCulled = false;
      }
    });

    // Match the male-glb orientation fix from the primary loader.
    if (v === 'male') root.rotateY(Math.PI);
    root.updateMatrixWorld(true);

    // Ground-snap INDEPENDENTLY of the primary. The primary already
    // sits at position.y = -male_box.min.y (~1 m up so its feet land
    // at Y=0); compounding that offset onto the secondary's own
    // pivot-to-feet distance left the female floating ~2 m above the
    // ground. Each ped now computes its own pivot-to-feet delta and
    // lifts itself by that amount so both pairs of feet share the
    // Y=0 plane regardless of which mesh has which pivot convention.
    const groundBox = new THREE.Box3().setFromObject(root);
    const yPos = isFinite(groundBox.min.y) ? -groundBox.min.y : 0;
    root.position.set(SECONDARY_OFFSET_X, yPos, 0);
    root.userData.isSecondaryPed = true;
    root.updateMatrixWorld(true);

    scene.add(root);
    secondaryPed = root;
    requestRender();
    fosTelemetry.info('system', 'secondary GTA ped loaded', { variant: v });

    // Co-pose: when the user adds a secondary ped while already in
    // pose mode, extend the live session to include her bones too —
    // joint markers appear on both peds, both are pose-able with the
    // same gizmo, and one keyframe captures the combined pose. Bone
    // indices are append-only so existing keyframes / strips / undo
    // history all stay valid.
    if (poseMode) {
      try {
        const added = attachRigToPoseSession(secondaryPed, false);
        if (added > 0) {
          postPoseModeEntered();
          fosTelemetry.info('system', `co-pose: +${added} bones from secondary`);
        }
      } catch (e) {
        fosTelemetry.err('error', 'co-pose attach failed', { msg: String(e) });
      }
    }
  }, undefined, err => {
    fosTelemetry.err('error', 'secondary GTA ped load failed', { msg: String(err && err.message || err) });
  });
};

window.loadSecondaryPed = function (url) {
  if (!currentModel) {
    fosTelemetry.warn('system', 'loadSecondaryPed: no primary ped to compare against');
    return;
  }
  if (secondaryPed) {
    scene.remove(secondaryPed);
    disposeGroup(secondaryPed);
    secondaryPed = null;
  }
  const loader = pickLoader(url);
  if (!loader) {
    fosTelemetry.err('error', 'secondary ped: unsupported format', { url });
    return;
  }
  loader.load(url, asset => {
    let obj = asset.scene ?? asset;
    // Independent ground-snap: the primary's pivot now sits at its bbox
    // center, so its Y can't be reused as a shared ground reference.
    obj.position.set(SECONDARY_OFFSET_X, 0, 0);
    obj.updateMatrixWorld(true);
    const secondaryGroundBox = new THREE.Box3().setFromObject(obj);
    if (isFinite(secondaryGroundBox.min.y)) {
      obj.position.y -= secondaryGroundBox.min.y;
      obj.updateMatrixWorld(true);
    }
    obj.userData.isSecondaryPed = true;
    const fname = (url || '').split(/[\\/]/).pop().split('?')[0].replace(/\.(glb|gltf|fbx|obj)$/i, '');
    if (fname) obj.userData.displayName = fname;
    scene.add(obj);
    secondaryPed = obj;
    requestRender();
    fosTelemetry.info('system', 'secondary ped loaded', { url });

    // Co-pose attach — same path as loadSecondaryGtaPed.
    if (poseMode) {
      try {
        const added = attachRigToPoseSession(secondaryPed, false);
        if (added > 0) postPoseModeEntered();
      } catch (e) {
        fosTelemetry.err('error', 'co-pose attach failed', { msg: String(e) });
      }
    }
  }, undefined, err => {
    fosTelemetry.err('error', 'secondary ped load failed', { msg: String(err && err.message || err) });
  });
};

window.swapActivePed = function () {
  if (!secondaryPed || !currentModel) {
    fosTelemetry.warn('system', 'swap: need both ped slots loaded');
    return false;
  }
  // Exit pose mode on the current primary first so its bone-handle
  // overlays + telemetry get cleaned up. Then swap pointers + offsets
  // and re-enter pose mode on the new primary.
  const wasInPose = poseMode;
  if (wasInPose) window.exitPoseMode();

  // Swap world positions so the two peds visually trade places — keeps
  // camera framing stable across the swap.
  const tmpX = currentModel.position.x;
  currentModel.position.x = secondaryPed.position.x;
  secondaryPed.position.x = tmpX;
  currentModel.updateMatrixWorld(true);
  secondaryPed.updateMatrixWorld(true);

  // Pointer swap. After this `currentModel` is what *was* secondary.
  const tmp = currentModel;
  currentModel = secondaryPed;
  secondaryPed = tmp;

  if (wasInPose) window.enterPoseMode();
  requestRender();
  fosTelemetry.info('system', 'swapped active ped');
  return true;
};

// Selection query for the host (used by hotkey-driven sidebar sync).
window.getPoseSelection = function () {
  return JSON.stringify(poseSelection.map(b => ({
    index: poseBones.indexOf(b),
    name: b.name || '',
  })));
};

// Bulk-load a keyframe payload. Used by the YCD importer to drop a
// whole imported clip onto the timeline in one shot. Expected shape:
//   { duration, fps, keyframes: [{ time, bones:[{ name, q:[x,y,z,w] }] }] }
// We translate `name` -> index using poseBones at apply time so the
// import survives a bone-reorder between save and load.
window.setKeyframes = function (payloadOrJson, options) {
  if (!poseMode) {
    fosTelemetry.warn('timeline', 'setKeyframes: pose mode not active');
    return 0;
  }
  const silent = options && options.silent === true;
  let payload = payloadOrJson;
  if (typeof payload === 'string') {
    try { payload = JSON.parse(payload); }
    catch (e) { fosTelemetry.err('error', 'setKeyframes: bad JSON', { msg: String(e) }); return 0; }
  }
  if (!payload || !Array.isArray(payload.keyframes)) {
    fosTelemetry.warn('timeline', 'setKeyframes: no keyframes[]');
    return 0;
  }
  // Build name->index from the current rig so the import maps cleanly.
  const nameToIdx = poseBuildBoneNameMap();
  // Animation-import root motion arrives in the UNSPUN skeleton (GAME_RIG)
  // frame — the same frame the retargeter's foot-lock planted the feet in.
  // currentModel may carry a facing spin (the male ped's 180° flip); adding a
  // skeleton-frame offset straight onto its scene-frame position would reverse
  // the horizontal travel and drag the planted feet along (the "sliding" bug).
  // So rotate each anim root offset into the model's frame before applying it.
  // Video/image roots are already authored in the scene frame — leave them.
  const animRootSpin = (payload.source === 'anim-import' && currentModel)
    ? currentModel.quaternion.clone() : null;
  if (typeof payload.duration === 'number') poseDuration = Math.max(0.1, Math.min(60, payload.duration));
  if (typeof payload.fps === 'number') poseFps = Math.max(1, Math.min(120, Math.round(payload.fps)));
  if (typeof payload.source === 'string' && payload.source) poseKeyframeSource = payload.source;
  if (typeof payload.boneSpace === 'string' && payload.boneSpace) poseBoneSpace = payload.boneSpace;
  // Default the preview to in-place unless the payload asks to travel. Payloads
  // without the field (older/editor clips) keep the legacy travelling behaviour.
  poseRootMotionPreview = payload.rootPreview !== false;

  // Translate the whole rig group (currentModel) for root motion — bulletproof
  // vs. bone naming / bind matrices / skinning. Cache its base position on
  // userData the first time (before any offset), so re-importing a video
  // doesn't treat a previous clip's offset as the base.
  poseRootTarget = currentModel || null;
  if (poseRootTarget) {
    poseRootTarget.userData = poseRootTarget.userData || {};
    if (!poseRootTarget.userData._poseBasePos) poseRootTarget.userData._poseBasePos = poseRootTarget.position.clone();
    poseRootBase = poseRootTarget.userData._poseBasePos;
    if (!poseRootTarget.userData._poseBaseQuat) poseRootTarget.userData._poseBaseQuat = poseRootTarget.quaternion.clone();
    poseRootBaseQuat = poseRootTarget.userData._poseBaseQuat;
    poseApplyRootYaw(null);   // clear any stale heading from a previous clip
  } else {
    poseRootBase = null;
    poseRootBaseQuat = null;
  }

  // Anim-import keyframe path: Assimp locals → THREE rest (same as bone-tracks).
  const kfAssimpBind = (payload.source === 'anim-import' || payload.boneSpace === 'assimp')
    && payload.assimpBind && typeof payload.assimpBind === 'object'
    ? payload.assimpBind : null;
  const _invBindKf = kfAssimpBind ? new THREE.Quaternion() : null;
  const _qAssimpKf = kfAssimpBind ? new THREE.Quaternion() : null;
  const _qThreeKf = kfAssimpBind ? new THREE.Quaternion() : null;

  const rebuilt = [];
  let droppedBones = 0;
  let hasRoot = false;
  for (const kf of payload.keyframes) {
    if (typeof kf.time !== 'number') continue;
    const snap = [];
    if (Array.isArray(kf.bones)) {
      for (const b of kf.bones) {
        const idx = nameToIdx.get(b.name);
        if (idx == null) { droppedBones++; continue; }
        const q = b.q || b.rot_xyzw;
        if (!Array.isArray(q) || q.length < 4) continue;
        let outQ = [q[0], q[1], q[2], q[3]];
        if (kfAssimpBind && poseInitialQuats[idx] && _invBindKf && _qAssimpKf && _qThreeKf) {
          // PARITY with importBoneTracksAsClip's rebase (the clip path):
          //  • feet/toes are never driven from an Assimp retarget;
          //  • NO bind entry → leave the bone at rest — applying the raw
          //    Assimp-space quat is what exploded the FINGERS (they have no
          //    glb bind, so raw foreign-space rotations hit the hands);
          //  • degenerate quats (NaN / near-zero) spike the mesh — drop them.
          const baseName = String(b.name).replace(/_\d+$/, '');
          if (/Foot|Toe/i.test(baseName)) continue;
          const bind = kfAssimpBind[b.name] || kfAssimpBind[baseName];
          if (!Array.isArray(bind) || bind.length < 4) { droppedBones++; continue; }
          const len = Math.hypot(q[0], q[1], q[2], q[3]);
          if (!Number.isFinite(len) || len < 1e-6) continue;
          _invBindKf.set(bind[0], bind[1], bind[2], bind[3]).normalize().invert();
          _qAssimpKf.set(q[0], q[1], q[2], q[3]).normalize();
          _qThreeKf.copy(poseInitialQuats[idx]).multiply(_invBindKf).multiply(_qAssimpKf);
          outQ = [_qThreeKf.x, _qThreeKf.y, _qThreeKf.z, _qThreeKf.w];
        }
        snap.push({ i: idx, q: outQ });
      }
    }
    // Optional per-keyframe root translation (offset from rest, viewer units).
    let root = null;
    if (Array.isArray(kf.root) && kf.root.length === 3) {
      root = [(+kf.root[0]) || 0, (+kf.root[1]) || 0, (+kf.root[2]) || 0];
      if (animRootSpin) {
        const rv = new THREE.Vector3(root[0], root[1], root[2]).applyQuaternion(animRootSpin);
        root = [rv.x, rv.y, rv.z];
      }
      hasRoot = true;
    }
    const rebuiltKey = {
      id: (typeof kf.id === 'string' || typeof kf.id === 'number') ? kf.id : null,
      time: +kf.time.toFixed(3),
      bones: snap,
      root,
      ease: kf.ease || 'auto',
    };
    poseEnsureKeyId(rebuiltKey);
    rebuilt.push(rebuiltKey);
  }
  rebuilt.sort((a, b) => a.time - b.time);
  poseKeyframes = rebuilt;
  // No root track (image / .ycd / .glb import, or a stationary clip): make sure
  // the rig is back at its base so a prior video's travel doesn't linger.
  if (!hasRoot && poseRootTarget && poseRootBase) poseRootTarget.position.copy(poseRootBase);
  poseTime = 0;
  // Evaluate at t=0 so the rig immediately matches the first frame.
  poseEvaluate(0);
  // Diagnostic: how far does the root actually travel? If this is ~0 the
  // motion is being lost upstream (reconstruction), not in playback.
  let rootMax = 0;
  for (const k of rebuilt) {
