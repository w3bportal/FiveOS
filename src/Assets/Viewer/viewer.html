<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FiveOS viewer</title>
<style>
  :root {
    --vscode-bg: #1e1e1e;
    --vscode-sidebar: #252526;
    --vscode-panel: #181818;
    --vscode-input: #3c3c3c;
    --vscode-border: #454545;
    --vscode-fg: #cccccc;
    --vscode-fg-dim: #858585;
    --vscode-accent: #007acc;
    --vscode-accent-hover: #1177bb;
    --vscode-hover: #2a2d2e;
    --vscode-link: #3794ff;
    --pose-accent: var(--vscode-accent);
  }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--vscode-bg); overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--vscode-fg);
  }
  #viewport { position: absolute; inset: 0; }

  #status {
    position: absolute; left: 12px; bottom: 12px;
    font-size: 12px; color: var(--vscode-fg-dim); pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  #empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    color: var(--vscode-fg-dim); font-size: 14px;
    pointer-events: none;
  }
  #empty.hidden { display: none; }

  /* Gizmo mode toolbar (top-left, over the viewport) */
  #gizmo-bar {
    position: absolute; top: 8px; left: 8px;
    background: rgba(37, 37, 38, 0.92);
    border: 1px solid var(--vscode-border);
    border-radius: 5px;
    padding: 3px;
    display: flex; flex-direction: column; gap: 1px;
    backdrop-filter: blur(6px);
  }
  .gizmo-btn {
    background: transparent; border: 1px solid var(--vscode-border);
    color: var(--vscode-fg); font-family: inherit; font-size: 11px;
    padding: 4px 8px; border-radius: 3px; cursor: pointer;
    text-align: left; min-width: 78px;
    display: flex; align-items: center; gap: 6px;
    line-height: 1.4;
  }
  .gizmo-btn:hover { background: var(--vscode-hover); border-color: #5a5a5a; }
  .gizmo-btn.active {
    background: var(--vscode-accent); border-color: var(--vscode-accent); color: #fff;
  }
  .gizmo-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  .gizmo-btn .key {
    margin-left: auto;
    font-size: 9px;
    opacity: 0.65;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px;
    padding: 0 4px;
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
  }
  .gizmo-btn.active .key {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.25);
    opacity: 0.9;
  }
  .gizmo-section-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--vscode-fg-dim); padding: 2px 4px 1px;
  }
  .gizmo-hint {
    font-size: 10px;
    color: var(--vscode-fg-dim);
    line-height: 1.35;
    padding: 1px 4px 0;
    max-width: 128px;
  }
  .gizmo-hint b { color: var(--vscode-fg); font-weight: 600; }
  .gizmo-divider {
    height: 1px; background: var(--vscode-border); margin: 2px 0;
  }
  .gizmo-toggle { display: flex; align-items: center; gap: 6px; padding: 2px 4px; }
  .gizmo-toggle input { margin: 0; width: 13px; height: 13px; }
  .gizmo-toggle label { font-size: 11px; color: var(--vscode-fg); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .gizmo-toggle label svg { width: 11px; height: 11px; }
  /* Sub-mesh selection chip (bottom-center). Appears when the user clicks
     a single mesh under the cursor so they can split it into its own layer
     — e.g. isolate a mirror pane from its frame. Styled like the gizmo bar. */
  #submesh-bar {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(37, 37, 38, 0.94);
    border: 1px solid var(--vscode-border);
    border-radius: 6px;
    padding: 5px 6px 5px 10px;
    display: none; align-items: center; gap: 8px;
    backdrop-filter: blur(6px);
    max-width: min(92vw, 560px);
    box-shadow: 0 4px 16px rgba(0,0,0,.35);
    z-index: 20;
  }
  #submesh-bar.visible { display: flex; }
  #submesh-bar .sb-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #f59e0b; flex-shrink: 0;
    box-shadow: 0 0 6px rgba(245,158,11,.8);
  }
  #submesh-bar .sb-name {
    font-size: 12px; color: var(--vscode-fg); font-weight: 600;
    max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #submesh-bar .sb-sub { font-size: 10px; color: var(--vscode-fg-dim); margin-left: -3px; }
  .sb-btn {
    background: transparent; border: 1px solid var(--vscode-border);
    color: var(--vscode-fg); font-family: inherit; font-size: 11px;
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .sb-btn:hover { background: var(--vscode-hover); border-color: #5a5a5a; }
  .sb-btn.primary { background: var(--vscode-accent); border-color: var(--vscode-accent); color: #fff; }
  .sb-btn.primary:hover { filter: brightness(1.1); }
  .sb-btn svg { width: 12px; height: 12px; }
  #submesh-bar .sb-close {
    background: transparent; border: none; color: var(--vscode-fg-dim);
    cursor: pointer; font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 3px;
  }
  #submesh-bar .sb-close:hover { background: var(--vscode-hover); color: var(--vscode-fg); }
  /* Animated-prop playback pill (top-center). Only shown when the loaded
     prop carries a baked animation clip. Stop freezes it at its static
     frame (props always export static — this is a preview convenience). */
  #anim-bar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(37, 37, 38, 0.94);
    border: 1px solid var(--vscode-border);
    border-radius: 20px;
    padding: 4px 6px 4px 12px;
    display: none; align-items: center; gap: 9px;
    backdrop-filter: blur(6px);
    box-shadow: 0 3px 14px rgba(0,0,0,.32);
    z-index: 21;
  }
  #anim-bar.visible { display: flex; }
  #anim-bar .anim-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #6b7280; flex-shrink: 0;
  }
  #anim-bar.playing .anim-dot {
    background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.85);
    animation: animPulse 1.4s ease-in-out infinite;
  }
  @keyframes animPulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  #anim-bar .anim-label { font-size: 11px; color: var(--vscode-fg-dim); letter-spacing: .02em; }
  .anim-btn {
    background: var(--vscode-accent); border: 1px solid var(--vscode-accent);
    color: #fff; font-family: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 14px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .anim-btn:hover { filter: brightness(1.1); }
  .anim-btn svg { width: 11px; height: 11px; }
  /* Playing → offer Stop (red-tinted); stopped → offer Play (accent). */
  #anim-bar.playing .anim-btn { background: #ef4444; border-color: #ef4444; }
  #anim-bar .ic-play { display: none; }
  #anim-bar.playing .ic-play { display: none; }
  #anim-bar.playing .ic-stop { display: inline; }
  #anim-bar .ic-stop { display: none; }
  #anim-bar:not(.playing) .ic-play { display: inline; }
  /* Match-height row: numeric input + button. Compact so the gizmo bar
     stays a single column. */
  .gizmo-match input[type="number"] {
    width: 44px;
    padding: 2px 5px;
    background: var(--vscode-input);
    color: var(--vscode-fg);
    border: 1px solid var(--vscode-border);
    border-radius: 3px;
    font-size: 11px;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .gizmo-match input[type="number"]:focus {
    outline: 1px solid var(--vscode-accent);
    outline-offset: -1px;
  }
  /* Hide spin buttons (they're chunky and waste horizontal space). */
  .gizmo-match input[type="number"]::-webkit-inner-spin-button,
  .gizmo-match input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ─── dot-matrix loader (shown during three.js model load) ───
     5×5 grid of dots; opacity per-dot is driven by JS that walks a
     frame table at ~80ms / frame. Same five patterns as the WPF
     DotMatrixLoader UserControl. */
  #dot-loader {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    display: none;
    background: rgba(30, 30, 30, 0.92);
    border: 1px solid var(--vscode-border);
    border-radius: 8px;
    padding: 18px 22px;
    backdrop-filter: blur(6px);
    text-align: center;
    pointer-events: none;
  }
  #dot-loader.visible { display: block; }
  #dot-loader-grid {
    display: grid;
    grid-template-columns: repeat(5, 8px);
    grid-template-rows: repeat(5, 8px);
    gap: 4px;
    margin: 0 auto 10px;
  }
  #dot-loader-grid .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--vscode-accent);
    opacity: 0.12;
  }
  #dot-loader-grid .dot.lit { opacity: 1; }
  #dot-loader-caption {
    font-size: 11px;
    color: var(--vscode-link);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* ─── Status ticker (bottom-left) ───
     Warnings and errors only — no routine pose/hotkey debug spam.
     pointer-events:none so it never eats a bone click. */
  #debug-ticker {
    position: absolute; left: 12px; bottom: 12px;
    max-width: 46%;
    display: flex;
    flex-direction: column;
    gap: 1px;
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    font-size: 10px;
    line-height: 1.5;
    color: #7d849e;
    pointer-events: none;
    user-select: none;
    z-index: 9998;
    /* The viewport behind this is whatever model is loaded — a pale mesh
       would otherwise wash the text out completely. */
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95);
  }
  #debug-ticker .row {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #debug-ticker .row .t { color: #565c74; }
  #debug-ticker .row .c { color: #8FB4E6; }
  #debug-ticker .row.warn { color: #FFD23F; }
  #debug-ticker .row.warn .c { color: #FFD23F; }
  #debug-ticker .row.err  { color: #F87171; }
  #debug-ticker .row.err .c { color: #F87171; }

  /* ─── Pose mode view panel (top-right) ───
     Replaces the old status-readout HUD. Now hosts live viewport
     controls: key light intensity, key light orbit angle, and a
     "see-through" opacity slider that mutes the mesh so the joint
     spheres + skeleton lines stay legible underneath.
     Accent colour is set at viewer-ready from the WPF
     SystemAccentColorBrush; --pose-accent is the single source of
     truth so the HUD always tracks the host app's theme. */
  :root { --pose-accent: #60CDFF; }
  #pose-hud {
    position: absolute; top: 10px; right: 10px;
    background: linear-gradient(180deg, #1d2030 0%, #161924 100%);
    border: 1px solid #2d3245;
    border-top: 2px solid var(--pose-accent);
    border-radius: 6px;
    padding: 0;
    display: none;
    flex-direction: column;
    color: #d8dce8;
    font-family: "Segoe UI", -apple-system, Roboto, sans-serif;
    font-size: 11px;
    backdrop-filter: blur(8px);
    width: 240px;
    z-index: 50;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
    overflow: hidden;
  }
  #pose-hud.visible { display: flex; }
  #pose-hud .hud-header {
    padding: 7px 12px 6px;
    border-bottom: 1px solid #2a2e3e;
    background: color-mix(in srgb, var(--pose-accent) 5%, transparent);
  }
  #pose-hud .hud-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--pose-accent);
  }
  #pose-hud .ctl-list {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }
  #pose-hud .ctl-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #pose-hud .ctl-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  #pose-hud .ctl-label {
    font-size: 10px;
    font-weight: 500;
    color: #8a93a8;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #pose-hud .ctl-value {
    font-size: 10px;
    font-weight: 600;
    color: #e6eaf5;
    font-family: "Consolas", monospace;
    min-width: 36px;
    text-align: right;
  }
  /* Compact slider styling — matches the FiveOS dark palette + the
     app accent (driven by --pose-accent). WebView2 / Chromium honours
     these pseudo-elements. */
  #pose-hud input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #2a2e3e;
    border-radius: 2px;
    outline: none;
    margin: 0;
    cursor: pointer;
  }
  #pose-hud input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--pose-accent);
    border: 2px solid #1d2030;
    cursor: grab;
    box-shadow: 0 0 0 1px var(--pose-accent);
  }
  #pose-hud input[type="range"]:active::-webkit-slider-thumb { cursor: grabbing; }
</style>
</head>
<body>
  <div id="viewport"></div>

  <!-- ── Bone hierarchy inspector (diagnostic) ─────────────────────────
       Live tree of the posed GTA skeleton. Click a bone to highlight it
       in 3D (glowing marker that tracks the bone every frame) and see
       which SOURCE bone drives it — so a human can point at the wrong
       bone. Shown automatically when an Animation→Emote clip loads. -->
  <style>
    #bone-tree-panel{position:absolute;top:12px;right:12px;width:296px;max-height:calc(100% - 24px);
      background:rgba(18,18,22,.94);border:1px solid #333;border-radius:8px;color:#ddd;
      font:12px/1.4 -apple-system,Segoe UI,sans-serif;display:flex;flex-direction:column;z-index:50;
      box-shadow:0 8px 30px rgba(0,0,0,.5);}
    #bone-tree-panel.hidden{display:none;}
    #bone-tree-head{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid #2a2a2a;}
    #bone-tree-title{font-weight:600;letter-spacing:.08em;font-size:11px;color:#8ab4ff;}
    #bone-tree-count{color:#777;font-size:10px;margin-left:auto;}
    #bone-tree-close{background:none;border:none;color:#888;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;}
    #bone-tree-close:hover{color:#fff;}
    #bone-tree-legend{display:flex;gap:14px;padding:6px 11px;border-bottom:1px solid #232323;color:#999;font-size:10px;}
    .bt-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;flex:0 0 auto;}
    .bt-driven{background:#39d353;} .bt-rest{background:#555;}
    #bone-tree-list{overflow:auto;flex:1;padding:4px 0;min-height:60px;}
    .bt-row{display:flex;align-items:center;padding:2px 11px;cursor:pointer;white-space:nowrap;}
    .bt-row:hover{background:rgba(138,180,255,.12);}
    .bt-row.sel{background:rgba(255,60,180,.24);}
    .bt-name{overflow:hidden;text-overflow:ellipsis;}
    .bt-src{color:#c98bff;font-size:10px;margin-left:6px;opacity:.9;}
    #bone-tree-sel{padding:8px 11px;border-top:1px solid #2a2a2a;font-size:11px;color:#bbb;min-height:16px;}
    #bone-highlight-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);
      background:rgba(255,45,150,.94);color:#fff;padding:6px 15px;border-radius:20px;
      font:600 13px/1 -apple-system,Segoe UI,sans-serif;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,.4);}
    #bone-highlight-label.hidden{display:none;}
    /* Left camera / view toolbar (over the viewport) */
    #cam-bar{
      position:absolute; left:8px; top:50%; transform:translateY(-50%);
      background:rgba(37,37,38,0.92); border:1px solid var(--vscode-border);
      border-radius:7px; padding:4px; display:flex; flex-direction:column; gap:2px;
      backdrop-filter:blur(6px); z-index:40;
    }
    .cam-btn{
      width:30px; height:30px; display:flex; align-items:center; justify-content:center;
      background:transparent; border:1px solid transparent; border-radius:5px;
      color:var(--vscode-fg); cursor:pointer; padding:0;
    }
    .cam-btn:hover{ background:var(--vscode-hover); border-color:#5a5a5a; }
    .cam-btn.active{ background:var(--vscode-accent); border-color:var(--vscode-accent); color:#fff; }
    .cam-btn svg{ width:16px; height:16px; pointer-events:none; }
    .cam-sep{ height:1px; background:var(--vscode-border); margin:2px 2px; }
  </style>
  <div id="bone-tree-panel" class="hidden">
    <div id="bone-tree-head">
      <span id="bone-tree-title">SKELETON</span>
      <span id="bone-tree-count"></span>
      <button id="bone-tree-close" title="Close">&#10005;</button>
    </div>
    <div id="bone-tree-legend">
      <span><i class="bt-dot bt-driven"></i>driven by clip</span>
      <span><i class="bt-dot bt-rest"></i>at rest</span>
    </div>
    <div id="bone-tree-list"></div>
    <div id="bone-tree-sel">Click a bone to highlight it in the viewport.</div>
  </div>
  <div id="bone-highlight-label" class="hidden"></div>

  <div id="empty">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;">
      <path d="M12 2L4 6.5v9L12 20l8-4.5v-9L12 2z"/>
      <path d="M4 6.5L12 11l8-4.5"/>
      <path d="M12 11v9"/>
    </svg>
    <div>Drop a 3D model in the FiveOS window to preview it here</div>
  </div>

  <!-- Emote-editor toolbar. Same viewer.html serves the 3D Model, Optimize and
       AI-preview viewports too, so it starts hidden and is revealed only on the
       pose viewer (Emotes page) by the wiring block below. -->
  <div id="cam-bar" style="display:none">
    <button class="cam-btn" id="cam-skel" title="Toggle Skeleton View">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 0 0-8 8v3.5l1.8 1.8V18a1 1 0 0 0 1 1H9v-2.5m6 2.5h2.2a1 1 0 0 0 1-1v-2.7L20 12v-2a8 8 0 0 0-8-8z"/><circle cx="9" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.6" fill="currentColor" stroke="none"/><path d="M11 16h2"/></svg>
    </button>
    <div class="cam-sep"></div>
    <button class="cam-btn active" id="cam-rotate" title="Rotate — left-drag orbits the camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 1 2.3 5.6"/><path d="M4 20v-4h4"/></svg>
    </button>
    <button class="cam-btn" id="cam-pan" title="Pan — left-drag slides the view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 12h18M12 3l-2.5 2.5M12 3l2.5 2.5M12 21l-2.5-2.5M12 21l2.5-2.5M3 12l2.5-2.5M3 12l2.5 2.5M21 12l-2.5-2.5M21 12l-2.5 2.5"/></svg>
    </button>
    <button class="cam-btn" id="cam-zoom" title="Zoom — left-drag or mouse wheel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M21 21l-5.2-5.2M7.5 10.5h6M10.5 7.5v6"/></svg>
    </button>
    <div class="cam-sep"></div>
    <button class="cam-btn" id="cam-reset" title="Reset Camera — re-frame the model">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V5.5A1.5 1.5 0 0 1 5.5 4H8M16 4h2.5A1.5 1.5 0 0 1 20 5.5V8M20 16v2.5a1.5 1.5 0 0 1-1.5 1.5H16M8 20H5.5A1.5 1.5 0 0 1 4 18.5V16"/><circle cx="12" cy="12" r="2.2"/></svg>
    </button>
    <button class="cam-btn active" id="cam-follow" title="Toggle Follow Camera — keep a travelling clip centred">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 9.5 21.5 6v12L16 14.5z"/><rect x="2.5" y="6" width="13.5" height="12" rx="2"/></svg>
    </button>
  </div>

  <!-- Animated-prop playback pill. Toggled + wired by the prop-animation
       module; only shown when the loaded prop has a baked clip. -->
  <div id="anim-bar">
    <span class="anim-dot"></span>
    <span class="anim-label">Animation</span>
    <button class="anim-btn" id="anim-toggle" title="Stop the preview animation and reset the prop to its static pose (props always export static — this only changes the preview). Click again to play it.">
      <svg class="ic-stop" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>

<script type="module">

// TIMELINE_STATE -- declared early so tick()'s reference to
// poseTimelineTick (which reads these) doesn't hit a TDZ at module init.
// See the TIMELINE / KEYFRAMES section further down for the function
// definitions that consume these.
let poseKeyframes = [];
let poseKeyframeSource = null;   // import origin: ycd-import, anim-import, video-import, editor, …
let poseBoneSpace = 'glb';       // timeline rotation space: glb (preview skeleton) or legacy native
let poseTime = 0;
let poseDuration = 2;
let poseFps = 30;
let posePlaying = false;
let poseLoop = true;
let poseLastTickMs = 0;
// Throttle for host tick messages during playback (see poseTimelineTick).

// ROOT MOTION (imported clips): the whole rig group (currentModel) is
// translated to carry the person's global travel/bob reconstructed from the
// video. Moving the model group (not a bone) is bulletproof — it can't be
// defeated by bone naming, bind matrices or skinning. Kept separate from the
// per-bone rotation snapshots so other imports (image / .ycd / .glb) — which
// send no `root` — leave the body in place exactly as before.
let poseRootTarget = null;    // the Object3D we translate (currentModel), or null
let poseRootBase = null;      // its base position (THREE.Vector3), restored when a clip has no root track
let poseRootBaseQuat = null;  // its base orientation — mover heading (yaw) composes on top of this
// Whether the PREVIEW applies per-frame root translation (the ped physically
// travelling). Imported clips default this OFF so an in-place dance/emote stays
// centred like the source viewer instead of sliding/skating across the floor —
// the extracted mover is still kept in the keyframes for export. The Movement

let poseRootMotionPreview = true;
let poseRootYawApplied = false; // true while an animated heading is live (restore base quat when it ends)
let poseUpAxis = null;        // lazy THREE.Vector3(0,1,0) — viewer up
let poseSuppressRootApply = false; // true while user drags whole-model translate gizmo
let poseModelDragStartPos = null;
let posePreviewFootIk = true;      // runtime foot contact polish in viewer (WYSIWYG preview)
let poseFloorOffsetY = 0;        // snap-to-ground vertical bias baked into export roots

// and animation clips that arrived with imported models (kind:'imported').
// Both representations are THREE.AnimationClip so an NLA strip editor
// can place either on the same lane without special-casing the source.

let poseStrips = [];
let poseStripNextId = 1;
let poseKeyNextId = 1;
let poseTimelineClipboard = null;
let poseTimelineUndo = [];
let poseTimelineRedo = [];

import { TransformControls } from 'three/addons/controls/TransformControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// to 1px on Windows/ANGLE, which is why the rig lines were invisible. These
// draw the skeleton bone lines AND the box/ring control wires with a dark
// casing so they read over the grey body.
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';

// ════════════════════════════════════════════════════════════════════
// EDITOR TELEMETRY — ring-buffer logger + corner ticker
//
// Pushes to a fixed-size array and paints the tail into #debug-ticker,
// bottom-left. Critical levels (errors, exports, mode transitions) also
// forward to the C# host, whose floating event log holds the full,
// filterable history — that's where to look for anything older than the
// last few lines.
//
// This used to drive a filterable overlay panel with show/hide/toggle.
// None of it was reachable: nothing ever called toggle() and no backtick
// handler existed, so the panel was dead weight behind display:none.
// ════════════════════════════════════════════════════════════════════
const fosTelemetry = (() => {
  const CAPACITY = 500;
  // How many lines the corner shows. Deliberately small: this is a
  // glance-at-it tail, not a log reader — the host's event log is.
  const TICKER_ROWS = 6;
  const entries = [];
  let tickerRoot = null;
  let renderPending = false;

  function stamp() {
    const d = new Date();
    const p2 = n => n < 10 ? '0' + n : '' + n;
    const p3 = n => n < 10 ? '00' + n : n < 100 ? '0' + n : '' + n;
    return p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds()) + '.' + p3(d.getMilliseconds());
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => (
      ch === '&' ? '&amp;' :
      ch === '<' ? '&lt;'  :
      ch === '>' ? '&gt;'  :
      ch === '"' ? '&quot;' : '&#39;'
    ));
  }

  function record(level, category, message, payload) {
    const row = {
      time: stamp(),
      level,                       // 'info' | 'warn' | 'err'
      category,                    // 'pose' | 'timeline' | 'export' | 'hotkey' | 'system' | 'error'
      text: String(message ?? ''),
      payload: (payload === undefined) ? null : payload,
    };
    entries.push(row);
    if (entries.length > CAPACITY) entries.splice(0, entries.length - CAPACITY);

    // Nothing is forwarded to the host any more. That existed to feed the
    // floating debug popup, which is gone; the host now pushes ITS events
    // in here instead (see AppendDebug), so the traffic runs one way and
    // this buffer is the single timeline of host + viewer activity.
    requestRedraw();
  }

  function requestRedraw() {
    if (renderPending) return;
    renderPending = true;
    requestAnimationFrame(() => { renderPending = false; redraw(); });
  }

  // Viewport corner: warnings + errors only. Info stays in the ring
  // buffer for snapshot()/devtools — it should not paint the 3D view.
  function redraw() {
    if (!tickerRoot) return;
    const slice = entries.filter(r => r.level === 'warn' || r.level === 'err').slice(-TICKER_ROWS);
    let html = '';
    for (const r of slice) {
      const cls = 'row ' + (r.level === 'err' ? 'err' : 'warn');
      html += `<div class="${cls}"><span class="t">${r.time}</span> <span class="c">${escHtml(r.category)}</span> ${escHtml(r.text)}</div>`;
    }
    tickerRoot.innerHTML = html;
  }

  function bind() {
    tickerRoot = document.getElementById('debug-ticker');
    redraw();
  }

  // Mirror warn/error into the ring buffer. Leave console.log alone —
  // Three.js and routine chatter would flood the corner ticker.
  const _warn = console.warn.bind(console);
  const _err = console.error.bind(console);
  function asText(v) {
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v); } catch (_) { return String(v); }
  }
  console.warn  = (...a) => { _warn(...a); record('warn', 'system', a.map(asText).join(' ')); };
  console.error = (...a) => { _err(...a);  record('err',  'error',  a.map(asText).join(' ')); };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bind);
  } else {
    bind();
  }

  return {
    info: (cat, msg, payload) => record('info', cat, msg, payload),
    warn: (cat, msg, payload) => record('warn', cat, msg, payload),
    err:  (cat, msg, payload) => record('err',  cat, msg, payload),
    // Full buffer, for poking at from devtools. The panel that used to
    // render this in-page is gone; the host's event log covers history.
    snapshot: () => entries.slice(),
  };
})();
window.fosTelemetry = fosTelemetry;

// ════════════════════════════════════════════════════════════════════
// POSE EDITING STATE — selection list, axis-lock mask, undo/redo
//
// `poseSelection` is an ordered list of bones (last = primary). The
// primary drives the gizmo; the rest follow via delta propagation on
// drag. Shift+click toggles a bone in/out of the list.
//

//
// `poseHistory` + `poseRedoStack` are typed event lists; each entry
// carries the full before/after state needed to apply or revert in
// isolation (no inter-entry diff resolution).
// ════════════════════════════════════════════════════════════════════
const HISTORY_CAPACITY = 100;
let poseSelection = [];                                    // ordered; primary = last
let axisLockMask = { x: true, y: true, z: true };           // all axes shown by default
let poseHistory = [];                                       // entries: { kind, payload }
let poseRedoStack = [];
let dragQuatCapture = null;        // Map<boneIndex, [x,y,z,w]> snapshotted on gizmo mouseDown

// pose-mode state until this gate opens — otherwise TDZ kills the module.

// User preference for the colored joint spheres. Host toggles via
// window.poseSetJointDots. Auto-hidden while an animation is playing
// regardless of this flag (playback shouldn't be covered in markers).
let poseJointDotsEnabled = true;
// Viewport rig overlay. Host sets via window.poseSetRigDisplay.
//   fiveos   — FK dots on ALL joints + IK handles on hands/feet (default)
//   markers  — every joint sphere + SkeletonHelper lines
//   none     — pickers only

let poseControlRigWidgets = [];   // leftover box widgets (cleared; unused)
let poseIkHandles = [];           // { id, target, mesh, kind, effector, twoBone, fabrikBones }
let poseIkActiveHandle = null;
let poseIkDragCapture = null;     // Map<boneIdx, quat> for undo while IK-dragging
// Full-body IK: one FABRIKSolver over the primary deform skeleton. Drives
// the multi-bone torso/shoulder lean + spine + head chains so dragging a
// hand carries the clavicle and upper chest with it; the analytic
// two-bone solver still cleans the elbow/knee afterwards. Rebuilt whenever
// the IK handles are (re)built; chains stay disabled until a handle is
// grabbed so only the dragged limb ever solves.
let poseFabrik = null;
let poseFabrikSkeleton = null;
let poseHoverIkHandle = null;     // IK handle currently under the cursor (hover glow)
let poseIkMode = false;           // false = FK (click a limb → rotate); true = IK (drag a hand/foot → shoulder+chest+other side follow)
let _boneLinesOn = true;          // thick skeleton bone lines on/off (rig sub-toggle)
let _fingersMode = 'on';          // 'on' | 'off' — finger control visibility
let _posePaintPending = false;    // set on enterPoseMode; posts 'pose-painted' after the first render

function hudEl(id) { return document.getElementById(id); }

// Show / hide the view panel with pose mode. The panel itself owns no
// per-bone state anymore (sidebar covers that) so the only thing this
// function does is toggle the .visible class. Kept under the old name
// because every transform-event handler in this file calls into it; a
// rename would be needless churn.
function updatePoseHud() {
  const hud = hudEl('pose-hud');
  if (!hud) return;
  hud.classList.toggle('visible', !!poseMode);
}

// ─── Viewport view state (driven by the pose-mode panel sliders) ───
//
// All three controls are live — moving a slider mutates the relevant
// three.js object immediately and re-renders. Mesh opacity also runs
// every time a new model loads (see applyMeshOpacity callers in
// loadGtaSkeleton / loadModel) so the "see-through" default sticks
// across rig swaps.
const VIEW_LIGHT_RADIUS = 8;
const VIEW_LIGHT_ELEVATION = 6;
let viewLightIntensity = 1.5;
let viewLightAngleRad = Math.PI / 4;   // 45° default — soft 3/4 light
let viewMeshOpacity = 1.0;

function applyLightSettings() {
  if (!key) return;
  key.intensity = viewLightIntensity;
  key.position.set(
    Math.cos(viewLightAngleRad) * VIEW_LIGHT_RADIUS,
    VIEW_LIGHT_ELEVATION,
    Math.sin(viewLightAngleRad) * VIEW_LIGHT_RADIUS,
  );
  requestRender();
}

// Walk currentModel and apply the opacity to every mesh material. When
// opacity drops below 1 we also flip transparent on and depthWrite off
// so the joint markers / skeleton lines parented behind the mesh stay
// visible through it. We don't snapshot the originals — a fresh model
// load reassigns materials wholesale, so there's nothing to restore.
function applyMeshOpacity() {
  if (!currentModel) return;
  const op = viewMeshOpacity;
  const seeThrough = op < 0.999;
  currentModel.traverse(n => {
    if (!n.isMesh && !n.isSkinnedMesh) return;
    // Joint markers / pickers are parented under bones; leave their
    // materials alone so the body-opacity slider can't resurrect dots
    // we intentionally hid on selection.
    if (n.userData && (n.userData.poseBone || n.userData.isPicker || n.userData.isControlRigWidget || n.userData.isIkHandle)) return;
    const mats = Array.isArray(n.material) ? n.material : [n.material];
    for (const m of mats) {
      if (!m) continue;
      m.transparent = seeThrough;
      m.opacity = op;
      m.depthWrite = !seeThrough;
      m.needsUpdate = true;
    }
  });
  requestRender();
}

// Wire the three sliders to the state above. Runs once at boot; the
// DOM elements exist statically in index.html so there's no race with
// the rest of viewer startup.
(function wireViewPanel() {
  const iSlider = hudEl('ctl-light-intensity');
  const iValue = hudEl('ctl-light-intensity-v');
  const aSlider = hudEl('ctl-light-angle');
  const aValue = hudEl('ctl-light-angle-v');
  const oSlider = hudEl('ctl-mesh-opacity');
  const oValue = hudEl('ctl-mesh-opacity-v');
  if (iSlider) {
    iSlider.addEventListener('input', () => {
      viewLightIntensity = parseFloat(iSlider.value);
      if (iValue) iValue.textContent = viewLightIntensity.toFixed(2);
      applyLightSettings();
    });
  }
  if (aSlider) {
    aSlider.addEventListener('input', () => {
      const deg = parseFloat(aSlider.value);
      viewLightAngleRad = deg * Math.PI / 180;
      if (aValue) aValue.textContent = `${Math.round(deg)}°`;
      applyLightSettings();
    });
  }
  if (oSlider) {
    oSlider.addEventListener('input', () => {
      viewMeshOpacity = parseFloat(oSlider.value);
      if (oValue) oValue.textContent = viewMeshOpacity.toFixed(2);
      applyMeshOpacity();
    });
  }
})();

function applyAxisLockToGizmo() {
  transformControls.showX = axisLockMask.x;
  transformControls.showY = axisLockMask.y;
  transformControls.showZ = axisLockMask.z;

function setAxisLock(axis) {
  // Pin to a single axis. If already pinned to this axis, clear back to all.
  const alreadyPinned = axisLockMask[axis]
    && ['x','y','z'].filter(o => o !== axis).every(o => !axisLockMask[o]);
  if (alreadyPinned) {
    axisLockMask = { x: true, y: true, z: true };
    fosTelemetry.info('hotkey', `axis lock cleared`);
  } else {
    axisLockMask = { x: axis === 'x', y: axis === 'y', z: axis === 'z' };
    fosTelemetry.info('hotkey', `axis pinned: ${axis.toUpperCase()}`);
  }
  applyAxisLockToGizmo();
}

function clearAxisLock() {
  if (axisLockMask.x && axisLockMask.y && axisLockMask.z) return;
  axisLockMask = { x: true, y: true, z: true };
  applyAxisLockToGizmo();
  fosTelemetry.info('hotkey', 'axis lock cleared');
}

// ─── History primitives ─────────────────────────────────────────────
//
// Each history entry knows how to apply itself in either direction.
// Adding new editable operations (mirror, reset, KF add/delete) is just
// a matter of pushing a new entry type into the union below.
// Depth is COMBINED across the two stacks (pose edits + timeline document
// ops) — the host's Ctrl+Z and toolbar buttons drive hostUndo/hostRedo,
// which pop whichever stack holds the most recent action, so the enabled
// state must reflect both. Broadcast after every push/pop/clear: the old
// design only broadcast from inside poseUndo/poseRedo, which deadlocked
// the WPF buttons (IsEnabled waits for a depth that only arrives once a
// disabled button is clicked).
function postPoseHistoryDepth(op, kindOf) {
  postToHost({
    kind: 'pose-history', op: op || 'push', kindOf: kindOf || '',
    depth: poseHistory.length + poseTimelineUndo.length,
    redoDepth: poseRedoStack.length + poseTimelineRedo.length,
  });
}

function pushHistory(entry) {
  entry.t = performance.now();   // cross-stack ordering for hostUndo
  poseHistory.push(entry);
  if (poseHistory.length > HISTORY_CAPACITY) poseHistory.splice(0, poseHistory.length - HISTORY_CAPACITY);
  poseRedoStack.length = 0;       // any new edit invalidates the redo trail
  fosTelemetry.info('pose', `history push: ${entry.kind}`, { size: poseHistory.length });
  postPoseHistoryDepth('push', entry.kind);
}

/// Drop BOTH histories (clip import / rig swap rewrote the world the
/// entries were captured against — popping them would corrupt the pose).
function poseClearHistory(reason) {
  poseHistory.length = 0;
  poseRedoStack.length = 0;
  poseTimelineUndo.length = 0;
  poseTimelineRedo.length = 0;
  postPoseHistoryDepth('clear', reason || '');
}

// Restore one snapshot item onto a poseBones entry: quat always, position
// when the snapshot recorded one (reset restores rest positions too).
function applySnapItem(it, target) {
  const bone = poseBones[it.idx];
  if (!bone) return;
  const q = it[target] || it.q;
  if (q) bone.quaternion.set(q[0], q[1], q[2], q[3]);
  const p = it[target + 'P'] || it.p;
  if (p) bone.position.set(p[0], p[1], p[2]);
}

function applyHistoryEntry(entry, direction /* 'undo' | 'redo' */) {
  switch (entry.kind) {
    case 'rotate': {
      // payload.items = [{ idx, before:[x,y,z,w], after:[x,y,z,w] }, ...]
      const target = direction === 'undo' ? 'before' : 'after';
      for (const it of entry.payload.items) applySnapItem(it, target);
      break;
    }
    case 'mirror':
    case 'reset': {
      const snap = direction === 'undo' ? entry.payload.before : entry.payload.after;
      for (const it of snap) applySnapItem(it, 'q');
      // Aux twist/corrective bones (outside poseBones) — reset moves them
      // to rest, so its history entries carry name-keyed aux snapshots.
      const auxSnap = direction === 'undo' ? entry.payload.beforeAux : entry.payload.afterAux;
      if (Array.isArray(auxSnap)) {
        for (const it of auxSnap) {
          const bone = poseAuxByName.get(it.name);
          if (!bone) continue;
          if (it.q) bone.quaternion.set(it.q[0], it.q[1], it.q[2], it.q[3]);
          if (it.p) bone.position.set(it.p[0], it.p[1], it.p[2]);
        }
      }
      break;
    }
    case 'keyframes': {
      // Whole-array snapshot of poseKeyframes (add/delete/move/clear/ease).
      const snap = direction === 'undo' ? entry.payload.before : entry.payload.after;
      poseKeyframes = JSON.parse(JSON.stringify(snap));
      postToHost({
        kind: 'pose-timeline-update',
        keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })),
        keyIds: poseKeyframes.map(k => k.id),
        time: poseTime, duration: poseDuration, fps: poseFps,
        playing: posePlaying, loop: poseLoop,
      });
      break;
    }
    case 'timeline-document': {
      const snap = direction === 'undo' ? entry.payload.before : entry.payload.after;
      poseRestoreTimelineState(snap);
      break;
    }
  }
  // Derived state must chase the restored bones: aux follow (ThighRolls),
  // skinned meshes, and the IK rings — otherwise undone IK drags leave
  // the rings floating at the pre-undo hand/foot position.
  poseSyncSkeletonMeshes();
  if (typeof syncIkHandleTransforms === 'function') syncIkHandleTransforms(true);
  requestRender();
}

window.poseUndo = function () {
  if (poseHistory.length === 0) {
    fosTelemetry.warn('hotkey', 'undo: history empty');
    return false;
  }
  const entry = poseHistory.pop();
  applyHistoryEntry(entry, 'undo');
  poseRedoStack.push(entry);
  fosTelemetry.info('pose', `undo: ${entry.kind}`, { remaining: poseHistory.length });
  postPoseHistoryDepth('undo', entry.kind);
  return true;
};

window.poseRedo = function () {
  if (poseRedoStack.length === 0) {
    fosTelemetry.warn('hotkey', 'redo: stack empty');
    return false;
  }
  const entry = poseRedoStack.pop();
  applyHistoryEntry(entry, 'redo');
  poseHistory.push(entry);
  fosTelemetry.info('pose', `redo: ${entry.kind}`, { remaining: poseRedoStack.length });
  postPoseHistoryDepth('redo', entry.kind);
  return true;
};

// Unified entry points for the host (toolbar buttons + WPF Ctrl+Z/Y):
// pop whichever stack holds the MOST RECENT action — pose-bone edits
// live in poseHistory, dope-sheet/strip ops in poseTimelineUndo, and
// routing blindly to one of them made the other's Ctrl+Z a silent no-op.
window.hostUndo = function () {
  const pT = poseHistory.length ? (poseHistory[poseHistory.length - 1].t || 0) : -1;
  const tT = poseTimelineUndo.length ? (poseTimelineUndo[poseTimelineUndo.length - 1].t || 0) : -1;
  if (pT < 0 && tT < 0) return false;
  if (tT > pT) {
    const entry = poseTimelineUndo.pop();
    poseRestoreTimelineState(entry.before);
    poseTimelineRedo.push(entry);
    postPoseHistoryDepth('undo', entry.op || 'timeline');
    return true;
  }
  return window.poseUndo();
};

window.hostRedo = function () {
  const pT = poseRedoStack.length ? (poseRedoStack[poseRedoStack.length - 1].t || 0) : -1;
  const tT = poseTimelineRedo.length ? (poseTimelineRedo[poseTimelineRedo.length - 1].t || 0) : -1;
  if (pT < 0 && tT < 0) return false;
  // Redo replays in the opposite order of undo: take the OLDER action.
  if (tT >= 0 && (pT < 0 || tT < pT)) {
    const entry = poseTimelineRedo.pop();
    poseRestoreTimelineState(entry.after);
    poseTimelineUndo.push(entry);
    postPoseHistoryDepth('redo', entry.op || 'timeline');
    return true;
  }
  return window.poseRedo();
};

window.poseHistoryDepth = function () {
  return {
    undo: poseHistory.length + poseTimelineUndo.length,
    redo: poseRedoStack.length + poseTimelineRedo.length,
  };
};

// Take a full snapshot of every posable bone's quaternion + local
// position. Used by mirror/reset history entries that need to revert a
// wide change in one step (reset also restores rest POSITIONS, so undo
// must be able to bring the edited ones back).
function snapshotAllPoseQuats() {
  return poseBones.map((b, i) => ({
    idx: i,
    q: [b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w],
    p: [b.position.x, b.position.y, b.position.z],
  }));
}

/// Name-keyed snapshot of the aux twist/corrective bones (they live
/// outside poseBones, so idx-based snapshots can't reach them).
function snapshotAuxBones() {
  return poseAuxBones.map(b => ({
    name: b.name,
    q: [b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w],
    p: [b.position.x, b.position.y, b.position.z],
  }));
}

/// Wrap a poseKeyframes mutation in an undoable whole-array snapshot.
function commitKeyframesMutation(label, mutate) {
  const before = JSON.parse(JSON.stringify(poseKeyframes));
  const result = mutate();
  const after = JSON.parse(JSON.stringify(poseKeyframes));
  if (JSON.stringify(before) !== JSON.stringify(after))
    pushHistory({ kind: 'keyframes', payload: { before, after }, label: label || '' });
  return result;
}

// ─────── scene + renderer ───────
const viewport = document.getElementById('viewport');
const status = document.getElementById('status');
const empty = document.getElementById('empty');
const gizmoBar = document.getElementById('gizmo-bar');

// ─────── dot-matrix loader ───────
// Five styles share a single 5×5 grid + frame ticker. Frames are
// 5×5 boolean masks; the ticker swaps the `.lit` class on each dot.
const dotLoader = (() => {
  const root = document.getElementById('dot-loader');
  const gridEl = document.getElementById('dot-loader-grid');
  const captionEl = document.getElementById('dot-loader-caption');
  const dots = [];
  for (let i = 0; i < 25; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    gridEl.appendChild(d);
    dots.push(d);
  }

  const FRAME_MS = 80;
  function blank() { return Array.from({ length: 5 }, () => Array(5).fill(false)); }

  function pulseLadder() {
    const rungs = [0,0,1,1,2,2,3,3,4,4,3,3,2,2,1,1];
    return rungs.map(rr => {
      const f = blank();
      for (let r = 0; r < 5; r++) { f[r][1] = true; f[r][3] = true; }
      f[rr][1] = f[rr][2] = f[rr][3] = true;
      return f;
    });
  }
  function soundBars() {
    const out = [];
    for (let fi = 0; fi < 20; fi++) {
      const f = blank();
      const t = fi / 20;
      for (let c = 0; c < 5; c++) {
        const h = Math.max(1, Math.min(5, Math.round(3 + 2 * Math.sin(2*Math.PI*t + c*0.6))));
        for (let r = 5 - h; r < 5; r++) f[r][c] = true;
      }
      out.push(f);
    }
    return out;
  }
  function coreSpiral() {
    const path = [
      [2,2],[2,3],[1,3],[1,2],[1,1],[2,1],[3,1],[3,2],[3,3],
      [3,4],[2,4],[1,4],[0,4],[0,3],[0,2],[0,1],[0,0],
      [1,0],[2,0],[3,0],[4,0],[4,1],[4,2],[4,3],[4,4]
    ];
    const out = [];
    for (let i = 0; i < path.length; i++) {
      const f = blank();
      for (let t = 0; t < 4 && i - t >= 0; t++) {
        const [r, c] = path[i - t];
        f[r][c] = true;
      }
      out.push(f);
    }
    const all = blank().map(row => row.fill(true));
    out.push(all, all, blank(), blank());
    return out;
  }
  function helixGlow() {
    const out = [];
    for (let fi = 0; fi < 24; fi++) {
      const f = blank();
      const t = fi / 24;
      for (let c = 0; c < 5; c++) {
        const a = Math.max(0, Math.min(4, Math.round(2 + 2 * Math.sin(2*Math.PI*t + c*0.9))));
        const b = Math.max(0, Math.min(4, Math.round(2 - 2 * Math.sin(2*Math.PI*t + c*0.9))));
        f[a][c] = true;
        f[b][c] = true;
      }
      out.push(f);
    }
    return out;
  }
  function blockDrop() {
    const out = [];
    for (let c = 0; c < 5; c++) {
      for (let r = 0; r < 5; r++) {
        const f = blank();
        for (let prev = 0; prev < c; prev++) f[4][prev] = true;
        f[r][c] = true;
        out.push(f);
      }
    }
    const full = blank();
    for (let c = 0; c < 5; c++) full[4][c] = true;
    out.push(full, full, blank());
    return out;
  }

  const FRAMES = {
    pulseLadder: pulseLadder(),
    soundBars: soundBars(),
    coreSpiral: coreSpiral(),
    helixGlow: helixGlow(),
    blockDrop: blockDrop(),
  };

  let timer = null;
  let frames = FRAMES.helixGlow;
  let idx = 0;

  function render(frame) {
    for (let r = 0; r < 5; r++)
      for (let c = 0; c < 5; c++)
        dots[r * 5 + c].classList.toggle('lit', frame[r][c]);
  }

  function show(style, caption) {
    frames = FRAMES[style] || FRAMES.helixGlow;
    idx = 0;
    captionEl.textContent = caption || 'Loading...';
    root.classList.add('visible');
    if (timer) clearInterval(timer);
    render(frames[0]);
    timer = setInterval(() => {
      idx = (idx + 1) % frames.length;
      render(frames[idx]);
    }, FRAME_MS);
  }
  function hide() {
    root.classList.remove('visible');
    if (timer) { clearInterval(timer); timer = null; }
  }
  return { show, hide };
})();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });

// 2.5–3, which means the GL framebuffer becomes 6.25–9× the logical-pixel
// count and antialiased rendering balloons accordingly. Capping at 2 still

// ─────── Lighting ───────
// Pose editor keeps the neutral studio env (PMREM-baked RoomEnvironment).
// The 3D Model page uses a real HDRI (day/night) for image-based lighting.
const pmrem = new THREE.PMREMGenerator(renderer);

scene.environment = roomEnvTex;

// Key/"sun" directional light — its direction follows the HDRI rotation so
// highlights and shadow direction track the "Rotate" control.
const key = new THREE.DirectionalLight(0xffffff, 1.5);
key.position.set(4, 8, 4);
scene.add(key);

// HDRI environment lighting (model mode). CC0 HDRIs from Poly Haven.
const HDRI = {
  day:   { url: 'hdri/day_1k.hdr',   sun: 0xfff1dc, sunI: 1.5, exposure: 1.0 },
  night: { url: 'hdri/night_1k.hdr', sun: 0x9fb4ff, sunI: 0.35, exposure: 1.2 },
};
const hdriState = { preset: 'day', rotation: 0, intensity: 1.0, active: false };
const _rgbe = new RGBELoader();
const _hdriCache = {};
let _hdriRT = null;
let _rebakeTimer = null;

// Two big inverted spheres show the HDRI as a sky. `skybox` sits in the main
// scene (visible background, follows the camera, tone-mapped); `envSky` sits in
// envScene at the origin and is what we bake the IBL from, so reflections
// rotate together with the visible sky.
const _skyGeo = new THREE.SphereGeometry(10, 60, 40);
const _skyMatView = new THREE.MeshBasicMaterial({ side: THREE.BackSide, depthTest: false, depthWrite: false, toneMapped: true });
const _skyMatEnv  = new THREE.MeshBasicMaterial({ side: THREE.BackSide, toneMapped: false });
const skybox = new THREE.Mesh(_skyGeo, _skyMatView);
skybox.renderOrder = -Infinity;
skybox.frustumCulled = false;
skybox.visible = false;
scene.add(skybox);
const envScene = new THREE.Scene();
const envSky = new THREE.Mesh(_skyGeo, _skyMatEnv);
envScene.add(envSky);

// Keep the visible skybox centered on the camera on every render (any model scale).
const _origRender = renderer.render.bind(renderer);
renderer.render = function (scn, cam) {
  if (skybox.visible && cam && cam.position) skybox.position.copy(cam.position);
  return _origRender(scn, cam);
};

function _loadHdri(preset) {
  if (_hdriCache[preset]) return Promise.resolve(_hdriCache[preset]);
  return new Promise((resolve) => {
    _rgbe.load(HDRI[preset].url, (t) => {
      t.mapping = THREE.EquirectangularReflectionMapping;
      _hdriCache[preset] = t;
      resolve(t);
    }, undefined, () => resolve(null));
  });
}
function _rebakeHdri() {
  if (!hdriState.active) return;
  if (_hdriRT) _hdriRT.dispose();
  _hdriRT = pmrem.fromScene(envScene, 0.02);
  scene.environment = _hdriRT.texture;
  requestRender();
}
function _scheduleRebake() { clearTimeout(_rebakeTimer); _rebakeTimer = setTimeout(_rebakeHdri, 130); }
function _applyHdriRotation() {
  const r = hdriState.rotation;
  skybox.rotation.y = r;
  envSky.rotation.y = r;
  key.position.set(Math.cos(r) * 8, 7, Math.sin(r) * 8);
}
function _applyHdriIntensity() {
  const cfg = HDRI[hdriState.preset];
  renderer.toneMappingExposure = cfg.exposure * hdriState.intensity;
  key.intensity = cfg.sunI * hdriState.intensity;
}
async function setHdriPreset(preset) {
  if (!HDRI[preset]) return;
  hdriState.preset = preset;
  const tex = await _loadHdri(preset);
  if (!tex) return;
  _skyMatView.map = tex; _skyMatView.needsUpdate = true;
  _skyMatEnv.map = tex; _skyMatEnv.needsUpdate = true;
  key.color.setHex(HDRI[preset].sun);
  _applyHdriRotation();
  _applyHdriIntensity();
  _rebakeHdri();
  document.querySelectorAll('#hdri-bar [data-preset]').forEach((b) =>
    b.classList.toggle('active', b.dataset.preset === preset));
}
async function enableHdriLighting() {
  hdriState.active = true;

  // background. Keep the neutral viewport backdrop and hide the sky sphere.
  scene.background = new THREE.Color(0x1a1a1a);

  await setHdriPreset(hdriState.preset);

}
function disableHdriLighting() {
  hdriState.active = false;

  const bar = document.getElementById('hdri-bar');

// ─────── transform gizmo ───────
// Vanilla three.js TransformControls — no geometry overrides. The
// stock handles ARE the "real gizmo control"; previous attempts to
// thicken the tori for hit-affordance always read as "fat donut"

// MAX world-space size the gizmo may occupy (set per model in frameModel).
// TransformControls scales handles by (factor * size / 4) where factor grows
// with camera distance (constant screen size). We keep that screen-constant
// behaviour while close, but re-derive .size each frame so the world size
// never exceeds this cap when the camera pulls far away — see
// updateGizmoWorldSize().
let gizmoTargetWorldSize = 1;

// While dragging the gizmo, disable orbit controls so we don't spin the camera.

  controls.enabled = !e.value;

    if (e.value) {
      poseModelDragStartPos = poseRootTarget.position.clone();
    } else if (poseModelDragStartPos && poseRootBase) {
      const d = new THREE.Vector3().subVectors(poseRootTarget.position, poseModelDragStartPos);
      if (d.lengthSq() > 1e-10) {
        poseRootBase.add(d);
        poseRootTarget.userData = poseRootTarget.userData || {};
        poseRootTarget.userData._poseBasePos = poseRootBase.clone();
      }
      poseModelDragStartPos = null;
    }
  }
});

// History capture: FK rotate selection, or IK limb chain (A/B/C bones).
transformControls.addEventListener('mouseDown', () => {
  if (!poseMode) return;
  if (poseIkActiveHandle && transformControls.mode === 'translate') {
    poseIkDragCapture = new Map();
    // Snapshot every bone the chain can rotate (full FABRIK chain + the
    // analytic triplet) so a full-body IK drag is one atomic undo step.
    for (const bone of ikAffectedBones(poseIkActiveHandle)) {
      const idx = poseBones.indexOf(bone);
      if (idx < 0) continue;
      poseIkDragCapture.set(idx, [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w]);
    }
    return;
  }
  if (transformControls.mode !== 'rotate') return;
  if (poseSelection.length === 0) return;
  dragQuatCapture = new Map();
  for (const bone of poseSelection) {
    const idx = poseBones.indexOf(bone);
    if (idx < 0) continue;
    dragQuatCapture.set(idx, [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w]);
  }
});

transformControls.addEventListener('mouseUp', () => {
  if (!poseMode) return;
  if (poseIkDragCapture && poseIkDragCapture.size > 0) {
    const items = [];
    for (const [idx, before] of poseIkDragCapture) {
      const bone = poseBones[idx];
      if (!bone) continue;
      const after = [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w];
      let changed = false;
      for (let i = 0; i < 4; i++) {
        if (Math.abs(before[i] - after[i]) > 1e-6) { changed = true; break; }
      }
      if (changed) items.push({ idx, before, after });
    }
    poseIkDragCapture = null;
    if (items.length > 0) pushHistory({ kind: 'rotate', payload: { items } });
    return;
  }
  if (transformControls.mode !== 'rotate') return;
  if (!dragQuatCapture || dragQuatCapture.size === 0) { dragQuatCapture = null; return; }
  const items = [];
  for (const [idx, before] of dragQuatCapture) {
    const bone = poseBones[idx];
    if (!bone) continue;
    const after = [bone.quaternion.x, bone.quaternion.y, bone.quaternion.z, bone.quaternion.w];
    let changed = false;
    for (let i = 0; i < 4; i++) {
      if (Math.abs(before[i] - after[i]) > 1e-6) { changed = true; break; }
    }
    if (changed) items.push({ idx, before, after });
  }
  dragQuatCapture = null;
  if (items.length > 0) {
    pushHistory({ kind: 'rotate', payload: { items } });
  }
});

// ─────── click-to-select ───────
//
// The gizmo is only attached/visible when the user clicks on the loaded
// prop. Clicking the reference ped, the grid, or empty space deselects.
// Without this, the gizmo handles always sit on top of the reference and
// clutter the scale-comparison view. Drags (orbit / pan) are excluded by
// the small movement threshold so navigation never collapses the gizmo.
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let pointerDownAt = null;

renderer.domElement.addEventListener('pointerdown', e => {
  pointerDownAt = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointerup', e => {
  // CRITICAL: in pose mode the gizmo belongs to a BONE, not the model
  // root. If we let this handler run, every click that misses a joint
  // marker (which is basically every click on the model body) would
  // raycast currentModel below and call transformControls.attach
  // (currentModel) — yanking the gizmo off the bone and onto the
  // root, causing the "gizmo glitches between all bones" symptom the
  // user sees when dragging rotation rings. Pose mode owns its own
  // click routing via the capture-phase listener further down; this
  // default prop-mode handler must stay out.
  if (poseMode) {
    pointerDownAt = null;
    return;
  }
  const start = pointerDownAt;
  pointerDownAt = null;
  if (!start) return;
  // Treat anything beyond ~4px as a drag, not a click.
  if (Math.hypot(e.clientX - start.x, e.clientY - start.y) > 4) return;
  // Don't fight the gizmo: if we're hovering / dragging a handle, the
  // TransformControls already owns this click.
  if (transformControls.dragging) return;
  if (transformControls.axis) return;

  if (!currentModel) {
    transformControls.detach();
    gizmoBar.style.display = 'none';
    return;
  }

  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);

  // Both the primary AND the secondary ped count as selectable hits so
  // the user can grab either with the gizmo and translate / rotate /
  // scale it independently (paired emote authoring needs the freedom to
  // shuffle the two characters relative to each other before posing).
  // Reference and grid are still excluded by listing the explicit roots.
  // recursive=true so child meshes count for their parent root; we walk
  // back up to whichever top-level root we hit so the gizmo attaches to
  // the right Group instead of a leaf SkinnedMesh.
  const targets = [currentModel];
  if (secondaryPed) targets.push(secondaryPed);
  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length > 0) {
    const leaf = hits[0].object;
    let root = leaf;
    while (root && root !== currentModel && root !== secondaryPed) root = root.parent;
    if (root) {
      transformControls.attach(root);
      gizmoBar.style.display = 'flex';
    }
    // Sub-mesh pick: clicking a leaf mesh of the user's prop locks it as the
    // selected sub-mesh so the user can split it out ("Separate"). The gizmo
    // still drives the whole prop (attached to `root` above) — selection is
    // an independent, layer-authoring concept. Only the primary model
    // participates; the reference/secondary ped never gets a "Separate" chip.
    if (root === currentModel && (leaf.isMesh || leaf.isSkinnedMesh)) {
      selectSubMesh(leaf);
    } else {
      clearSubMeshSelection();
    }
  } else {
    transformControls.detach();
    gizmoBar.style.display = 'none';
    clearSubMeshSelection();
  }
});

// The numeric Pos/Rot/Scale inputs now live in the WPF sidebar (host
// reads transform messages and binds them to its own NumberBoxes); this
// function used to mirror live values into in-overlay inputs but is now
// a no-op. Kept (and still called) so call-sites elsewhere don't need
// to change — postTransformToHost is the only push the host needs.
function syncTransformInputs() {}

// Apply a transform pushed FROM the host (sidebar NumberBox edits).
// The host is the source of truth for typed values; we never echo back
// via postTransformToHost from here, otherwise a feedback loop would
// kick in via OnViewerMessage → VM property → applyTransform.
window.applyTransform = function (payload) {
  if (!currentModel || !payload) return;
  if (Array.isArray(payload.pos) && payload.pos.length === 3) {
    currentModel.position.set(payload.pos[0], payload.pos[1], payload.pos[2]);
  }
  if (Array.isArray(payload.rot) && payload.rot.length === 3) {
    currentModel.rotation.set(
      THREE.MathUtils.degToRad(payload.rot[0]),
      THREE.MathUtils.degToRad(payload.rot[1]),
      THREE.MathUtils.degToRad(payload.rot[2])
    );
  }
  // Accept scale as either a scalar (legacy uniform) or a [x,y,z]
  // triple so the host can preserve non-uniform stretches.
  if (Array.isArray(payload.scale) && payload.scale.length === 3) {
    const sx = +payload.scale[0], sy = +payload.scale[1], sz = +payload.scale[2];
    if (sx > 0 && sy > 0 && sz > 0) {
      currentModel.scale.set(sx, sy, sz);
      updateGizmoSizeFromModel();
    }
  } else if (typeof payload.scale === 'number' && payload.scale > 0) {
    currentModel.scale.set(payload.scale, payload.scale, payload.scale);
    updateGizmoSizeFromModel();
  }
  currentModel.updateMatrixWorld(true);
  if (poseMode && poseRootTarget === currentModel && poseRootBase) {
    poseSyncRootBaseFromCurrentPosition();
  }
  // One-shot re-frame after the host's auto-fit scale lands (see the loader).
  // Without this the camera stays framed for the pre-scale (huge/tiny) model
  // and the corrected model is off-screen. Re-ground so it also sits on the
  // floor, then re-frame the camera on its new bounds.
  if (window._fiveosPendingAutoFrame && !poseMode) {
    window._fiveosPendingAutoFrame = false;
    try { if (window.snapToGround) window.snapToGround(); } catch (e) {}
    try { frameAll(); } catch (e) {}
  }
  requestRender();
};

function postTransformToHost() {
  if (!currentModel) return;
  postToHost({
    kind: 'transform',
    pos: [currentModel.position.x, currentModel.position.y, currentModel.position.z],
    rot: [
      THREE.MathUtils.radToDeg(currentModel.rotation.x),
      THREE.MathUtils.radToDeg(currentModel.rotation.y),
      THREE.MathUtils.radToDeg(currentModel.rotation.z),
    ],
    // Per-axis scale so the host preserves non-uniform stretches when
    // the "Uniform scale" lock is off. Host parses scale as either a
    // scalar (legacy) or a [x,y,z] triple.
    scale: [currentModel.scale.x, currentModel.scale.y, currentModel.scale.z],
  });
}

// Post live transform values to the WPF host so it can pass them to the
// converter when the user clicks Convert.
transformControls.addEventListener('change', () => {
  if (!currentModel) return;
  postTransformToHost();
  syncTransformInputs();
});

// Force uniform scale when the lock checkbox is on.
const lockToggle = document.getElementById('lock-toggle');
let scaleLocked = true;
lockToggle.addEventListener('change', () => {
  scaleLocked = lockToggle.checked;
});
transformControls.addEventListener('objectChange', () => {
  if (currentModel && scaleLocked && transformControls.mode === 'scale') {
    const s = currentModel.scale.x;
    currentModel.scale.set(s, s, s);
  }
  // Keep the gizmo proportional to the model as the user drags scale —
  // otherwise scaling down a prop leaves giant handles floating around it.
  if (transformControls.mode === 'scale') {
    updateGizmoSizeFromModel();
  }
});

// Mode buttons (Move / Rotate / Scale).
function setGizmoMode(mode) {
  let matched = false;
  document.querySelectorAll('.gizmo-btn[data-mode]').forEach(b => {
    const isMatch = b.dataset.mode === mode;
    b.classList.toggle('active', isMatch);
    if (isMatch) matched = true;
  });
  if (matched) transformControls.setMode(mode);
}
document.querySelectorAll('.gizmo-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => setGizmoMode(btn.dataset.mode));
});

// Keyboard shortcuts. Two distinct routing paths:
//   - Pose mode: timeline + selection + history + axis-lock + camera focus
//   - Prop / scale mode: W/E/R for TransformControls modes (Blender/Maya
//     muscle memory), F for the wireframe overlay
//
// Skip when an HTML input has focus so typing into the height NumberBox
// doesn't fire camera-focus etc.
window.addEventListener('keydown', e => {
  if (e.target instanceof HTMLInputElement) return;
  if (e.target instanceof HTMLTextAreaElement) return;

  const k = e.key;
  const lower = k.toLowerCase();
  const ctrl = e.ctrlKey || e.metaKey;

  // Pose-mode bindings come first since they're context-sensitive.
  if (poseMode) {
    // Undo / redo are universal in pose mode regardless of selection.
    // hostUndo/hostRedo pop the newest action across BOTH stacks (pose
    // edits + timeline ops) so Ctrl+Z behaves the same here as from WPF.
    if (ctrl && lower === 'z' && !e.shiftKey) { window.hostUndo(); e.preventDefault(); return; }
    if (ctrl && (lower === 'y' || (lower === 'z' && e.shiftKey))) { window.hostRedo(); e.preventDefault(); return; }

    // Plain hotkeys (no modifiers required).
    if (!ctrl && !e.altKey) {
      // Axis lock: Shift+X/Y/Z pins to that axis only; pressing the same
      // again clears. Esc clears regardless.
      if (e.shiftKey && (lower === 'x' || lower === 'y' || lower === 'z')) {
        setAxisLock(lower);
        e.preventDefault();
        return;
      }
      if (k === 'Escape') {
        // Esc clears axis lock first; second press clears bone selection.
        if (!(axisLockMask.x && axisLockMask.y && axisLockMask.z)) {
          clearAxisLock();
        } else if (poseSelection.length > 0) {
          poseSelection = [];
          transformControls.detach();
          refreshPoseJointDots();
          updatePoseHud();
          requestRender();
          fosTelemetry.info('hotkey', 'selection cleared');
        }
        return;
      }
      // Industry-standard take-sequencer transport. Frame-step on arrows
      // and , / . (Premiere/Resolve/Avid convention); 10-frame on Shift
      // variants; Up/Down jump between keyframes; / toggles loop. These
      // are handled BEFORE the generic "Shift returns early" gate so
      // Shift+arrow / Shift+, / Shift+. land here, not in axis-lock.
      const frameDt = 1 / Math.max(1, poseFps);
      const isFrameStep =
        k === 'ArrowLeft' || k === 'ArrowRight' || k === ',' || k === '.' ||
        k === '<' || k === '>';
      if (isFrameStep) {
        const forward = (k === 'ArrowRight' || k === '.' || k === '>');
        const step = (e.shiftKey ? 10 : 1) * frameDt;
        const target = Math.max(0, Math.min(poseDuration, poseTime + (forward ? step : -step)));
        window.poseSetTime(target);
        fosTelemetry.info('hotkey', `frame-step ${forward ? '+' : '-'}${e.shiftKey ? 10 : 1}f -> ${target.toFixed(3)}s`);
        e.preventDefault();
        return;
      }
      if (k === 'ArrowUp' || k === 'ArrowDown') {
        // Jump to previous / next keyframe (replaces the old ←/→ KF-step
        // behaviour, which is now frame-step per NLE convention).
        if (poseKeyframes.length === 0) { e.preventDefault(); return; }
        const cur = +poseTime.toFixed(4);
        const sorted = poseKeyframes.map(k => k.time).slice().sort((a, b) => a - b);
        let target;
        if (k === 'ArrowDown') {
          target = sorted.find(t => t > cur + 1e-4) ?? sorted[sorted.length - 1];
        } else {
          const prev = sorted.filter(t => t < cur - 1e-4);
          target = prev.length ? prev[prev.length - 1] : sorted[0];
        }
        window.poseSetTime(target);
        fosTelemetry.info('hotkey', `jump KF: ${k} -> ${target.toFixed(3)}s`);
        e.preventDefault();
        return;
      }
      // Shift+Delete = clear the whole workspace (deliberate vs plain
      // Delete which only removes the selection). Routed to the host so
      // it goes through the same confirm dialog as the Clear all button —
      // this drops imported clips, which cost a retarget to get back.
      // Must precede the generic "Shift returns early" gate below.
      if (e.shiftKey && (k === 'Delete' || k === 'Backspace')) {
        postToHost({ kind: 'pose-clear-all-requested' });
        e.preventDefault();
        return;
      }

      if (e.shiftKey) {
        // Reserve Shift+other for future use; don't fall through to
        // single-letter shortcuts that would fire on Shift+W etc.
        return;
      }
      switch (k) {
        case ' ': {
          // Space = play/pause toggle. Needs 2+ keyframes to actually start.
          if (posePlaying) window.posePause();
          else window.posePlay();
          fosTelemetry.info('hotkey', posePlaying ? 'space -> pause' : 'space -> play');
          e.preventDefault();
          return;
        }
        case 'Home': window.poseSetTime(0); e.preventDefault(); return;
        case 'End':  window.poseSetTime(poseDuration); e.preventDefault(); return;
        case '/': {
          // DaVinci-Resolve-standard loop toggle. Flip the global flag
          // and ping the host so the loop button repaints its state.
          poseLoop = !poseLoop;
          postToHost({ kind: 'pose-timeline-update', keyframes: poseKeyframes.map(k => ({ time: k.time, id: k.id, ease: k.ease || 'auto' })), time: poseTime, duration: poseDuration, fps: poseFps, playing: posePlaying, loop: poseLoop });
          fosTelemetry.info('hotkey', `loop -> ${poseLoop ? 'on' : 'off'}`);
          e.preventDefault();
          return;
        }
        case 'Delete':
        case 'Backspace': {
          // Delete the keyframe at the current time. No-op if none.
          if (window.poseDeleteCurrentKeyframe()) {
            fosTelemetry.info('timeline', `deleted KF at ${poseTime.toFixed(3)}s`);
          }
          e.preventDefault();
          return;
        }
      }
      if (lower === 'w' || lower === 'e' || lower === 'r') {
        // W/E/R gizmo mode switch (Blender/Maya muscle memory), same as
        // prop mode — applies to whatever the gizmo currently holds
        // (bone, IK ring, or a selected rig).
        if (transformControls.object) {
          const mode = lower === 'w' ? 'translate' : lower === 'e' ? 'rotate' : 'scale';
          transformControls.setMode(mode);
          requestRender();
          fosTelemetry.info('hotkey', `gizmo -> ${mode}`);
        }
        e.preventDefault();
        return;
      }
      if (lower === 'f') {
        // Frame the currently-selected bone in the viewport. Falls back
        // to "frame the rig" when nothing is selected so F always does
        // *something* useful.
        focusOnPoseSelection();
        e.preventDefault();
        return;
      }
      if (lower === 'k') {
        // Capture the current pose as a keyframe at the scrub time.
        // Mnemonic: K = Keyframe.
        const n = window.poseAddKeyframe();
        if (n != null) fosTelemetry.info('timeline', `KF added at ${poseTime.toFixed(3)}s`, { count: n });
        e.preventDefault();
        return;
      }
      if (lower === 'm') {
        // M = mirror pose. Faster than the sidebar button for users
        // iterating on a symmetric stance.
        window.mirrorPose();
        e.preventDefault();
        return;
      }
    }
    // Fall through to prop-mode bindings only if no pose handler took it.
  }

  // Non-pose-mode (prop / scale workspace) bindings.
  if (ctrl || e.altKey) return;
  if (!currentModel || !transformControls.object) return;
  switch (lower) {
    case 'w': if (!poseMode) setGizmoMode('translate'); break;
    case 'e': if (!poseMode) setGizmoMode('rotate'); break;
    case 'r': if (!poseMode) setGizmoMode('scale'); break;
    case 'f':
      // Wireframe overlay toggle outside pose mode.
      if (!poseMode && currentModel) setWireframeEnabled(!wireframeEnabled);
      break;
  }
});

// Frame the camera on whatever the user is editing right now: primary
// selected bone (pose mode), or the rig as a whole if nothing selected.
function focusOnPoseSelection() {
  if (!currentModel) return;
  if (poseSelection.length > 0) {
    const primary = poseSelection[poseSelection.length - 1];
    primary.updateMatrixWorld(true);
    const worldPos = new THREE.Vector3();
    primary.getWorldPosition(worldPos);
    // Keep the current camera orientation; just retarget. Distance
    // stays where the user had it.
    const offset = camera.position.clone().sub(controls.target);
    controls.target.copy(worldPos);
    camera.position.copy(worldPos).add(offset);
    controls.update();
    requestRender();
    fosTelemetry.info('hotkey', `focused bone ${primary.name || '?'}`);
  } else {
    frameAll();
    fosTelemetry.info('hotkey', 'framed rig');
  }
}

document.getElementById('reset-transform').addEventListener('click', () => {
  if (!currentModel) return;
  currentModel.position.set(0, 0, 0);
  currentModel.rotation.set(0, 0, 0);
  currentModel.scale.set(1, 1, 1);
  currentModel.updateMatrixWorld(true);
  updateGizmoSizeFromModel();
  postTransformToHost();
  syncTransformInputs();
  requestRender();
});

// Snap-to-ground button: shares the same code path window.snapToGround
// exposes for the host's sidebar button — both end up posting the new Y
// back through postTransformToHost so the WPF Position field + undo
// stack stay in sync.
document.getElementById('snap-to-ground').addEventListener('click', () => {
  if (window.snapToGround) window.snapToGround();
});

// (Pos/Rot/Scale numeric input handlers removed — those inputs now
// live in the WPF sidebar; the host calls window.applyTransform when
// the user types into them.)

// Match-height: scale the user's model uniformly so its world-space Y
// extent equals the value in the input. Multiplicative (works whether
// the user has already tweaked Scale via the gizmo or not).
const matchInput = document.getElementById('match-height');
const matchBtn = document.getElementById('match-btn');
function applyMatchHeight() {
  if (!currentModel) return;
  const target = parseFloat(matchInput.value);
  if (!isFinite(target) || target <= 0) return;
  currentModel.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(currentModel);
  const current = box.max.y - box.min.y;
  if (current <= 1e-6) return;
  const ratio = target / current;
  currentModel.scale.multiplyScalar(ratio);
  currentModel.updateMatrixWorld(true);
  // Re-frame so the freshly-resized prop fits next to the reference.
  frameAll();
  // frameAll() already calls updateGizmoSizeFromModel(), but it does so
  // BEFORE the next render — explicit call is paranoia in case Match is
  // ever wired to skip frameAll later.
  updateGizmoSizeFromModel();
  // Mirror the new uniform scale to the host so the converted YDR bakes it in.
  postTransformToHost();
  syncTransformInputs();
}
matchBtn.addEventListener('click', applyMatchHeight);
matchInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyMatchHeight(); });

// ─────── model state ───────
let currentModel = null;
// Source format of the loaded model — texture flipY differs: OBJ keeps the
// image's native orientation (flipY true, TextureLoader default); glTF/GLB
// expect flipY false. Used by setPartTexture so an added diffuse isn't
// upside-down on OBJ imports.
let currentModelIsGltf = false;

// Skinned-animation playback. Sketchfab / Mixamo glTF + FBX files ship
// animation clips alongside the mesh; without a mixer they render as the
// bind pose and look static. The clock feeds per-frame deltas to
// mixer.update(); both live for the lifetime of one model load and reset
// in clearModel() so the next import starts clean.
let currentMixer = null;
const animationClock = new THREE.Clock();

// ─── wireframe-edge overlay ───
// Edge-based wireframe (LineSegments over EdgesGeometry) drawn on top of
// each mesh. Surfaces missing triangles / holes / weird decimation
// artefacts after running Optimize Mesh — solid shading hides those, but
// edges make them obvious. State persists across model loads; the host
// can flip it on after optimize via window.fiveosViewer.setWireframe(true).
let wireframeEnabled = false;
const WIREFRAME_TAG = 'fiveosWireOverlay';

function rebuildWireframeOverlay() {
  if (!currentModel) return;
  // Strip any existing overlay lines first.
  const stale = [];
  currentModel.traverse(o => { if (o.userData && o.userData[WIREFRAME_TAG]) stale.push(o); });
  for (const o of stale) {
    o.parent?.remove(o);
    o.geometry?.dispose();
    o.material?.dispose();
  }
  if (!wireframeEnabled) return;
  // Add fresh overlays per mesh. polygonOffset pushes the lines slightly
  // toward the camera so they don't z-fight with the solid faces.
  currentModel.traverse(o => {
    if (!o.isMesh || !o.geometry) return;
    const edges = new THREE.EdgesGeometry(o.geometry, 1);
    const mat = new THREE.LineBasicMaterial({
      color: 0x5BAEFF,
      transparent: true,
      opacity: 0.6,
      depthTest: true,
    });
    const lines = new THREE.LineSegments(edges, mat);
    lines.userData[WIREFRAME_TAG] = true;
    lines.renderOrder = 999;
    o.add(lines);
  });
}

function setWireframeEnabled(enabled) {
  wireframeEnabled = !!enabled;
  rebuildWireframeOverlay();
  requestRender();
}

function clearModel() {
  if (!currentModel) return;
  transformControls.detach();
  // Drop any sub-mesh overlay's geometry reference BEFORE we dispose the
  // model's geometries below, or the overlay would keep pointing at freed
  // buffers.
  resetSubMeshSelection();
  propAnimShow(false);
  window._fiveosPendingAutoFrame = false;
  scene.remove(currentModel);
  currentModel.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const m = Array.isArray(obj.material) ? obj.material : [obj.material];
      m.forEach(mat => {
        for (const k in mat) {
          if (mat[k] && mat[k].isTexture) mat[k].dispose();
        }
        mat.dispose();
      });
    }
  });
  if (currentMixer) {
    currentMixer.stopAllAction();
    currentMixer.uncacheRoot(currentModel);
    currentMixer = null;
  }
  clearImportedClips();
  poseStripsResetMixer();
  currentModel = null;
  gizmoBar.style.display = 'none';
  requestRender();
}

function frameModel(obj) {
  // Single-target frame, kept for callers that explicitly want to ignore
  // the reference. Most code paths should use frameAll() so grid + camera
  // sizing accounts for both the user's prop AND the reference ped.
  const box = new THREE.Box3().setFromObject(obj);
  applyFrame(box);
}

/// Frame around the union of {currentModel, referenceModel} — whichever
/// are loaded. Falls back to single-target framing when only one is
/// present. Solves the "reference dwarfs the grid" issue when the user's
/// model is small relative to a 1.75m reference.
function frameAll() {
  const targets = [currentModel, referenceModel].filter(Boolean);
  if (targets.length === 0) return;
  const box = new THREE.Box3();
  for (const t of targets) box.expandByObject(t);
  if (!isFinite(box.min.x)) return;
  applyFrame(box);
}

function applyFrame(box) {
  const size = new THREE.Vector3();
  const center = new THREE.Vector3();
  box.getSize(size);
  box.getCenter(center);
  // Direct camera/controls mutations below don't fire OrbitControls' own
  // 'change' event, so the on-demand render loop won't see them unless we
  // request explicitly.
  requestRender();

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist = maxDim * 2.6;
  // Front-on view by default: camera in +Z, slight upward tilt so the
  // reference ped reads as "facing the camera". Was a 3/4 iso (1, 0.6, 1)
  // which puts the user behind/right of the model — fine for inspecting
  // a prop, but disorienting as the first frame after a load. The user
  // can still orbit freely; this just sets a saner starting pose.
  camera.position.copy(center).add(new THREE.Vector3(0, dist * 0.15, dist));
  controls.target.copy(center);

  // Damping is enabled, which means OrbitControls keeps an internal
  // sphericalDelta that decays over ~12 frames. After we directly set
  // camera.position, the next several ticks would still apply that
  // residual delta — visually the camera "drifts out of frame then
  // resets" once the delta decays. Temporarily flipping damping off and
  // calling update() flushes the deltas to zero, then we restore it so
