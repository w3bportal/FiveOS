  // user orbits still feel smooth.
  const wasDamping = controls.enableDamping;
  controls.enableDamping = false;
  controls.update();
  controls.enableDamping = wasDamping;

  const s = Math.max(1, maxDim * 1.5);
  grid.scale.set(s / 10, 1, s / 10);
  camera.near = Math.max(0.001, maxDim * 0.001);
  camera.far = Math.max(1000, maxDim * 100);
  camera.updateProjectionMatrix();

  // Gizmo sizing is independent of the framing union — we want it to
  // match the user's MODEL, not the model+reference union. Otherwise
  // shrinking a prop down to ~1.75 m via Match leaves the gizmo sized
  // to the still-1.75 m reference ped and the gizmo dwarfs the model.
  updateGizmoSizeFromModel();
}

/// Recompute gizmoTargetWorldSize from the current model's own world-
/// space bounding box. Call after anything that changes the model's
/// effective scale: load, Match, gizmo-scale drag.
function updateGizmoSizeFromModel() {
  if (!currentModel) return;
  currentModel.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(currentModel);
  if (!isFinite(box.min.x)) return;
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  // Cap at ~60% of the model's largest dimension — when the camera is
  // zoomed far out the gizmo stops growing here, so it never dwarfs the
  // model's silhouette. Up close, screen-constant sizing takes over.
  gizmoTargetWorldSize = maxDim * 0.6;
}

// glTF KHR_materials_pbrSpecularGlossiness compatibility shim.
//
// three.js dropped built-in support for this extension after r150-ish, so
// modern GLTFLoader silently ignores diffuseTexture / diffuseFactor on
// materials authored with the legacy spec-gloss workflow — the model
// renders fully white. Sketchfab still emits spec-gloss for a huge
// fraction of its catalogue (Substance Painter / Maya legacy exports),
// so we map spec-gloss back onto MeshStandardMaterial here. Approximation:
// diffuse → color/map, glossiness → 1−roughness, specular ignored
// (close enough for non-metallic art-style models, which is what spec-gloss
// is most commonly used for in practice).
class SpecGlossToStandardPlugin {
  constructor(parser) {
    this.parser = parser;
    this.name = 'KHR_materials_pbrSpecularGlossiness';
  }
  getMaterialType() { return THREE.MeshStandardMaterial; }
  extendMaterialParams(materialIndex, materialParams) {
    const parser = this.parser;
    const materialDef = parser.json.materials[materialIndex];
    const ext = materialDef.extensions && materialDef.extensions[this.name];
    if (!ext) return Promise.resolve();

    const pending = [];
    materialParams.color = new THREE.Color(1, 1, 1);
    materialParams.opacity = 1;
    if (Array.isArray(ext.diffuseFactor)) {
      materialParams.color.fromArray(ext.diffuseFactor);
      materialParams.opacity = ext.diffuseFactor[3];
    }
    if (ext.diffuseTexture !== undefined) {
      pending.push(parser.assignTexture(materialParams, 'map', ext.diffuseTexture, THREE.SRGBColorSpace));
    }
    materialParams.metalness = 0;
    materialParams.roughness = 1 - (ext.glossinessFactor !== undefined ? ext.glossinessFactor : 1);
    return Promise.all(pending);
  }
}

function pickLoader(url, manager) {
  const u = url.toLowerCase().split('?')[0];
  if (u.endsWith('.gltf') || u.endsWith('.glb')) {
    const loader = new GLTFLoader(manager);
    loader.register(parser => new SpecGlossToStandardPlugin(parser));
    return loader;
  }
  if (u.endsWith('.obj')) return new OBJLoader(manager);
  if (u.endsWith('.fbx')) return new FBXLoader(manager);
  if (u.endsWith('.dae')) return new ColladaLoader(manager);
  if (u.endsWith('.ply')) return new PLYLoader(manager);
  if (u.endsWith('.stl')) return new STLLoader(manager);
  return null;
}

// Monotonic stamp on every timeline echo. Host lambdas are deferred at
// mixed dispatcher priorities, so a stale echo (old clip's duration) can be
// applied AFTER a newer one — the timeline "flicker" / wrong-length axis
// while browsing the library. The host drops any rev older than the last
// one it applied. Updates+snapshots share one family (both carry full
// state); ticks are guarded separately (they only carry time).
var _timelineEchoRev = 0;
// True while an editable import runs its internal clip-import machinery —
// those intermediate states (empty keys, temp strip) must never reach the
// WPF timeline; only the final converted state posts.
var poseSquelchTimelineEcho = false;
function postToHost(payload) {
  try {
    if (payload && payload.kind === 'pose-timeline-update') {
      if (poseSquelchTimelineEcho) return;
      payload.rev = ++_timelineEchoRev;
    } else if (payload && (payload.kind === 'timeline-document-snapshot'
        || payload.kind === 'pose-timeline-tick')) {
      payload.rev = ++_timelineEchoRev;
    }
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(payload);
    }
  } catch { /* ignore */ }
}

// Host → viewer bulk import (large .ycd / .fbx clips). ExecuteScriptAsync
// can't carry multi-megabyte JSON literals; the host posts the payload here.
if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener('message', (ev) => {
    let msg = ev.data;
    if (typeof msg === 'string') {
      try { msg = JSON.parse(msg); } catch (_) { return; }
    }
    if (!msg) return;
    if (msg.kind === 'host-timeline-command') {
      let result;
      try {
        const command = (typeof msg.command === 'string')
          ? { ...msg, ...(msg.payload || {}), op: msg.command }
          : (msg.command || msg.payload || msg);
        result = window.hostTimelineCommand(command);
      } catch (e) {
        result = { ok: false, reason: 'exception', message: String(e && e.message ? e.message : e) };
      }
      // Don't spread `document`/`dopeSheet` into the result — host ignores
      // that message, and duplicating a full timeline JSON on the wire was
      // doubling postMessage cost on every key edit.
      postToHost({
        kind: 'host-timeline-command-result',
        requestId: msg.requestId,
        ok: !!(result && result.ok),
        op: result && result.op,
        reason: result && result.reason,
        result: result && result.result,
      });
      if (result && result.document) {
        postToHost({ kind: 'timeline-document-snapshot', snapshot: result.document });
      }
      if (result && result.dopeSheet) {
        postToHost({ kind: 'timeline-dope-sheet', dopeSheet: result.dopeSheet });
      }
      return;
    }
    if (msg.kind !== 'host-import-keyframe-clip') return;
    let result;
    try {
      if (msg.editable && msg.payload && msg.payload.format === 'bone-tracks') {
        // Library / .ycd adds (2026-07-17): run the clip importer's PROVEN
        // normalization (assimp OR ycd-native → glb space), then land as
        // EDITABLE keyframes — strips outrank keyframes in every evaluator,
        // which made edits on library clips silently do nothing.
        result = window.importBoneTracksAsEditableKeys(msg.payload, msg.clipName || '');
      } else if (msg.payload && msg.payload.format === 'keyframes-editable') {
        // EDITABLE import (2026-07-16): land the animation as real pose
        // keyframes instead of a sealed clip strip. Stop the _rt raw player
        // and clear strips first — both outrank poseKeyframes in every
        // evaluator, which is exactly why recorded keys used to be stomped
        // and the timeline showed nothing editable.
        try { if (typeof window.rtStop === 'function') window.rtStop(); } catch (e) {}
        try { if (_rt) { _rt.playing = false; _rt.timelineSync = false; } } catch (e) {}
        try { poseStrips.splice(0, poseStrips.length); } catch (e) {}
        const n = window.setKeyframes(msg.payload) | 0;
        result = n > 0 ? { ok: true, matched: n }
                       : { ok: false, reason: 'no-bones-matched' };
      } else {
        result = window.importKeyframesAsClip(msg.payload, msg.clipName || '');
      }
    } catch (e) {
      result = { ok: false, reason: 'exception', msg: String(e && e.message ? e.message : e) };
    }
    postToHost({ kind: 'import-keyframe-clip-result', requestId: msg.requestId, ...result });
  });
}


// Seek the source (loadModel/AnimationMixer) clip to normalized [0,1] time and
// hold it, so the raw source can be captured frame-aligned with the retarget.
window.sourceSeek = function (norm) {
  try {
    if (!currentMixer || !window._srcDuration) return;
    window._srcSeekHold = true;
    var t = Math.max(0, Math.min(1, norm)) * window._srcDuration;
    currentMixer.setTime(t);
    needsRender = true;
    requestRender && requestRender();
  } catch (e) {}
};

// ─── Glass material upgrade ────────────────────────────────────────────
// GTA (and many hand-authored) glass shaders come through the GLB as a
// plain opaque diffuse — often the magenta "unresolved sampler" placeholder
// — so windows render as flat pink instead of see-through glass. Detect glass
// by material / texture name and swap in a reflective, transmissive physical
// material that samples the scene PMREM environment for reflections. These
// are the same values the vehicle-workbench GLASS class uses (see
// getWorkbenchMaterial) so both previews agree, and they line up with the
// three.js "definitive glass" recipe: metalness 0, near-zero roughness, high
// transmission, ior ~1.45, clearcoat sheen, env map required (scene.environment
// is a baked RoomEnvironment PMREM, so reflections come for free).
// Detection mirrors the ydr-writer's AutoDetectGlass so the PREVIEW agrees
// with what the export actually does: a glass WORD in the material / texture /
// node name AND no STRUCTURE word in the node name. That split is what lets a
// cheval mirror's "mirrorAMirror" pane read as glass while "mirrorAFrame" /
// "…Legs" / "…BasePlate" stay solid — even though all six share one material
// (we reassign per-mesh, so only the pane's material changes).
const GLASS_WORD_RE = /glass|window|windshield|windscreen|windowpane|plexi|acrylic|mirror/i;
const GLASS_STRUCT_RE = /frame|arm|leg|base|plate|back|stand|foot|body|handle|rim|trim|post|mount|bracket|hinge|wood|metal|border|surround|casing|housing|pillar|rail|screw|bolt/i;

// Glass appearance 0..1 — 0 = clear see-through, 1 = opaque reflective mirror.
// Kept in sync with the converter's Appearance slider via setGlassAppearance,
// and used as the export default (0.6) until the host pushes the real value.
let glassAppearance = 0.6;

function looksLikeGlass(mat, hostName) {
  if (!mat) return false;
  if (mat.userData && mat.userData.fiveosGlass) return true;
  const host = hostName || '';
  if (GLASS_STRUCT_RE.test(host)) return false;   // frame/leg/base/… — never glass
  const names = [mat.name, host];
  if (mat.map) {
    names.push(mat.map.name);
    if (mat.map.image && mat.map.image.src) names.push(mat.map.image.src);
  }
  return names.some(n => n && GLASS_WORD_RE.test(n));
}

// Drive a glass MeshPhysicalMaterial's look from `glassAppearance`. Low →
// clear transmissive glass; high → a metallic mirror that reflects the scene
// environment (RoomEnvironment PMREM — image-based "HDRI" reflections). This
// is the live preview of the converter's Appearance slider.
function styleGlassMaterial(m) {
  const t = Math.max(0, Math.min(1, glassAppearance));
  m.metalness = t;                          // 0 clear → 1 mirror
  if ('transmission' in m) m.transmission = 0.9 * (1 - t);
  m.roughness = 0.05 - 0.03 * t;            // sharper reflection toward the mirror end
  m.opacity = 0.28 + 0.72 * t;
  m.envMapIntensity = 1.1 + 1.3 * t;        // stronger reflections when reflective
  m.clearcoat = 1.0; m.clearcoatRoughness = 0.03;
  m.ior = 1.45; m.thickness = 0.3;
  m.transparent = t < 0.98;
  m.depthWrite = t >= 0.98;                 // opaque mirror writes depth; glass doesn't
  m.needsUpdate = true;
}

function makeGlassMaterial(src) {
  const g = new THREE.MeshPhysicalMaterial({ color: 0x9fb0bd, side: THREE.DoubleSide });
  styleGlassMaterial(g);
  g.name = (src && src.name) || 'glass';
  g.userData.fiveosGlass = true;
  return g;
}

// Walk a freshly-loaded model and REPLACE any glass materials per-mesh. We do
// NOT dispose the source material — for a merged prop (e.g. the mirror) it's
// shared with non-glass meshes, and disposing it would wreck the frame.
function upgradeGlassMaterials(root) {
  if (!root) return 0;
  let swapped = 0;
  root.traverse(node => {
    if (!node.isMesh || !node.material) return;
    const hostName = node.name || '';
    if (Array.isArray(node.material)) {
      node.material = node.material.map(m =>
        looksLikeGlass(m, hostName) ? (swapped++, makeGlassMaterial(m)) : m);
    } else if (looksLikeGlass(node.material, hostName)) {
      node.material = makeGlassMaterial(node.material);
      swapped++;
    }
  });
  return swapped;
}

// Live-preview the converter's glass Appearance slider (see-through ↔
// reflective) across every glass material in the current model.
window.setGlassAppearance = function (v) {
  const n = Number(v);
  glassAppearance = Math.max(0, Math.min(1, isFinite(n) ? n : 0.6));
  if (currentModel) currentModel.traverse(node => {
    if (!node.isMesh || !node.material) return;
    const mats = Array.isArray(node.material) ? node.material : [node.material];
    for (const m of mats) if (m.userData && m.userData.fiveosGlass) styleGlassMaterial(m);
  });
  requestRender && requestRender();
};

window.loadModel = function (url) {
  // Per-load LoadingManager. GLTFLoader's onProgress only fires for the
  // main .gltf JSON (which is usually a few KB and finishes instantly);
  // the .bin buffers and textures load AFTER and never trigger that
  // callback. The LoadingManager observes every sub-resource so we get
  // real progress for the long tail. Counts are item-based (files
  // loaded vs total queued), not bytes.
  // Local file loads complete faster than three.js fires real progress
  // events, so without synthetic progress the host overlay sits at "0%"
  // for the entire load. `fakeTick` runs an asymptotic 0→90% ramp until
  // a real progress event lands; the real event clears the ticker and
  // takes over the percentage.
  let realProgressArrived = false;
  let fakeTickHandle = null;
  function clearFakeTick() {
    if (fakeTickHandle) { clearInterval(fakeTickHandle); fakeTickHandle = null; }
    realProgressArrived = true;
  }

  const manager = new THREE.LoadingManager();
  manager.onProgress = (resourceUrl, itemsLoaded, itemsTotal) => {
    clearFakeTick();
    const pct = itemsTotal > 0 ? Math.round((itemsLoaded / itemsTotal) * 100) : -1;
    if (pct >= 0) status.textContent = `Loading... ${pct}% (${itemsLoaded}/${itemsTotal})`;
    postToHost({
      kind: 'load-progress',
      loaded: itemsLoaded,
      total: itemsTotal,
      pct,
    });
  };

  const loader = pickLoader(url, manager);
  if (!loader) {
    status.textContent = 'Unsupported format: ' + url;
    postToHost({ kind: 'error', message: 'Unsupported format' });
    return;
  }

  status.textContent = 'Loading ' + url + '...';
  empty.classList.add('hidden');
  dotLoader.show('helixGlow', 'Loading model...');
  // Seed an early "0%" so the host overlay flips out of "starting..."
  // immediately even before the manager registers the first file.
  postToHost({ kind: 'load-progress', loaded: 0, total: 1, pct: 0 });

  // Asymptotic fake-progress ramp. 1 - exp(-t/2) hits ~90% in ~4.5s and
  // never reaches 100% — real progress (or onLoad) is what takes it home.
  const fakeStart = performance.now();
  fakeTickHandle = setInterval(() => {
    if (realProgressArrived) return;
    const elapsed = (performance.now() - fakeStart) / 1000;
    const pct = Math.min(90, Math.round(90 * (1 - Math.exp(-elapsed / 2))));
    postToHost({ kind: 'load-progress', loaded: 0, total: 1, pct });
  }, 120);

  loader.load(
    url,
    asset => {
      clearFakeTick();
      // Pop to 100% so the percentage doesn't read as "stuck" at the last
      // fake-tick value when the overlay disappears on the next paint.
      postToHost({ kind: 'load-progress', loaded: 1, total: 1, pct: 100 });
      clearModel();
      dotLoader.hide();

      let obj;
      if (asset.scene) obj = asset.scene;
      else if (asset.isObject3D) obj = asset;
      else if (asset.isBufferGeometry) {
        const mat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.1, roughness: 0.8 });
        obj = new THREE.Mesh(asset, mat);
      } else if (asset.isGroup) {
        obj = asset;
      } else {
        obj = asset.scene || asset;
      }

      if (!obj) {
        status.textContent = 'Loaded but no displayable object';
        return;
      }
      currentModelIsGltf = /\.(gltf|glb)$/i.test(url || '');

      // Skinned-animation clips live on the parsed asset (GLTFLoader)
      // or on the root group (FBXLoader). Sketchfab/Mixamo exports
      // typically ship one clip; play them all so multi-clip exports
      // (e.g. idle+walk layered) still light up. Without a mixer the
      // SkinnedMesh just renders its bind pose.
      const animationClips = (asset.animations && asset.animations.length)
        ? asset.animations
        : (obj.animations || []);
      if (animationClips.length > 0) {
        currentMixer = new THREE.AnimationMixer(obj);
        window._srcDuration = Math.max.apply(null, animationClips.map(c => c.duration || 0));
        window._srcSeekHold = false;
        for (const clip of animationClips) {
          // Rigid animated props export ROTATION-ONLY (AnimatedPropBuilder
          // discards position/scale tracks). Mirror that in preview: strip
          // every .position/.scale track so the mixer can't overwrite the
          // model root's local transform each frame — which was silently
          // undoing the cm->m scale (~2631) and the pivot recenter offset
          // (obj.position.sub(centerWorld) below). That defeat is why manual
          // scale-down "didn't take" on animated props: the content drifted
          // off the gizmo's scale-origin and re-inflated to the clip's baked
          // size. Bone rotation (.quaternion) tracks are kept, so the
          // animation still plays; any root translation just plays in place.
          clip.tracks = clip.tracks.filter(t => !/\.(position|scale)$/.test(t.name));
          currentMixer.clipAction(clip).play();
          // Register into the clip library so the Outliner shows it and
          // (M2+) the NLA strip editor can place it on a lane. Each
          // clip is named via the source authoring tool's label; fall
          // back to a synthetic name when the exporter left it blank.
          registerClip(clip.name || `imported_${poseClipNextId}`, 'imported', clip);
        }
        // Reset the delta so the first frame after load doesn't fast-
        // forward through several seconds of clock drift accumulated
        // since the viewer booted.
        animationClock.getDelta();
      }
      // Surface the Stop/Play pill for animated props (hidden again if this
      // model turns out to be a rig that enters pose mode).
      propAnimShow(animationClips.length > 0);

      let vCount = 0, tCount = 0;
      obj.traverse(node => {
        if (node.isMesh && node.geometry) {
          const g = node.geometry;
          if (g.attributes.position) vCount += g.attributes.position.count;
          if (g.index) tCount += g.index.count / 3;
          else if (g.attributes.position) tCount += g.attributes.position.count / 3;
        }
      });

      // Swap glass shaders for reflective see-through glass before the model
      // is added to the scene (see upgradeGlassMaterials). GTA windows import
      // as flat magenta placeholders otherwise.
      upgradeGlassMaterials(obj);

      // Motion-only FBX (skeleton + animation, no mesh — e.g. an ActorCore
      // "Motion" export): draw the bones so the source clip is actually
      // visible for side-by-side comparison with the retargeted ped.
      if (vCount === 0) {
        try {
          const sh = new THREE.SkeletonHelper(obj);
          if (sh.bones && sh.bones.length) obj.add(sh);
        } catch (e) {}
      }

      // cm→m heuristic — FBX files almost always store positions in
      // centimetres and three.js's FBXLoader doesn't reliably honour
      // GlobalSettings.UnitScaleFactor. Only fires for .fbx; glTF/GLB/OBJ
      // honestly use metres. Single divide; a legitimately huge model
      // would end up too small but the user can recover via Scale / Match.
      const isFbx = (url || '').toLowerCase().split('?')[0].endsWith('.fbx');
      if (isFbx) {
        obj.updateMatrixWorld(true);
        const probe = new THREE.Box3().setFromObject(obj);
        const probeY = probe.max.y - probe.min.y;
        if (probeY > 10) {
          obj.scale.multiplyScalar(0.01);
          obj.updateMatrixWorld(true);
        }
      }

      // Drop the prop so its feet (bbox.min.y) sit on the ground plane
      // y=0 — matches the reference's grounding so the two share a floor.
      obj.updateMatrixWorld(true);
      const groundBbox = new THREE.Box3().setFromObject(obj);
      if (isFinite(groundBbox.min.y)) {
        obj.position.y -= groundBbox.min.y;
        obj.updateMatrixWorld(true);
      }

      // Defer the actual scene mutation + reframe to the next animation
      // frame. The loader callback runs at task time, but renders run on
      // rAF — between the two, the browser may paint, exposing whatever
      // intermediate state is in the scene (the user described this as
      // "camera goes out of frame then shows model"). Doing all of:
      //   scene.add → frame → render
      // inside one rAF guarantees the first paint after this load is
      // already at the final pose.
      // Stash a friendly display name derived from the URL so the
      // outliner labels rigs as e.g. "ig_floyd" instead of falling
      // back to whatever the FBX/GLB root node was named.
      const fname = (url || '').split(/[\\/]/).pop().split('?')[0].replace(/\.(glb|gltf|fbx|obj)$/i, '');
      if (fname) obj.userData.displayName = fname;

      // Wrap the loaded model in a pivot group whose origin sits at the
      // model's bounding-box center. TransformControls always renders its
      // handles at the attached object's origin and rotates/scales about
      // that origin, so the only way to make the gizmo feel centered on
      // the model is to make the model's pivot BE the center. The inner
      // offset compensates so the visual world position is unchanged.
      obj.updateMatrixWorld(true);
      const centerBbox = new THREE.Box3().setFromObject(obj);
      if (isFinite(centerBbox.min.x) && isFinite(centerBbox.max.x)) {
        const centerWorld = new THREE.Vector3();
        centerBbox.getCenter(centerWorld);
        const pivot = new THREE.Group();
        pivot.name = obj.name || 'model';
        pivot.userData = obj.userData;
        pivot.animations = obj.animations || [];
        pivot.userData.fiveos_pivot = true;
        pivot.userData.fiveos_inner = obj;
        // Recenter horizontally at the origin so world-offset exports load
        // next to the reference instead of far off-grid. Dense map/scene
        // files carry large XZ world coords; grounding only fixed Y, so the
        // model stayed thousands of units out — frameAll then unioned it with
        // the origin reference, blew up maxDim, and pushed the camera so far
        // back that everything rendered as a distant, near-clipped speck
        // ("broken viewport / model far away"). Keep Y = centerWorld.y so the
        // ground-to-floor above (obj.position.y -= groundBbox.min.y) still holds.
        pivot.position.set(0, centerWorld.y, 0);
        obj.position.sub(centerWorld);
        pivot.add(obj);
        pivot.updateMatrixWorld(true);
        obj = pivot;
      }

      requestAnimationFrame(() => {
        scene.add(obj);
        currentModel = obj;
        // Honour the view-panel's see-through opacity slider on every
        // model swap so the bones underneath stay visible by default
        // once the user enters pose mode.
        applyMeshOpacity();
        frameAll();
        // Attach the gizmo immediately so the user doesn't have to
        // click the model first to start manipulating it. Clicking
        // empty space still detaches via the pointerup handler above.
        transformControls.attach(currentModel);
        updateGizmoSizeFromModel();
        gizmoBar.style.display = 'flex';
        syncTransformInputs();
        // Re-apply the wireframe overlay when a model finishes loading.
        // After per-part Optimize Mesh the host flips wireframeEnabled
        // on so the user can immediately inspect the decimation result;
        // toggling on/off is also persistent across normal model swaps.
        rebuildWireframeOverlay();
        // Force a synchronous render so the next browser paint shows the
        // post-frame state immediately, no second-rAF lag.
        renderer.render(scene, camera);

        status.textContent = `${Math.round(vCount).toLocaleString()} verts · ${Math.round(tCount).toLocaleString()} tris`;
        // Report the raw model dimensions (file units == GTA metres after the
        // converter's Y->Z swap) so the host can auto-fit absurdly-scaled
        // models (AI generators often export ~10-100x too big).
        const _sz = new THREE.Vector3();
        new THREE.Box3().setFromObject(currentModel).getSize(_sz);
        // Huge/tiny models get auto-scaled by the host AFTER this frameAll()
        // ran, which leaves the camera framed for the original size and the
        // rescaled model out of view ("where's the model?"). Arm a one-shot
        // re-frame that fires when the host's auto-fit scale lands in
        // applyTransform. Mirror the host's out-of-range test exactly so we
        // only arm it when the host will actually push a corrective scale.
        const _maxDim = Math.max(_sz.x, _sz.y, _sz.z);
        window._fiveosPendingAutoFrame = (_maxDim > 4.0) || (_maxDim > 1e-4 && _maxDim < 0.05);
        postToHost({ kind: 'loaded', verts: Math.round(vCount), tris: Math.round(tCount),
                     sizeX: _sz.x, sizeY: _sz.y, sizeZ: _sz.z });
        postToHost({ kind: 'parts', parts: getModelPartsList() });
      });
    },
    progress => {
      if (progress.lengthComputable) {
        clearFakeTick();
        const pct = Math.round(progress.loaded / progress.total * 100);
        status.textContent = `Loading... ${pct}%`;
        // Forward to the host so the loading overlay can show the same
        // percentage and the user has feedback during big GLB downloads.
        postToHost({
          kind: 'load-progress',
          loaded: progress.loaded,
          total: progress.total,
          pct,
        });
      } else if (progress.loaded > 0) {
        // No content-length header — at least show that bytes are flowing.
        // Don't clear the fake ticker here: bytes-loaded with no total is
        // strictly less informative than the asymptotic ramp.
        postToHost({
          kind: 'load-progress',
          loaded: progress.loaded,
          total: 0,
          pct: -1,
        });
      }
    },
    err => {
      clearFakeTick();
      console.error(err);
      dotLoader.hide();
      status.textContent = 'Load failed: ' + (err?.message || err);
      postToHost({ kind: 'error', message: err?.message || String(err) });
    }
  );
};

// Host-callable API surface. Currently just the wireframe toggle —
// MainWindow.OnLayerConfirmOptimizeMesh flips this on after a per-part
// decimation so the user can spot dropped tris immediately.
window.fiveosViewer = window.fiveosViewer || {};
window.fiveosViewer.setWireframe = function (enabled) {
  setWireframeEnabled(!!enabled);
};
window.fiveosViewer.isWireframe = function () { return wireframeEnabled; };

// ───────────────────────────────────────────────────────────────────
// Before↔After compare API (Optimize tab "Preview" dry-run).
//
// Fully self-contained: it never touches currentModel / transformControls
// / referenceModel, so this same viewer.html stays safe to load in the
// 3D tab. The Optimize PreviewWindow drives it via window.fiveosCompare.
// Meshes arrive as raw RAGE positions (Z-up) + indices; we swap to
// three.js Y-up here so the C# extractor stays a pure passthrough.
// ───────────────────────────────────────────────────────────────────
const compareGroup = new THREE.Group();
scene.add(compareGroup);
const compareMeshes = { before: null, after: null };
let compareActiveSide = 'after';
let compareGhostOn = false;
let compareWireOn = false;
const COMPARE_WIRE_TAG = 'fiveosCompareWire';

function buildCompareMesh(data, color) {
  const src = data.positions || [];
  const out = new Float32Array(src.length);
  // RAGE Z-up → three.js Y-up: (x, y, z) → (x, z, -y).
  for (let i = 0; i < src.length; i += 3) {
    out[i]     = src[i];
    out[i + 1] = src[i + 2];
    out[i + 2] = -src[i + 1];
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(out, 3));
  geom.setIndex(new THREE.BufferAttribute(new Uint32Array(data.indices || []), 1));
  geom.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color: color, metalness: 0.1, roughness: 0.85, side: THREE.DoubleSide,
  });
  return new THREE.Mesh(geom, mat);
}

function setCompareWire(mesh, on) {
  if (!mesh) return;
  for (let i = mesh.children.length - 1; i >= 0; i--) {
    const c = mesh.children[i];
    if (c.userData && c.userData[COMPARE_WIRE_TAG]) {
      if (c.geometry) c.geometry.dispose();
      mesh.remove(c);
    }
  }
  if (!on) return;
  const edges = new THREE.EdgesGeometry(mesh.geometry, 1);
  const lines = new THREE.LineSegments(edges,
    new THREE.LineBasicMaterial({ color: 0x5BAEFF, transparent: true, opacity: 0.65 }));
  lines.userData[COMPARE_WIRE_TAG] = true;
  lines.renderOrder = 999;
  mesh.add(lines);
}

function setCompareOpacity(mesh, o, transparent) {
  if (!mesh) return;
  mesh.material.opacity = o;
  mesh.material.transparent = transparent;
  mesh.material.depthWrite = !transparent;
  mesh.material.needsUpdate = true;
}

function applyCompareVisibility() {
  const a = compareMeshes.after, b = compareMeshes.before;
  if (!a || !b) return;
  const active = (compareActiveSide === 'before') ? b : a;
  const other  = (compareActiveSide === 'before') ? a : b;
  active.visible = true;
  setCompareOpacity(active, 1, false);
  other.visible = compareGhostOn;
  setCompareOpacity(other, 0.22, true);
  requestRender();
}

function frameCompare() {
  const targets = [compareMeshes.before, compareMeshes.after].filter(Boolean);
  if (!targets.length) return;
  const box = new THREE.Box3();
  for (const t of targets) { const wasVis = t.visible; t.visible = true; box.expandByObject(t); t.visible = wasVis; }
  if (!isFinite(box.min.x)) return;
  const size = new THREE.Vector3(), center = new THREE.Vector3();
  box.getSize(size); box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist = maxDim * 2.6;
  camera.position.copy(center).add(new THREE.Vector3(0, dist * 0.15, dist));
  controls.target.copy(center);
  const wasDamping = controls.enableDamping;
  controls.enableDamping = false; controls.update(); controls.enableDamping = wasDamping;
  const s = Math.max(1, maxDim * 1.5);
  grid.scale.set(s / 10, 1, s / 10);
  camera.near = Math.max(0.001, maxDim * 0.001);
  camera.far = Math.max(1000, maxDim * 100);
  camera.updateProjectionMatrix();
  requestRender();
}

window.fiveosCompare = {
  load(payload) {
    this.reset();
    if (!payload || !payload.before || !payload.after) {
      postToHost({ kind: 'error', message: 'compare: empty payload' });
      return;
    }
    compareMeshes.before = buildCompareMesh(payload.before, 0xff9a4d); // warm = original
    compareMeshes.after  = buildCompareMesh(payload.after,  0xc8ccd0); // neutral = optimized
    compareGroup.add(compareMeshes.before, compareMeshes.after);
    compareActiveSide = 'after';
    compareGhostOn = false;
    applyCompareVisibility();
    if (compareWireOn) {
      setCompareWire(compareMeshes.before, true);
      setCompareWire(compareMeshes.after, true);
    }
    frameCompare();
    postToHost({ kind: 'compare-loaded', beforeTris: payload.beforeTris | 0, afterTris: payload.afterTris | 0 });
  },
  show(which) { compareActiveSide = (which === 'before') ? 'before' : 'after'; applyCompareVisibility(); },
  setGhost(on) { compareGhostOn = !!on; applyCompareVisibility(); },
  setWireframe(on) {
    compareWireOn = !!on;
    setCompareWire(compareMeshes.before, compareWireOn);
    setCompareWire(compareMeshes.after, compareWireOn);
    requestRender();
  },
  recenter() { frameCompare(); },
  reset() {
    for (const k of ['before', 'after']) {
      const m = compareMeshes[k];
      if (m) {
        setCompareWire(m, false);
        if (m.geometry) m.geometry.dispose();
        if (m.material) m.material.dispose();
        compareGroup.remove(m);
        compareMeshes[k] = null;
      }
    }
    requestRender();
  },
};

// ───────────────────────────────────────────────────────────────────
// Textured LOD workbench API (Optimize tab "Preview"/workbench).
//
// Self-contained, like fiveosCompare: never touches currentModel /
// compareGroup, so the same viewer.html is safe in the 3D tab. The
// PreviewWindow drives it via window.fiveosWorkbench. Parts arrive as raw
// RAGE positions (Z-up) + optional normals/uvs + a relative diffuse PNG
// URL; we swap to Y-up here and load textures via TextureLoader.
// ───────────────────────────────────────────────────────────────────
const workbenchGroup = new THREE.Group();
scene.add(workbenchGroup);
let workbenchMeshes = [];
let workbenchWireOn = false;
let workbenchEdgedOn = false;
let workbenchPaintMode = false;   // vehicle payloads paint untextured body panels
let workbenchPaintMats = [];      // PAINT materials, re-tintable live via setPaint()
const WORKBENCH_EDGE_TAG = 'fiveosWorkbenchEdge';
const workbenchTexLoader = new THREE.TextureLoader();

function buildWorkbenchPart(part) {
  const sp = part.positions || [];
  const posOut = new Float32Array(sp.length);
  for (let i = 0; i < sp.length; i += 3) {           // Z-up → Y-up
    posOut[i] = sp[i]; posOut[i + 1] = sp[i + 2]; posOut[i + 2] = -sp[i + 1];
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(posOut, 3));
  geom.setIndex(new THREE.BufferAttribute(new Uint32Array(part.indices || []), 1));
  if (part.uvs && part.uvs.length) {
    geom.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(part.uvs), 2));
  }
  if (part.normals && part.normals.length) {
    const sn = part.normals, nOut = new Float32Array(sn.length);
    for (let i = 0; i < sn.length; i += 3) { nOut[i] = sn[i]; nOut[i + 1] = sn[i + 2]; nOut[i + 2] = -sn[i + 1]; }
    geom.setAttribute('normal', new THREE.BufferAttribute(nOut, 3));
  } else {
    geom.computeVertexNormals();
  }
  // Material by SHADER CLASS (classified in C# from the RAGE shader name, not
  // guessed from the group name). This is the black-body fix: GTA bodies are
  // PAINTED a solid colour (the real value lives in carcols, outside the .yft),
  // so PAINT panels render a metallic colour — never the tiny black placeholder
  // texture. Only genuinely textured classes sample a diffuse.
  const kind = (part.kind || 'TEXTURED').toUpperCase();
  const paintHex = (part.paint >>> 0) || 0x9a9ea3;
  let mat, renderOrder = 0, wantsTex = true;

  if (kind === 'GLASS') {
    // Physical automotive glass: transmission samples the body behind it,
    // reflections from the scene PMREM env, clearcoat sheen.
    mat = new THREE.MeshPhysicalMaterial({
      color: 0x2e333c, metalness: 0.0, roughness: 0.03,
      transmission: 0.9, ior: 1.45, thickness: 0.3,
      clearcoat: 1.0, clearcoatRoughness: 0.03, envMapIntensity: 1.25,
      transparent: true, side: THREE.DoubleSide, depthWrite: false,
    });
    renderOrder = 20; wantsTex = false;
  } else if (kind === 'CHROME') {
    mat = new THREE.MeshStandardMaterial({
      color: 0xffffff, metalness: 1.0, roughness: 0.08, envMapIntensity: 1.4, side: THREE.DoubleSide });
    wantsTex = false;
  } else if (kind === 'PAINT') {
    // Metallic clearcoat car paint in the chosen colour. A livery/wrap (if the
    // mod ships one) loads as the map over this base. Tracked so setPaint() can
    // recolour the whole body live.
    mat = new THREE.MeshPhysicalMaterial({
      color: paintHex, metalness: 0.9, roughness: 0.35,
      clearcoat: 1.0, clearcoatRoughness: 0.06, envMapIntensity: 1.0, side: THREE.DoubleSide });
    workbenchPaintMats.push(mat);
  } else if (kind === 'EMISSIVE') {
    mat = new THREE.MeshStandardMaterial({
      color: 0x111111, emissive: 0xffffff, emissiveIntensity: 1.0,
      metalness: 0.0, roughness: 0.6, side: THREE.DoubleSide });
  } else if (kind === 'DECAL') {
    // Badge/sign/plate: alpha logo that sits ON the panel. polygonOffset so it
    // doesn't z-fight the body; alphaTest cuts the transparent background.
    mat = new THREE.MeshStandardMaterial({
      color: 0xffffff, metalness: 0.05, roughness: 0.8, transparent: true, side: THREE.DoubleSide,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 });
    renderOrder = 15;
  } else {   // TEXTURED — interior / mesh / tire / generic (real diffuse)
    mat = new THREE.MeshStandardMaterial({ color: 0xc8ccd0, metalness: 0.1, roughness: 0.8, side: THREE.DoubleSide });
  }

  if (part.textureUrl && wantsTex) {
    workbenchTexLoader.load(part.textureUrl, (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      if (kind === 'EMISSIVE') {
        mat.map = tex; mat.color.set(0xffffff);
        mat.emissiveMap = tex; mat.emissive.set(0xffffff); mat.emissiveIntensity = 0.9;
      } else if (kind === 'PAINT') {
        // A real livery/wrap — show it true-colour under the clearcoat.
        mat.map = tex; mat.color.set(0xffffff);
        mat.metalness = 0.1; mat.roughness = 0.5;
      } else {
        mat.map = tex; mat.color.set(0xffffff);
      }
      if (kind === 'DECAL') mat.alphaTest = 0.5;
      mat.needsUpdate = true;
      requestRender();
    });
  }
  const mesh = new THREE.Mesh(geom, mat);
  if (renderOrder) mesh.renderOrder = renderOrder;
  return mesh;
}

function setWorkbenchEdges(mesh, on) {
  for (let i = mesh.children.length - 1; i >= 0; i--) {
    const c = mesh.children[i];
    if (c.userData && c.userData[WORKBENCH_EDGE_TAG]) { if (c.geometry) c.geometry.dispose(); mesh.remove(c); }
  }
  if (!on) return;
  const edges = new THREE.EdgesGeometry(mesh.geometry, 1);
  const lines = new THREE.LineSegments(edges,
    new THREE.LineBasicMaterial({ color: 0x5BAEFF, transparent: true, opacity: 0.5 }));
  lines.userData[WORKBENCH_EDGE_TAG] = true;
  lines.renderOrder = 999;
  mesh.add(lines);
}

function applyWorkbenchModes(mesh) {
  mesh.material.wireframe = workbenchWireOn;
  setWorkbenchEdges(mesh, workbenchEdgedOn && !workbenchWireOn);
}

function frameWorkbench() {
  if (!workbenchMeshes.length) return;
  const box = new THREE.Box3();
  for (const m of workbenchMeshes) box.expandByObject(m);
  if (!isFinite(box.min.x)) return;
  const size = new THREE.Vector3(), center = new THREE.Vector3();
  box.getSize(size); box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist = maxDim * 2.6;
  camera.position.copy(center).add(new THREE.Vector3(0, dist * 0.15, dist));
  controls.target.copy(center);
  const wasDamping = controls.enableDamping;
  controls.enableDamping = false; controls.update(); controls.enableDamping = wasDamping;
  const s = Math.max(1, maxDim * 1.5);
  grid.scale.set(s / 10, 1, s / 10);
  camera.near = Math.max(0.001, maxDim * 0.001);
  camera.far = Math.max(1000, maxDim * 100);
  camera.updateProjectionMatrix();
  requestRender();
}

// Vehicle-preview grouping: named part groups (doors/bonnet/extras/wheels)
// hinged at their bone pivot so doors can swing open. RAGE Z-up pivots are
// converted the same way as vertex positions: (x, y, z) → (x, z, -y).
let workbenchNamedGroups = new Map();   // name -> { obj: THREE.Group, kind, openAngle }
let workbenchDoorsOpen = false;

function doorOpenAngle(kind, name) {
  switch (kind) {
    case 'door_l': return  1.0;                     // swing around the vertical axis
    case 'door_r': return -1.0;
    case 'bonnet': return -0.9;                     // tilt around the lateral axis
    case 'boot':   return  1.0;
    default:       return  0;
  }
}

function applyDoorState() {
  for (const [name, g] of workbenchNamedGroups) {
    const a = workbenchDoorsOpen ? g.openAngle : 0;
    if (g.kind === 'door_l' || g.kind === 'door_r') g.obj.rotation.y = a;
    else if (g.kind === 'bonnet' || g.kind === 'boot') g.obj.rotation.x = a;
  }
  requestRender();
}

window.fiveosWorkbench = {
  loadLod(payload) {
    this.reset();
    if (empty) empty.classList.add('hidden');
    workbenchPaintMode = !!(payload && payload.paint);
    workbenchPaintMats = [];
    const parts = (payload && payload.parts) || [];
    // Group registry (vehicle payloads only): pivoted THREE.Groups so a
    // rotation swings the part around its hinge, not the world origin.
    workbenchNamedGroups = new Map();
    for (const g of (payload && payload.groups) || []) {
      const obj = new THREE.Group();
      const p = g.pivot || [0, 0, 0];
      obj.position.set(p[0], p[2], -p[1]);          // Z-up → Y-up
      obj.userData.pivot = obj.position.clone();
      workbenchGroup.add(obj);
      workbenchNamedGroups.set(g.name, { obj, kind: g.kind, openAngle: doorOpenAngle(g.kind, g.name) });
    }
    for (const part of parts) {
      const mesh = buildWorkbenchPart(part);
      applyWorkbenchModes(mesh);
      const named = part.group ? workbenchNamedGroups.get(part.group) : null;
      if (named) {
        // Meshes are modeled in vehicle space — counter-offset them so the
        // group's pivot translation doesn't double-apply.
        mesh.position.copy(named.obj.userData.pivot).negate();
        named.obj.add(mesh);
      } else {
        workbenchGroup.add(mesh);
      }
      workbenchMeshes.push(mesh);
    }
    workbenchDoorsOpen = false;
    // Only re-frame the camera when the host asks (a freshly-selected model).
    // Slider / LOD re-renders pass frame=false so the user's orbit is kept.
    if (payload && payload.frame) frameWorkbench();
    postToHost({ kind: 'workbench-loaded', lod: (payload && payload.lod) || '', tris: (payload && payload.tris) | 0, verts: (payload && payload.verts) | 0 });
  },
  setDoorsOpen(on) { workbenchDoorsOpen = !!on; applyDoorState(); },
  setGroupVisible(name, on) {
    const g = workbenchNamedGroups.get(name);
    if (g) { g.obj.visible = !!on; requestRender(); }
  },
  // Re-tint every painted body panel live (colour picker in the host UI).
  setPaint(hex) {
    for (const m of workbenchPaintMats) { m.color.setHex(hex >>> 0); m.needsUpdate = true; }
    requestRender();
  },
  // Host-driven empty/loading/error state shown INSIDE the page (a WPF
  // overlay can't sit over the WebView2 — airspace). Clears any mesh and
  // shows the centered cube + the given text.
  setMessage(text) {
    this.reset();
    if (empty) {
      const t = empty.querySelector('div');
      if (t) t.textContent = text;
      empty.classList.remove('hidden');
    }
    requestRender();
  },
  setWireframe(on) { workbenchWireOn = !!on; for (const m of workbenchMeshes) applyWorkbenchModes(m); requestRender(); },
  setEdgedFaces(on) { workbenchEdgedOn = !!on; for (const m of workbenchMeshes) applyWorkbenchModes(m); requestRender(); },
  recenter() { frameWorkbench(); },
  reset() {
    for (const m of workbenchMeshes) {
      setWorkbenchEdges(m, false);
      if (m.geometry) m.geometry.dispose();
      if (m.material) { if (m.material.map) m.material.map.dispose(); m.material.dispose(); }
      if (m.parent) m.parent.remove(m);
    }
    for (const [, g] of workbenchNamedGroups) workbenchGroup.remove(g.obj);
    workbenchNamedGroups = new Map();
    workbenchDoorsOpen = false;
    workbenchMeshes = [];
    requestRender();
  },
};

window.clearModel = function () {
  clearModel();
  empty.classList.remove('hidden');
  status.textContent = '';
  postToHost({ kind: 'parts', parts: [] });
};

// ─────── model parts (layers panel) ───────
//
// The host's slide-out layers panel binds to a list of named subgroups in
// the loaded model. After every load we walk the model and post the list,
// so the panel can render visibility toggles. Toggling drives setPartVisible
// which flips the part's three.js .visible flag — purely viewer-side. The
// conversion path picks the same hidden names off the VM at Convert time
// and passes them to the engine via --exclude-mesh.

function hasMeshDescendant(obj) {
  if (obj.isMesh) return true;
  for (const c of obj.children) if (hasMeshDescendant(c)) return true;
  return false;
}

// The pivot wrap (see load path) inserts one extra Group between
// currentModel and the loader's scene root. The "parts" the user sees in
// the layer panel come from the loader-root children, not the pivot —
// peek through the wrapper when present.
function getPartsRoot() {
  if (!currentModel) return null;
  if (currentModel.userData?.fiveos_pivot && currentModel.userData?.fiveos_inner) {
    return currentModel.userData.fiveos_inner;
  }
  return currentModel;
}

// True when any mesh under `root` carries a glass material — including the
// reflective ones upgradeGlassMaterials already swapped in (they're tagged
// userData.fiveosGlass, which looksLikeGlass short-circuits on). The host
// reads this to auto-tag the part's export preset as GLASS, so detection
// lives in exactly one place (looksLikeGlass) instead of being re-derived
// from the part name host-side.
function partHasGlass(root) {
  let found = false;
  root.traverse(node => {
    if (found || !node.isMesh || !node.material) return;
    const mats = Array.isArray(node.material) ? node.material : [node.material];
    const hostName = node.name || '';
    if (mats.some(m => looksLikeGlass(m, hostName))) found = true;
  });
  return found;
}

function getModelPartsList() {
  const parts = [];
  const root = getPartsRoot();
  if (!root) return parts;

  // Use the user-model's direct children as "parts". For most formats
  // (gltf/glb groups, fbx node hierarchies, dae scenes) the top-level
  // children are the meaningful chunks the user thinks of as parts.
  // Names blank out for some imports — we synthesise "Part 1/2/3" then.
  let i = 0;
  const seenNames = new Set();
  for (const child of root.children) {
    if (!hasMeshDescendant(child)) continue;
    let name = child.name && child.name.trim().length > 0 ? child.name.trim() : `Part ${i + 1}`;
    // Ensure unique names for the panel — duplicates would collide on
    // setPartVisible lookups.
    let unique = name, n = 2;
    while (seenNames.has(unique)) { unique = `${name} (${n++})`; }
    seenNames.add(unique);
    if (unique !== child.name) child.userData.fiveos_displayName = unique;
    parts.push({
      name: unique,
      sourceName: child.name || null,
      visible: child.visible !== false,
      glass: partHasGlass(child),
    });
    i++;
  }
  return parts;
}

function findPartByDisplayName(name) {
  const root = getPartsRoot();
  if (!root) return null;
  for (const child of root.children) {
    const dn = child.userData?.fiveos_displayName ?? child.name;
    if (dn === name) return child;
  }
  return null;
}

window.setPartVisible = function (name, visible) {
  const part = findPartByDisplayName(name);
  if (part) { part.visible = !!visible; requestRender(); }
};

window.getModelParts = function () {
  return JSON.stringify(getModelPartsList());
};

// Live-preview the per-part material preset (Standard / Glass /
// Emissive / EmissiveStrong / EmissiveNight). Mirrors what the YDR
// exporter does — host-side it sets the RAGE shader (glass.sps,
// emissive.sps, etc.); here we just twiddle the three.js
// MeshStandardMaterial so the viewer reflects roughly the same look.
// Cached original values live on the material's userData so flipping
// back to Standard restores cleanly.
window.applyPartMaterial = function (partName, preset) {
  const part = findPartByDisplayName(partName);
  if (!part) return false;
  part.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    for (const mat of mats) applyPresetToMaterial(mat, preset);
  });
  requestRender();
  return true;
};

function applyPresetToMaterial(mat, preset) {
  if (!mat) return;
  // Cache the original look on first touch so Standard can restore.
  if (!mat.userData.fiveos_origMat) {
    mat.userData.fiveos_origMat = {
      transparent: mat.transparent,
      opacity: mat.opacity,
      roughness: 'roughness' in mat ? mat.roughness : 0.5,
      metalness: 'metalness' in mat ? mat.metalness : 0.0,
      envMapIntensity: 'envMapIntensity' in mat ? mat.envMapIntensity : 1.0,
      emissive: mat.emissive ? mat.emissive.getHex() : 0x000000,
      emissiveIntensity: 'emissiveIntensity' in mat ? mat.emissiveIntensity : 1.0,
      emissiveMap: mat.emissiveMap || null,
      depthWrite: mat.depthWrite,
    };
  }
  const orig = mat.userData.fiveos_origMat;
  switch ((preset || '').toUpperCase()) {
    case 'GLASS':
      mat.transparent = true;
      mat.opacity = 0.4;
      if ('roughness' in mat) mat.roughness = 0.05;
      if ('metalness' in mat) mat.metalness = 0.0;
      if ('envMapIntensity' in mat) mat.envMapIntensity = 1.5;
      mat.depthWrite = false;
      if (mat.emissive) mat.emissive.setHex(0x000000);
      if ('emissiveIntensity' in mat) mat.emissiveIntensity = 0;
      break;
    case 'EMISSIVE':
    case 'EMISSIVESTRONG':
    case 'EMISSIVENIGHT':
      mat.transparent = orig.transparent;
      mat.opacity = orig.opacity;
      mat.depthWrite = orig.depthWrite;
      if ('roughness' in mat) mat.roughness = orig.roughness;
      if ('metalness' in mat) mat.metalness = orig.metalness;
      if (mat.emissive) {
        // Use the diffuse color as the glow color — that's what the RAGE
        // emissive shaders do (diffuse texture × emissiveMultiplier).
        if (mat.color) mat.emissive.copy(mat.color);
        else mat.emissive.setHex(0xffffff);
      }
      if ('emissiveIntensity' in mat) {
        mat.emissiveIntensity = preset.toUpperCase() === 'EMISSIVESTRONG' ? 4.0
                              : preset.toUpperCase() === 'EMISSIVENIGHT' ? 0.3
                              : 1.0;
      }
      if (mat.map && 'emissiveMap' in mat) mat.emissiveMap = mat.map;
      break;
    case 'STANDARD':
    default:
      mat.transparent = orig.transparent;
      mat.opacity = orig.opacity;
      mat.depthWrite = orig.depthWrite;
      if ('roughness' in mat) mat.roughness = orig.roughness;
      if ('metalness' in mat) mat.metalness = orig.metalness;
      if ('envMapIntensity' in mat) mat.envMapIntensity = orig.envMapIntensity;
      if (mat.emissive) mat.emissive.setHex(orig.emissive);
      if ('emissiveIntensity' in mat) mat.emissiveIntensity = orig.emissiveIntensity;
      if ('emissiveMap' in mat) mat.emissiveMap = orig.emissiveMap;
      break;
  }
  mat.needsUpdate = true;
}

// Replace the diffuse map on every mesh inside the named part with the
// image at <dataUrl>. Used by the layer-panel context menu's "Textures →
// Change textures" action: the host loads a file the user picked and
// hands the texture down here as a data: URL so we don't have to round-
// trip through the virtual host. Live-only — does NOT mutate the source
// file. To make it stick at convert time, the host has to rewrite the
// source separately.
window.setPartTexture = function (name, dataUrl) {
  const part = findPartByDisplayName(name);
  if (!part) return { ok: false, hasUv: true, reason: 'part-not-found' };
  // A texture can only show if the geometry has UV coordinates. OBJ exported
  // from Blender WITHOUT "Include UVs" (or a mesh that was never unwrapped)
  // has none — the map then samples one texel and the part looks flat/white.
  // Report it so the host can tell the user WHY it stayed white.
  let hasUv = false, meshCount = 0;
  // OBJ keeps native UV orientation (flipY true); glTF/GLB need flipY false.
  const flipY = !currentModelIsGltf;
  part.traverse(obj => {
    if (!obj.isMesh || !obj.geometry) return;
    meshCount++;
    const uv = obj.geometry.getAttribute && obj.geometry.getAttribute('uv');
    if (uv && uv.count > 0) hasUv = true;
  });

  const loader = new THREE.TextureLoader();
  loader.load(dataUrl, (tex) => {
    if ('SRGBColorSpace' in THREE) tex.colorSpace = THREE.SRGBColorSpace;
    else if ('sRGBEncoding' in THREE) tex.encoding = THREE.sRGBEncoding;
    tex.flipY = flipY;
    tex.needsUpdate = true;
    part.traverse(obj => {
      if (!obj.isMesh || !obj.material) return;
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      for (let mi = 0; mi < mats.length; mi++) {
        let mat = mats[mi];
        // A material with no `map` slot (rare basic material) can't take a
        // diffuse map — swap it for a Standard material that renders the map.
        if (!('map' in mat)) {
          const repl = new THREE.MeshStandardMaterial({ color: 0xffffff });
          if (Array.isArray(obj.material)) obj.material[mi] = repl; else obj.material = repl;
          mat = repl;
        }
        if (mat.map && mat.map !== tex) mat.map.dispose();
        mat.map = tex;
        mat.color && mat.color.setHex(0xffffff); // don't tint the texture
        mat.needsUpdate = true;
      }
    });
    requestRender();
  });
  return { ok: true, hasUv, meshCount };
};

// ─────── sub-mesh selection (pick / hover-highlight / separate) ───────
//
// Prop mode only. Lets the user drill BELOW the top-level "parts" (layers)
// down to a single leaf mesh under the cursor — e.g. isolate a mirror pane
// from its frame when both were imported inside one group. Moving the mouse
// paints a translucent cyan overlay over the mesh under the cursor; a click
// locks an orange overlay and pops a small action chip. "Separate" reparents
// the picked mesh to the model root so it becomes its own top-level part —
// a fresh row in the host's Layers panel where visibility / rename / delete /
// Material (Glass) then apply to it alone, and the converter picks it up by
// name via --part-mat / --exclude-mesh like any other layer.
//
// The overlays reference the picked mesh's OWN geometry + world matrix, so
// nothing about the source material is mutated just to highlight it.

let subMeshHover = null;      // leaf mesh currently under the cursor
let subMeshSelected = null;   // leaf mesh locked by a click
const SUBMESH_EMPTY_GEO = new THREE.BufferGeometry();

function makeSubMeshOverlay(color, opacity) {
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity,
    depthTest: true, depthWrite: false,
    side: THREE.DoubleSide,
    polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
  });
  const mesh = new THREE.Mesh(SUBMESH_EMPTY_GEO, mat);
  mesh.matrixAutoUpdate = false;
  mesh.visible = false;
  mesh.renderOrder = 990;              // paint over the model
  mesh.frustumCulled = false;
  mesh.userData.fiveosOverlay = true;  // never picked / never a "part"
  scene.add(mesh);
  return mesh;
}
const subMeshHoverOverlay  = makeSubMeshOverlay(0x38bdf8, 0.30);
const subMeshSelectOverlay = makeSubMeshOverlay(0xf59e0b, 0.42);

// Sit the given overlay exactly on top of `mesh` by borrowing its geometry
// and baking its world matrix in (overlay lives at scene root, identity).
function positionSubMeshOverlay(overlay, mesh) {
  if (!mesh || !mesh.geometry || !mesh.parent) { overlay.visible = false; overlay.geometry = SUBMESH_EMPTY_GEO; return; }
  mesh.updateWorldMatrix(true, false);
  overlay.geometry = mesh.geometry;    // shared ref — NEVER dispose from here
  overlay.matrix.copy(mesh.matrixWorld);
  overlay.visible = true;
}

// Raycast to the front-most visible leaf mesh of the user's model at a
// screen position. Overlays live at scene root (not under currentModel) so
// they're implicitly excluded; the reference ped + grid are too.
function pickSubMeshAt(clientX, clientY) {
  if (!currentModel) return null;
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(currentModel, true);
  for (const h of hits) {
    const o = h.object;
    if (o && (o.isMesh || o.isSkinnedMesh)) return o;
  }
  return null;
}

function subMeshTriCount(mesh) {
  const g = mesh && mesh.geometry;
  if (!g) return 0;
  if (g.index) return Math.floor(g.index.count / 3);
  const pos = g.getAttribute && g.getAttribute('position');
  return pos ? Math.floor(pos.count / 3) : 0;
}

// A leaf mesh is "already its own layer" when it hangs directly off the
// parts root — separating it again is a no-op, so the chip adapts.
function subMeshIsTopLevel(mesh) {
  const root = getPartsRoot();
  return !!(root && mesh && mesh.parent === root);
}

const subMeshBar   = document.getElementById('submesh-bar');
const subMeshName  = document.getElementById('sb-name');
const subMeshSub   = document.getElementById('sb-sub');
const subMeshSepBtn = document.getElementById('sb-separate');
const subMeshSepLabel = document.getElementById('sb-separate-label');

function subMeshDisplayName(mesh) {
  if (!mesh) return 'Mesh';
  if (mesh.name && mesh.name.trim()) return mesh.name.trim();
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  for (const m of mats) if (m && m.name && m.name.trim()) return m.name.trim();
  return 'Unnamed mesh';
}

function updateSubMeshBar(mesh) {
  if (!mesh) { subMeshBar.classList.remove('visible'); return; }
  const topLevel = subMeshIsTopLevel(mesh);
  subMeshName.textContent = subMeshDisplayName(mesh);
  const tris = subMeshTriCount(mesh);
  subMeshSub.textContent = topLevel
    ? `${tris.toLocaleString()} tris · already a layer`
    : `${tris.toLocaleString()} tris`;
  // Already a top-level layer → nothing to separate; the bar is just info
  // (rename + material presets like glass live in the Layers panel).
  subMeshSepBtn.style.display = topLevel ? 'none' : '';
  subMeshSepLabel.textContent = 'Separate';
  subMeshBar.classList.add('visible');
}

function selectSubMesh(mesh) {
  subMeshSelected = mesh || null;
  if (!subMeshSelected) { clearSubMeshSelection(); return; }
  // The hover tint would otherwise double up on the selected mesh.
  if (subMeshHover === subMeshSelected) subMeshHoverOverlay.visible = false;
  positionSubMeshOverlay(subMeshSelectOverlay, subMeshSelected);
  updateSubMeshBar(subMeshSelected);
  requestRender();
}

function clearSubMeshSelection() {
  subMeshSelected = null;
  subMeshSelectOverlay.visible = false;
  subMeshSelectOverlay.geometry = SUBMESH_EMPTY_GEO;
  subMeshBar.classList.remove('visible');
  requestRender();
}

// Full reset — used on model swap / clear / entering pose mode so overlays
// never keep a stale (possibly-disposed) geometry reference around.
function resetSubMeshSelection() {
  subMeshHover = null;
  subMeshHoverOverlay.visible = false;
  subMeshHoverOverlay.geometry = SUBMESH_EMPTY_GEO;
  clearSubMeshSelection();
}

// Split the selected mesh into its own top-level layer — a GENERAL action.
// Material (glass, emissive, …) is then chosen per-layer from the Layers panel;
// a glass-named mesh is also auto-tagged host-side on parts-sync. Keeping this
// material-agnostic is deliberate: separating a mesh isn't a glass-specific thing.
function separateSelectedSubMesh() {
  const mesh = subMeshSelected;
  const root = getPartsRoot();
  if (!mesh || !root) return;

  // Reparent under the parts root, preserving world transform, so the mesh
  // surfaces as its own top-level part.
  if (mesh.parent !== root) root.attach(mesh);

  // MERGE into the host panel (kind:'parts-sync', NOT 'parts') so the other
  // rows keep any rename / preset / visibility / delete state the user set.
  postToHost({ kind: 'parts-sync', parts: getModelPartsList() });

  // Keep it selected so the overlay stays put and the chip flips to the
  // "already a layer" state.
  positionSubMeshOverlay(subMeshSelectOverlay, mesh);
  updateSubMeshBar(mesh);
  requestRender();
}

subMeshSepBtn.addEventListener('click', () => separateSelectedSubMesh());
document.getElementById('sb-close').addEventListener('click', () => clearSubMeshSelection());

// Hover highlight. Prop mode only, and only while no mouse button is held
// (so orbit/pan drags don't flicker the overlay) and the gizmo isn't the
// thing under the cursor.
renderer.domElement.addEventListener('pointermove', e => {
  if (poseMode || !currentModel) return;
  if (e.buttons !== 0) return;
  if (transformControls.dragging || transformControls.axis) {
    if (subMeshHover) { subMeshHover = null; subMeshHoverOverlay.visible = false; requestRender(); }
    return;
  }
  const m = pickSubMeshAt(e.clientX, e.clientY);
  if (m === subMeshHover) return;
  subMeshHover = m;
  if (m && m !== subMeshSelected) positionSubMeshOverlay(subMeshHoverOverlay, m);
  else subMeshHoverOverlay.visible = false;
  renderer.domElement.style.cursor = m ? 'pointer' : '';
  requestRender();
});

// ─────── animated-prop playback (Stop / Play) ───────
//
// A prop that ships a baked clip auto-plays in the preview (currentMixer).
// This pill lets the user freeze that motion and reset the prop to its static
// frame — purely a preview aid, since props always export static. It reuses
// the render loop's existing `_srcSeekHold` gate (see tick(): the mixer only
// advances while the flag is false); setTime(0) parks every clip at frame 0.

const animBar = document.getElementById('anim-bar');
const animToggleBtn = document.getElementById('anim-toggle');
const animToggleLabel = document.getElementById('anim-toggle-label');

function propAnimUpdateButton() {
  const playing = !window._srcSeekHold;
  animBar.classList.toggle('playing', playing);
  if (animToggleLabel) animToggleLabel.textContent = playing ? 'Stop' : 'Play';
}

// Show the pill only for a prop that actually has a clip, and never in pose
// mode (the pose timeline owns playback there).
function propAnimShow(hasClip) {
  if (hasClip && !poseMode && currentMixer) {
    propAnimUpdateButton();
    animBar.classList.add('visible');
  } else {
    animBar.classList.remove('visible');
  }
}

function propAnimSetPlaying(play) {
  if (!currentMixer) return;
  if (play) {
    window._srcSeekHold = false;
    // Drop the delta accumulated while stopped so playback resumes smoothly
    // instead of fast-forwarding through the idle time.
    animationClock.getDelta();
  } else {
    window._srcSeekHold = true;
    currentMixer.setTime(0);     // park every action at frame 0 → static
  }
  propAnimUpdateButton();
  requestRender();
}

if (animToggleBtn) {
  animToggleBtn.addEventListener('click', () => {
    // _srcSeekHold true → currently stopped → play; false → playing → stop.
    propAnimSetPlaying(!!window._srcSeekHold);
  });
}

// ─────── reference ped ───────
//
// A second model loaded purely for scale comparison — a 1.75m-ish humanoid
// stands at the origin alongside the user's prop, plus a height ruler with
// the bbox-measured value as a sprite label. The ruler is computed from the
// reference's bounding box so any model can be used (the host's default is
// a GTA V ped at canonical 1.75m scale).
let referenceModel = null;
let referenceRulerGroup = null;
let referenceVisible = true;

function disposeReference() {
  if (referenceModel) {
    scene.remove(referenceModel);
    referenceModel.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        const m = Array.isArray(obj.material) ? obj.material : [obj.material];
        m.forEach(mat => {
          for (const k in mat) if (mat[k] && mat[k].isTexture) mat[k].dispose();
          mat.dispose();
        });
      }
    });
    referenceModel = null;
  }
  if (referenceRulerGroup) {
    scene.remove(referenceRulerGroup);
    referenceRulerGroup.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material && obj.material.map) obj.material.map.dispose();
      if (obj.material && obj.material.dispose) obj.material.dispose();
    });
    referenceRulerGroup = null;
  }
  requestRender();
}

function makeRulerLabelSprite(text, worldHeight) {
  // Render the height label into a canvas, then sprite it. Sprites always
  // face the camera, so the text stays readable regardless of orbit angle.
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = 'bold 72px -apple-system, "Segoe UI", Roboto, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#cfcfcf';
  ctx.fillText(text, 16, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  // Scale to ~14% of the reference's world height so the label reads at
  // any camera distance. 4:1 aspect matches the canvas ratio.
  const h = Math.max(0.05, worldHeight * 0.14);
  sprite.scale.set(h * 4, h, 1);
  return sprite;
}

function buildHeightRuler(bbox) {
  const group = new THREE.Group();
  const heightM = bbox.max.y - bbox.min.y;
  // Offsets sized as a fraction of the reference's height so the ruler
  // tracks the model's scale (a 0.1m mesh and a 10m mesh both look right).
  const lineOffset = heightM * 0.12;
  const tickLen = heightM * 0.06;
  const labelOffset = heightM * 0.55;

  // Vertical line just outside the model's left side.
  const lineX = bbox.min.x - lineOffset;
  const lineZ = (bbox.min.z + bbox.max.z) / 2;
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(lineX, bbox.min.y, lineZ),
    new THREE.Vector3(lineX, bbox.max.y, lineZ),
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0xb0b0b0, depthTest: false });
  const line = new THREE.Line(lineGeo, lineMat);
  line.renderOrder = 999;
  group.add(line);

  // Top + bottom tick marks.
  const tickMat = new THREE.LineBasicMaterial({ color: 0xb0b0b0, depthTest: false });
  for (const y of [bbox.min.y, bbox.max.y]) {
    const tickGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(lineX - tickLen, y, lineZ),
      new THREE.Vector3(lineX + tickLen, y, lineZ),
    ]);
    const tick = new THREE.Line(tickGeo, tickMat);
    tick.renderOrder = 999;
    group.add(tick);
  }

  // "X.XXm" label sprite at midpoint, sized relative to the model height.
  const label = makeRulerLabelSprite(heightM.toFixed(2) + 'm', heightM);
  label.position.set(lineX - labelOffset, (bbox.min.y + bbox.max.y) / 2, lineZ);
  label.renderOrder = 1000;
  group.add(label);

  return group;
}

window.loadReference = function (url) {
  disposeReference();
  if (!url) return;
  const loader = pickLoader(url);
  if (!loader) {
    console.warn('Reference: unsupported format', url);
    return;
  }

  loader.load(
    url,
    asset => {
      let obj;
      if (asset.scene) obj = asset.scene;
      else if (asset.isObject3D) obj = asset;
      else if (asset.isGroup) obj = asset;
      else { console.warn('Reference: no displayable object'); return; }

      // Reference stands at origin alongside the user's model — no offset,
      // because users want to compare heights, not see them apart.
      obj.position.set(0, 0, 0);
      obj.updateMatrixWorld(true);
      obj.visible = referenceVisible;

      // Unit-scale heuristic: three.js's FBXLoader is inconsistent about
      // applying GlobalSettings.UnitScaleFactor, so FBX files often land
      // in centimetres. Single divide-by-100 if the reference comes in
      // >10m — same logic the user-model load uses for symmetry. A
      // mm-units edge case (>1000) won't fully correct in one shot but is
      // exceedingly rare for a "scale ped" reference.
      let bbox = new THREE.Box3().setFromObject(obj);
      const sizeY = bbox.max.y - bbox.min.y;
      if (sizeY > 10) {
        obj.scale.multiplyScalar(0.01);
        obj.updateMatrixWorld(true);
        bbox = new THREE.Box3().setFromObject(obj);
      }

      // Drop the model so its feet sit on the ground plane (y=0). FBX peds
      // often have their pivot at the hips; without this the reference
      // hovers / sinks relative to the user's prop, which is exactly what
      // wrecks the scale read.
      obj.position.set(0, -bbox.min.y, 0);
      obj.updateMatrixWorld(true);
      bbox = new THREE.Box3().setFromObject(obj);

      // Slight transparency on the reference so it doesn't visually compete
      // with the user's actual prop. Materials with alpha already won't be
      // touched (their authored values win).
      obj.traverse(node => {
        if (node.isMesh && node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(m => {
            if (m.opacity === 1) {
              m.transparent = true;
              m.opacity = 0.85;
            }
          });
        }
      });
      scene.add(obj);
      referenceModel = obj;

      referenceRulerGroup = buildHeightRuler(bbox);
      referenceRulerGroup.visible = referenceVisible;
      scene.add(referenceRulerGroup);
      requestRender();

      // Sync the Match-height input default to the loaded reference's
      // height — one click of "Match" then snaps the user's prop to ped
      // height (or whatever custom reference they swapped in).
      const refHeight = bbox.max.y - bbox.min.y;
      if (matchInput && isFinite(refHeight) && refHeight > 0) {
        matchInput.value = refHeight.toFixed(2);
      }

      // Re-frame so grid + camera distance now account for the reference
      // too. If the user already had a model loaded, this widens the view
      // to fit both. If only the reference is in scene, we frame on it
      // alone — which gives a reasonable starting camera.
      frameAll();
    },
    undefined,
    err => { console.warn('Reference load failed:', err); }
  );
};

window.setReferenceVisible = function (visible) {
  referenceVisible = !!visible;
  if (referenceModel) referenceModel.visible = referenceVisible;
  if (referenceRulerGroup) referenceRulerGroup.visible = referenceVisible;
  requestRender();
};

window.clearReference = function () { disposeReference(); };

window.getTransform = function () {
  if (!currentModel) return null;
  return JSON.stringify({
    pos: [currentModel.position.x, currentModel.position.y, currentModel.position.z],
    rot: [
      THREE.MathUtils.radToDeg(currentModel.rotation.x),
      THREE.MathUtils.radToDeg(currentModel.rotation.y),
      THREE.MathUtils.radToDeg(currentModel.rotation.z)
    ],
    scale: [currentModel.scale.x, currentModel.scale.y, currentModel.scale.z],
  });
};

// ─── Snap to ground ───
// Drop the model so its world-space bounding box sits flush with Y=0
// (the grid plane in the viewer = the ground plane in-game once the
// Y-up→Z-up swap runs on export). Honors current rotation + scale so
// the visible bottom touches the floor regardless of how the user has
// transformed the prop.
window.snapToGround = function () {
  if (!currentModel) return false;
  // Make sure world matrices reflect any pending pos/rot/scale edits
  // before we measure — three.js lazily updates these otherwise.
  currentModel.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(currentModel);
  if (!isFinite(box.min.y) || !isFinite(box.max.y)) return false;
  // Lift (or drop) the model by the gap between its bottom and Y=0.
  currentModel.position.y -= box.min.y;
  currentModel.updateMatrixWorld(true);
  if (poseMode && poseRootTarget === currentModel && poseRootBase) {
    poseSyncRootBaseFromCurrentPosition();
    poseFloorOffsetY = (poseGetCurrentRootOffset && poseGetCurrentRootOffset()[1]) || 0;
  }
  // Tell the host so the sidebar Position fields + undo system see
  // the new Y value. postTransformToHost is the same path the gizmo
  // uses, so the snapshot debouncer treats this exactly like a drag.
  postTransformToHost();
  syncTransformInputs();
  requestRender();
  return true;
};

// ─────── render loop + resize ───────
const _gizmoPos = new THREE.Vector3();
const _camPos = new THREE.Vector3();

// Screen-space size of the gizmo while the camera is close (three.js
// default is 1; deliberately smaller so the handles never dominate the
// viewport or occlude the model under the cursor). Same constant for the
// 3D model viewer AND Emotes pose mode — bone vs root only changes what
// the gizmo is attached to, not the size formula.
const GIZMO_SCREEN_SIZE = 0.55;

function updateGizmoWorldSize() {
  // Measure distance to whatever the gizmo is actually attached to (a
  // bone in pose mode, the model root otherwise) — that's the position
  // TransformControls uses for its own internal factor calc.
  const target = transformControls.object || currentModel;
  if (!target) return;
  target.getWorldPosition(_gizmoPos);
  camera.getWorldPosition(_camPos);
  // Mirrors TransformControls' internal factor calc (perspective branch).
  const distance = _gizmoPos.distanceTo(_camPos);
  const fovFactor = Math.min(1.9 * Math.tan(Math.PI * camera.fov / 360) / camera.zoom, 7);
  const factor = distance * fovFactor;
  if (factor > 1e-6) {
    // Constant screen size up close (gizmo shrinks in world terms as the
    // camera approaches, so it never swallows the model), but cap the
    // resulting WORLD size at gizmoTargetWorldSize so zooming far out
    // doesn't inflate the handles beyond the model itself — past the cap
    // the gizmo just shrinks on screen like any other scene object.
    // World cap comes from updateGizmoSizeFromModel() (maxDim * 0.6).
    transformControls.size = Math.min(GIZMO_SCREEN_SIZE, (4 * gizmoTargetWorldSize) / factor);
  }
}

// On-demand rendering: instead of pumping renderer.render() at 60fps
// regardless of activity (the previous behaviour, which kept the GPU
// busy whenever the viewer was visible), we set a needsRender flag
// whenever something in the scene actually changes. The tick still runs
// every frame to service OrbitControls' damping inertia (when the user
// flicks the camera, it continues to settle for ~10–20 frames after
// release) — but renderer.render() only fires on frames that have a
// reason to repaint.
//
// Conservatively, we treat these as render-worthy:
//   • controls.update() returns true → camera moved this frame (covers
//     both active orbit/zoom AND damping inertia)
//   • requestRender() was called externally (model load, gizmo drag,
//     texture/visibility toggle, resize, etc.) — sets needsRender=true
//   • transformControls is currently being dragged
//
// On a static scene with no input, this drops the viewer's GPU and
// browser-process CPU to essentially idle.
let needsRender = true;
function requestRender() { needsRender = true; }

function tick() {
  requestAnimationFrame(tick);
  // Timeline playback advances bones every frame while playing -- cheap
  // no-op when paused. Defined later in the pose-mode block; guarded.
  if (typeof poseTimelineTick === 'function') poseTimelineTick();
  if (posePlaying) needsRender = true;
  // Skinned-animation playback. The mixer mutates bone matrices each
  // frame, so we have to opt out of the render-on-demand short-circuit
  // and repaint every frame for as long as a clip is playing.
  if (currentMixer && !window._srcSeekHold) {
    currentMixer.update(animationClock.getDelta());
    needsRender = true;
  }
  // controls.update() returns true when the camera actually moved on this
  // frame (active input or damping inertia). Both cases need a repaint.
  if (controls.update()) needsRender = true;
  if (transformControls.dragging) needsRender = true;
  // Re-assert joint-dot visibility every painted frame while posing so
  // nothing (opacity slider, host echo, bone matrix refresh) can bring
  // the colored spheres back while a bone/rig is selected. Gated on
  // poseDotsSyncEnabled — tick() starts during module init, before the
  // poseMode / poseJointHandles bindings exist (TDZ).
  if (poseDotsSyncEnabled && poseMode && poseJointHandles.length > 0) {
    refreshPoseJointDots();
  }
  if (!needsRender) return;
  needsRender = false;
  updateGizmoWorldSize();
  // Guarded behind poseDotsSyncEnabled (undefined at first tick) so the
  // `let poseMode` below isn't touched during its temporal dead zone.
  if (poseDotsSyncEnabled && poseMode) { try { updateBoneLines(); } catch (e) {} }
  renderer.render(scene, camera);
  // First real paint after entering pose mode → tell the host so its boot
  // splash can stay up until the rig is actually on screen (not just built),
  // then fade. One extra rAF so the painted frame is composited first.
  if (_posePaintPending) {
    _posePaintPending = false;
    requestAnimationFrame(() => { try { postToHost({ kind: 'pose-painted' }); } catch (e) {} });
  }
}
tick();

window.addEventListener('resize', () => {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  try { refreshFatLineResolution(); } catch (e) {}
  requestRender();
});

// Repaint whenever the gizmo state mutates (mode change, attach/detach,
// drag, dragging-changed). The TransformControls 'change' event covers all
// of these — its 'objectChange' event covers in-drag value mutations.
transformControls.addEventListener('change', requestRender);
transformControls.addEventListener('objectChange', requestRender);
// OrbitControls fires 'change' on every camera mutation. Combined with the
// controls.update() check above this is belt-and-braces: change fires from
// programmatic camera.position changes too.
controls.addEventListener('change', requestRender);

// ════════════════════════════════════════════════════════════════════
// GTA SKELETON PRESETS
//
// Synthetic posable rigs that use the canonical SKEL_* bone names — so
// every bone the user poses maps 1:1 onto a Pose -> Emote .ycd with no
// rig-conversion guesswork. Bind transforms are approximate T-pose
// values (Y-up, three.js convention); RAGE composes the .ycd's
// rotations on top of the real freemode bind pose at runtime, so the
// approximate bind here only affects what the user SEES in the
// viewport, not what plays in-game.
//
// Skips finger bones — adds 30+ joints for limited posing value at
// this scale. Add them back once we load the real .ydd in a later v.
// ════════════════════════════════════════════════════════════════════
// Proportions: 1.85m total height (GTA male average). Pelvis sits at
// Y=1.0m world, shoulders at ~1.5m, head crown at ~1.78m. Arm reach
// from spine: clavicle(0.18) + upper(0.27) + forearm(0.26) + hand(0.15)
// = 0.86m per side = 1.72m wingspan. Hip width 0.20m, leg total 0.92m.
const GTA_SKELETON_BONES = [
  ['SKEL_ROOT',      null,                0,    0,    0   ],
  ['SKEL_Pelvis',    'SKEL_ROOT',         0,    1.00, 0   ],
